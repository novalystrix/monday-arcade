<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>monday.com Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #6c5ce7, #a855f7, #ec4899); padding: 40px 20px; text-align: center; }
    .header h1 { font-size: 2.5rem; font-weight: 800; color: white; margin-bottom: 8px; }
    .header p { color: rgba(255,255,255,0.85); font-size: 1.1rem; }
    .tabs { display: flex; justify-content: center; gap: 20px; padding: 20px; background: #12121a; border-bottom: 1px solid #222; }
    .tab { padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; border: 1px solid transparent; }
    .tab:hover { background: #1a1a2e; }
    .tab.active { background: #6c5ce7; color: white; }
    .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
    .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .game-card { background: #16161f; border: 1px solid #2a2a3a; border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .game-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(108,92,231,0.2); }
    .game-thumb { height: 180px; background: linear-gradient(135deg, #1a1a2e, #2d2d44); display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; }
    .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .game-thumb .fallback-emoji { font-size: 3rem; }
    .game-info { padding: 16px; }
    .game-info h3 { font-size: 1.1rem; margin-bottom: 6px; }
    .game-info p { color: #888; font-size: 0.9rem; line-height: 1.4; }
    .game-info .meta { margin-top: 10px; display: flex; gap: 12px; font-size: 0.8rem; color: #666; }
    .play-btn { display: inline-block; margin-top: 12px; padding: 8px 20px; background: #6c5ce7; color: white; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .play-btn:hover { background: #5a4bd1; }
    
    /* Reports */
    .reports-list { display: flex; flex-direction: column; gap: 16px; }
    .report-card { background: #16161f; border: 1px solid #2a2a3a; border-radius: 12px; padding: 20px; }
    .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .score { font-size: 2rem; font-weight: 800; }
    .score.high { color: #22c55e; }
    .score.mid { color: #eab308; }
    .score.low { color: #ef4444; }
    .report-details { font-size: 0.9rem; color: #999; line-height: 1.6; }
    .report-details .dim { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; }
    .dim-label { color: #bbb; }
    .dim-score { font-weight: 600; }
    .improvements { margin-top: 12px; padding: 12px; background: #1a1a2e; border-radius: 8px; font-size: 0.85rem; color: #a0a0b0; }
    .empty { text-align: center; padding: 60px 20px; color: #555; }
    .hidden { display: none; }
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge.agents { background: #6c5ce720; color: #a78bfa; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🕹️ monday.com Arcade</h1>
    <p>Games built by AI agent teams — testing real collaboration</p>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('games')">🎮 Games</div>
    <div class="tab" onclick="showTab('reports')">📊 Team Reports</div>
    <div class="tab" onclick="showTab('scores')">📈 Score Trend</div>
  </div>
  <div class="container">
    <div id="games-section">
      <div class="section-title">🎮 Game Library</div>
      <div class="games-grid" id="games-grid">
        <div class="empty">No games yet — first one drops at :30!</div>
      </div>
    </div>
    <div id="reports-section" class="hidden">
      <div class="section-title">📊 Teamwork Test Reports</div>
      <div class="reports-list" id="reports-list">
        <div class="empty">No reports yet — first test runs at :00!</div>
      </div>
    </div>
    <div id="scores-section" class="hidden">
      <div class="section-title">📈 Score Trend Over Time</div>
      <canvas id="score-chart" width="1060" height="400" style="background:#16161f;border-radius:12px;border:1px solid #2a2a3a;padding:20px;"></canvas>
    </div>
  </div>
  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('[id$="-section"]').forEach(s => s.classList.add('hidden'));
      event.target.classList.add('active');
      document.getElementById(tab + '-section').classList.remove('hidden');
      if (tab === 'scores') drawChart();
    }

    let reportsData = [];

    async function loadGames() {
      try {
        const res = await fetch('/api/games');
        const games = await res.json();
        const grid = document.getElementById('games-grid');
        if (!games.length) return;
        grid.innerHTML = games.map(g => `
          <div class="game-card">
            <div class="game-thumb">
              <img src="/games/${g.id}/thumb.png" alt="${g.name}" onerror="this.outerHTML='<span class=fallback-emoji>${g.emoji || '🎮'}</span>'">
            </div>
            <div class="game-info">
              <h3>${g.name}</h3>
              <p>${g.description || ''}</p>
              <div class="meta">
                <span>${g.createdAt ? new Date(g.createdAt).toLocaleString() : ''}</span>
                <span class="badge agents">${g.builtBy || 'Team'}</span>
              </div>
              <a class="play-btn" href="/games/${g.id}/index.html">Play →</a>
            </div>
          </div>
        `).join('');
      } catch(e) { console.error('Failed to load games', e); }
    }

    async function loadReports() {
      try {
        const res = await fetch('/api/reports');
        reportsData = await res.json();
        const list = document.getElementById('reports-list');
        if (!reportsData.length) return;
        list.innerHTML = reportsData.map(r => {
          const cls = r.score >= 80 ? 'high' : r.score >= 50 ? 'mid' : 'low';
          return `
          <div class="report-card">
            <div class="report-header">
              <div>
                <strong>Run #${r.runNumber || '?'}</strong>
                <span style="color:#666;margin-left:10px">${r.timestamp ? new Date(r.timestamp).toLocaleString() : ''}</span>
              </div>
              <div class="score ${cls}">${r.score}/100</div>
            </div>
            <div class="report-details">
              ${(r.dimensions || []).map(d => `
                <div class="dim">
                  <span class="dim-label">${d.name}</span>
                  <span class="dim-score">${d.score}/${d.max}</span>
                </div>
              `).join('')}
            </div>
            ${r.improvements ? `<div class="improvements"><strong>Improvements made:</strong><br>${r.improvements}</div>` : ''}
            ${r.issues ? `<div class="improvements" style="border-left:2px solid #ef4444;"><strong>Issues found:</strong><br>${r.issues}</div>` : ''}
          </div>`;
        }).join('');
      } catch(e) { console.error('Failed to load reports', e); }
    }

    function drawChart() {
      const canvas = document.getElementById('score-chart');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!reportsData.length) {
        ctx.fillStyle = '#555';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('No data yet', canvas.width/2, canvas.height/2);
        return;
      }
      const sorted = [...reportsData].reverse();
      const pad = { top: 30, right: 30, bottom: 50, left: 50 };
      const w = canvas.width - pad.left - pad.right;
      const h = canvas.height - pad.top - pad.bottom;
      
      // Grid
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 100; i += 20) {
        const y = pad.top + h - (i/100)*h;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+w, y); ctx.stroke();
        ctx.fillStyle = '#666'; ctx.font = '12px sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(i, pad.left-8, y+4);
      }
      
      // Line
      ctx.beginPath();
      ctx.strokeStyle = '#6c5ce7';
      ctx.lineWidth = 3;
      sorted.forEach((r, i) => {
        const x = pad.left + (i / Math.max(sorted.length-1, 1)) * w;
        const y = pad.top + h - (r.score/100)*h;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
      
      // Dots
      sorted.forEach((r, i) => {
        const x = pad.left + (i / Math.max(sorted.length-1, 1)) * w;
        const y = pad.top + h - (r.score/100)*h;
        ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2);
        ctx.fillStyle = r.score >= 80 ? '#22c55e' : r.score >= 50 ? '#eab308' : '#ef4444';
        ctx.fill();
        ctx.fillStyle = '#999'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(`#${r.runNumber || i+1}`, x, pad.top+h+20);
      });
    }

    loadGames();
    loadReports();
    setInterval(loadGames, 60000);
    setInterval(loadReports, 60000);
  </script>
</body>
</html>
