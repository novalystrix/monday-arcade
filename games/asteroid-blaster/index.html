<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Asteroid Blaster — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #040408;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #6060cc;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
}
.back-link:hover { color: #8080ff; }
h1 {
  margin-top: 10px;
  font-size: 20px;
  letter-spacing: 3px;
  color: #ff6040;
  text-shadow: 0 0 20px #ff604080, 0 0 40px #ff200040;
}
canvas {
  margin-top: 8px;
  border: 1px solid #1a1a30;
  border-radius: 8px;
  box-shadow: 0 0 30px #ff604020, 0 0 60px #0040ff10;
}
#hud {
  position: fixed;
  top: 8px;
  right: 16px;
  text-align: right;
  font-size: 13px;
  color: #aaa;
  z-index: 100;
}
#hud .score { font-size: 22px; color: #ff6040; text-shadow: 0 0 10px #ff604060; }
#hud .combo { font-size: 15px; color: #ffcc00; }
#hud .lives { font-size: 15px; color: #ff4060; }
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #040408e0;
  z-index: 200;
}
.overlay h2 { font-size: 32px; color: #ff6040; text-shadow: 0 0 30px #ff604080; margin-bottom: 12px; }
.overlay .final-score { font-size: 48px; color: #ffcc00; text-shadow: 0 0 20px #ffcc0060; margin-bottom: 8px; }
.overlay .best { font-size: 16px; color: #888; margin-bottom: 24px; }
.overlay button {
  padding: 12px 36px;
  font-size: 18px;
  font-family: inherit;
  background: linear-gradient(135deg, #ff6040, #ff2060);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-shadow: 0 1px 4px #00000080;
  box-shadow: 0 0 20px #ff604060;
}
.overlay button:hover { transform: scale(1.05); }
.overlay .hint { font-size: 12px; color: #666; margin-top: 16px; }
#start-overlay .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
</style>
</head>
<body>
<a class="back-link" href="/">← Arcade</a>
<h1>☄️ ASTEROID BLASTER</h1>
<div id="hud">
  <div class="score" id="score-display">0</div>
  <div class="combo" id="combo-display"></div>
  <div class="lives" id="lives-display"></div>
  <div style="font-size:11px;color:#555;margin-top:4px" id="wave-display"></div>
</div>
<canvas id="game"></canvas>

<div class="overlay" id="start-overlay">
  <h2>☄️ ASTEROID BLASTER</h2>
  <div class="subtitle">Pilot • Blast • Survive</div>
  <button onclick="startGame()">START</button>
  <div class="hint">WASD / Arrows to move · Click / Space to shoot · P to pause</div>
</div>

<div class="overlay" id="gameover-overlay" style="display:none">
  <h2>GAME OVER</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="best" id="best-score"></div>
  <button onclick="startGame()">PLAY AGAIN</button>
  <div class="hint">Wave <span id="final-wave">1</span> reached</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Sizing
function resize() {
  const w = Math.min(window.innerWidth - 20, 600);
  const h = Math.min(window.innerHeight - 80, 700);
  canvas.width = w;
  canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

// State
let ship, bullets, asteroids, particles, powerups, stars;
let score, combo, comboTimer, lives, wave, waveTimer, gameRunning, paused;
let shakeX = 0, shakeY = 0, shakeMag = 0;
let bestScore = parseInt(localStorage.getItem('asteroid-blaster-best') || '0');
let mouseX = canvas.width / 2, mouseY = canvas.height / 2;
let keys = {};
let shootCooldown = 0;
let rapidFire = 0;
let shield = 0;
let invincible = 0;

// Colors
const NEON = ['#ff6040','#ff2060','#ffcc00','#40ff80','#4080ff','#ff40ff','#00ffcc'];
function rndNeon() { return NEON[Math.random()*NEON.length|0]; }
function hsl(h,s,l) { return `hsl(${h},${s}%,${l}%)`; }

// Stars (parallax bg)
function makeStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*1.5+0.3,
      speed: Math.random()*0.3+0.1,
      hue: Math.random()*360
    });
  }
}

// Ship
function makeShip() {
  return {
    x: canvas.width/2, y: canvas.height*0.75,
    vx: 0, vy: 0,
    angle: -Math.PI/2,
    size: 14,
    thrustTrail: []
  };
}

// Asteroid
function spawnAsteroid(size, x, y) {
  size = size || (Math.random()*30+20);
  const edge = Math.random()*4|0;
  if (x === undefined) {
    if (edge === 0) { x = -size; y = Math.random()*canvas.height; }
    else if (edge === 1) { x = canvas.width+size; y = Math.random()*canvas.height; }
    else if (edge === 2) { x = Math.random()*canvas.width; y = -size; }
    else { x = Math.random()*canvas.width; y = canvas.height+size; }
  }
  const angle = Math.atan2(canvas.height/2 - y, canvas.width/2 - x) + (Math.random()-0.5)*1.5;
  const speed = Math.random()*1.5 + 0.5 + wave*0.1;
  // Generate jagged shape
  const verts = [];
  const n = 8 + (Math.random()*5|0);
  for (let i = 0; i < n; i++) {
    const a = (i/n)*Math.PI*2;
    const r = size * (0.7 + Math.random()*0.3);
    verts.push({ x: Math.cos(a)*r, y: Math.sin(a)*r });
  }
  return {
    x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
    size, rot: 0, rotSpeed: (Math.random()-0.5)*0.03,
    verts, hue: Math.random()*360, hp: Math.ceil(size/15)
  };
}

// Bullet
function fireBullet() {
  if (shootCooldown > 0) return;
  const spread = rapidFire > 0 ? 3 : 1;
  const cd = rapidFire > 0 ? 4 : 10;
  for (let i = 0; i < spread; i++) {
    const angleOff = spread > 1 ? (i - 1) * 0.15 : 0;
    const a = ship.angle + angleOff;
    bullets.push({
      x: ship.x + Math.cos(a)*ship.size,
      y: ship.y + Math.sin(a)*ship.size,
      vx: Math.cos(a)*8,
      vy: Math.sin(a)*8,
      life: 60,
      hue: rapidFire > 0 ? 50 : 15
    });
  }
  shootCooldown = cd;
}

// Particles
function explode(x, y, count, hue, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = Math.random()*(speed||3)+1;
    particles.push({
      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: Math.random()*30+15,
      maxLife: 45,
      size: Math.random()*3+1,
      hue: hue + (Math.random()-0.5)*30
    });
  }
}

function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return;
  const types = ['rapid','shield','life','bomb'];
  const type = types[Math.random()*types.length|0];
  const colors = { rapid: '#ffcc00', shield: '#4080ff', life: '#ff4060', bomb: '#ff40ff' };
  const labels = { rapid: 'R', shield: 'S', life: '♥', bomb: 'B' };
  powerups.push({
    x, y, type, color: colors[type], label: labels[type],
    life: 300, vy: 0.3, pulse: 0
  });
}

// Input
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key===' '||e.key==='ArrowUp'||e.key==='ArrowDown') e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('click', e => { if (gameRunning && !paused) fireBullet(); });

// Touch controls
let touchMove = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  touchMove = { x: t.clientX - r.left, y: t.clientY - r.top };
  if (gameRunning && !paused) fireBullet();
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  touchMove = { x: t.clientX - r.left, y: t.clientY - r.top };
});
canvas.addEventListener('touchend', () => { touchMove = null; });

// Game loop
function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('gameover-overlay').style.display = 'none';
  ship = makeShip();
  bullets = []; asteroids = []; particles = []; powerups = [];
  score = 0; combo = 0; comboTimer = 0; lives = 3; wave = 1; waveTimer = 0;
  gameRunning = true; paused = false;
  rapidFire = 0; shield = 0; invincible = 0;
  makeStars();
  spawnWave();
  requestAnimationFrame(loop);
}

function spawnWave() {
  const count = 3 + wave * 2;
  for (let i = 0; i < count; i++) {
    setTimeout(() => { if (gameRunning) asteroids.push(spawnAsteroid()); }, i * 300);
  }
}

function loop() {
  if (!gameRunning) return;
  if (paused) { requestAnimationFrame(loop); return; }
  update();
  draw();
  requestAnimationFrame(loop);
}

function update() {
  // Ship movement
  const accel = 0.45;
  const friction = 0.94;
  if (keys['w'] || keys['arrowup']) ship.vy -= accel;
  if (keys['s'] || keys['arrowdown']) ship.vy += accel;
  if (keys['a'] || keys['arrowleft']) ship.vx -= accel;
  if (keys['d'] || keys['arrowright']) ship.vx += accel;
  if (keys[' ']) fireBullet();
  if (keys['p'] && !keys._pHeld) { paused = !paused; keys._pHeld = true; }
  if (!keys['p']) keys._pHeld = false;

  // Touch movement
  if (touchMove) {
    const dx = touchMove.x - ship.x;
    const dy = touchMove.y - ship.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist > 10) {
      ship.vx += (dx/dist)*accel*0.8;
      ship.vy += (dy/dist)*accel*0.8;
    }
  }

  ship.vx *= friction;
  ship.vy *= friction;
  ship.x += ship.vx;
  ship.y += ship.vy;

  // Wrap edges
  if (ship.x < 0) ship.x = canvas.width;
  if (ship.x > canvas.width) ship.x = 0;
  if (ship.y < 0) ship.y = canvas.height;
  if (ship.y > canvas.height) ship.y = 0;

  // Ship angle toward mouse
  ship.angle = Math.atan2(mouseY - ship.y, mouseX - ship.x);

  // Thrust trail
  if (Math.abs(ship.vx) > 0.5 || Math.abs(ship.vy) > 0.5) {
    ship.thrustTrail.push({ x: ship.x - Math.cos(ship.angle)*ship.size, y: ship.y - Math.sin(ship.angle)*ship.size, life: 15 });
  }
  ship.thrustTrail = ship.thrustTrail.filter(t => { t.life--; return t.life > 0; });

  // Cooldowns
  if (shootCooldown > 0) shootCooldown--;
  if (rapidFire > 0) rapidFire--;
  if (shield > 0) shield--;
  if (invincible > 0) invincible--;

  // Combo timer
  if (comboTimer > 0) { comboTimer--; } else { combo = 0; }

  // Bullets
  bullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; });
  bullets = bullets.filter(b => b.life > 0 && b.x > -20 && b.x < canvas.width+20 && b.y > -20 && b.y < canvas.height+20);

  // Asteroids
  asteroids.forEach(a => {
    a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
    // Wrap
    if (a.x < -a.size*2) a.x = canvas.width + a.size;
    if (a.x > canvas.width + a.size*2) a.x = -a.size;
    if (a.y < -a.size*2) a.y = canvas.height + a.size;
    if (a.y > canvas.height + a.size*2) a.y = -a.size;
  });

  // Bullet-asteroid collisions
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    for (let j = asteroids.length-1; j >= 0; j--) {
      const a = asteroids[j];
      const dx = b.x-a.x, dy = b.y-a.y;
      if (dx*dx+dy*dy < a.size*a.size) {
        a.hp--;
        explode(b.x, b.y, 5, a.hue, 2);
        bullets.splice(i, 1);
        if (a.hp <= 0) {
          // Destroy asteroid
          explode(a.x, a.y, 20 + a.size, a.hue, 4);
          shakeMag = Math.min(a.size * 0.4, 10);
          combo++;
          comboTimer = 90;
          const mult = Math.min(combo, 10);
          score += Math.ceil(a.size * mult);
          // Split
          if (a.size > 18) {
            for (let k = 0; k < 2; k++) {
              asteroids.push(spawnAsteroid(a.size * 0.55, a.x + (Math.random()-0.5)*20, a.y + (Math.random()-0.5)*20));
            }
          }
          spawnPowerup(a.x, a.y);
          asteroids.splice(j, 1);
        }
        break;
      }
    }
  }

  // Ship-asteroid collisions
  if (invincible <= 0) {
    for (let j = asteroids.length-1; j >= 0; j--) {
      const a = asteroids[j];
      const dx = ship.x-a.x, dy = ship.y-a.y;
      if (dx*dx+dy*dy < (ship.size+a.size*0.7)*(ship.size+a.size*0.7)) {
        if (shield > 0) {
          // Shield absorbs hit, destroys asteroid
          shield = 0;
          explode(a.x, a.y, 30, 220, 5);
          asteroids.splice(j, 1);
          shakeMag = 8;
        } else {
          lives--;
          invincible = 90;
          explode(ship.x, ship.y, 40, 0, 5);
          shakeMag = 15;
          ship.vx = 0; ship.vy = 0;
          if (lives <= 0) {
            gameOver();
            return;
          }
        }
        break;
      }
    }
  }

  // Ship-powerup collisions
  for (let i = powerups.length-1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy;
    p.life--;
    p.pulse += 0.1;
    const dx = ship.x-p.x, dy = ship.y-p.y;
    if (dx*dx+dy*dy < 400) {
      if (p.type === 'rapid') rapidFire = 300;
      else if (p.type === 'shield') shield = 600;
      else if (p.type === 'life') lives = Math.min(lives+1, 5);
      else if (p.type === 'bomb') {
        // Destroy all asteroids
        asteroids.forEach(a => { explode(a.x, a.y, 15, a.hue, 3); score += Math.ceil(a.size); });
        asteroids = [];
        shakeMag = 20;
      }
      explode(p.x, p.y, 12, 60, 3);
      powerups.splice(i, 1);
      continue;
    }
    if (p.life <= 0) { powerups.splice(i, 1); }
  }

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life--; });
  particles = particles.filter(p => p.life > 0);

  // Screen shake
  if (shakeMag > 0) {
    shakeX = (Math.random()-0.5)*shakeMag;
    shakeY = (Math.random()-0.5)*shakeMag;
    shakeMag *= 0.85;
    if (shakeMag < 0.5) shakeMag = 0;
  } else { shakeX = 0; shakeY = 0; }

  // Wave progression
  if (asteroids.length === 0) {
    waveTimer++;
    if (waveTimer > 60) {
      wave++;
      waveTimer = 0;
      spawnWave();
    }
  }

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random()*canvas.width; }
  });

  // HUD
  document.getElementById('score-display').textContent = score;
  document.getElementById('combo-display').textContent = combo > 1 ? `x${combo} COMBO` : '';
  document.getElementById('lives-display').textContent = '♥'.repeat(lives);
  document.getElementById('wave-display').textContent = `WAVE ${wave}`;
}

function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);
  ctx.clearRect(-20, -20, canvas.width+40, canvas.height+40);

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = hsl(s.hue, 40, 70);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Thrust trail
  ship.thrustTrail.forEach(t => {
    const a = t.life / 15;
    ctx.globalAlpha = a * 0.6;
    ctx.fillStyle = `hsl(${20 + (1-a)*30}, 100%, ${50 + (1-a)*30}%)`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 3 * a, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Particles
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = hsl(p.hue, 100, 60);
    ctx.shadowColor = hsl(p.hue, 100, 60);
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * a, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // Asteroids
  asteroids.forEach(a => {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.strokeStyle = hsl(a.hue, 70, 55);
    ctx.lineWidth = 2;
    ctx.shadowColor = hsl(a.hue, 80, 50);
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(a.verts[0].x, a.verts[0].y);
    for (let i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
    ctx.closePath();
    ctx.stroke();
    // Fill faint
    ctx.fillStyle = hsl(a.hue, 50, 15);
    ctx.globalAlpha = 0.3;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  });
  ctx.shadowBlur = 0;

  // Powerups
  powerups.forEach(p => {
    const pulse = 1 + Math.sin(p.pulse)*0.2;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(pulse, pulse);
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 15;
    ctx.strokeRect(-8, -8, 16, 16);
    ctx.fillStyle = p.color;
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.label, 0, 1);
    ctx.restore();
  });
  ctx.shadowBlur = 0;

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = hsl(b.hue, 100, 70);
    ctx.shadowColor = hsl(b.hue, 100, 60);
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI*2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(b.x - b.vx*0.5, b.y - b.vy*0.5, 2, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  ctx.shadowBlur = 0;

  // Ship
  if (invincible > 0 && (invincible % 6 < 3)) {
    // Blink when invincible
  } else {
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);
    ctx.strokeStyle = shield > 0 ? '#4080ff' : '#ff6040';
    ctx.lineWidth = 2;
    ctx.shadowColor = shield > 0 ? '#4080ff' : '#ff6040';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(ship.size, 0);
    ctx.lineTo(-ship.size*0.7, -ship.size*0.6);
    ctx.lineTo(-ship.size*0.3, 0);
    ctx.lineTo(-ship.size*0.7, ship.size*0.6);
    ctx.closePath();
    ctx.stroke();
    // Engine glow
    ctx.fillStyle = '#ff604060';
    ctx.beginPath();
    ctx.arc(-ship.size*0.3, 0, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Shield bubble
    if (shield > 0) {
      ctx.strokeStyle = `rgba(64, 128, 255, ${0.3 + Math.sin(Date.now()*0.005)*0.15})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ship.x, ship.y, ship.size + 6, 0, Math.PI*2);
      ctx.stroke();
    }
  }
  ctx.shadowBlur = 0;

  // Wave announcement
  if (waveTimer > 0 && waveTimer < 60 && asteroids.length === 0) {
    ctx.globalAlpha = 1 - waveTimer/60;
    ctx.fillStyle = '#ff6040';
    ctx.font = '28px monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff604080';
    ctx.shadowBlur = 20;
    ctx.fillText(`WAVE ${wave} CLEARED`, canvas.width/2, canvas.height/2);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function gameOver() {
  gameRunning = false;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('asteroid-blaster-best', bestScore);
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score').textContent = `Best: ${bestScore}`;
  document.getElementById('final-wave').textContent = wave;
  document.getElementById('gameover-overlay').style.display = 'flex';
}
</script>
</body>
</html>
