<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glass Shatter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; }
canvas { display: block; width: 100%; height: 100%; touch-action: none; }
#ui-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#back-link {
  position: fixed; top: 16px; left: 20px; z-index: 20;
  color: #aac; text-decoration: none; font-family: 'Courier New', monospace;
  font-size: 16px; pointer-events: auto; opacity: 0.7; transition: opacity 0.2s;
  text-shadow: 0 0 8px rgba(170,170,204,0.5);
}
#back-link:hover { opacity: 1; }
#hud {
  position: fixed; top: 16px; right: 20px; z-index: 20;
  text-align: right; font-family: 'Courier New', monospace; color: #fff;
  display: none;
}
#hud-score {
  font-size: 32px; font-weight: bold;
  text-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(100,200,255,0.3);
}
#hud-time {
  font-size: 18px; color: #8af; margin-top: 4px;
  text-shadow: 0 0 10px rgba(136,170,255,0.5);
}
#hud-combo {
  font-size: 16px; color: #fa0; margin-top: 4px;
  text-shadow: 0 0 10px rgba(255,170,0,0.5);
  opacity: 0; transition: opacity 0.3s;
}
</style>
</head>
<body>
<a id="back-link" href="/">← Arcade</a>
<div id="hud">
  <div id="hud-score">0</div>
  <div id="hud-time">60s</div>
  <div id="hud-combo"></div>
</div>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════════════
// GLASS SHATTER — A Premium Browser Game
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const hudScore = document.getElementById('hud-score');
const hudTime = document.getElementById('hud-time');
const hudCombo = document.getElementById('hud-combo');

// ── Constants ──
const GAME_DURATION = 60;
const COLS = 6;
const ROWS = 8;
const GAP = 3;
const COMBO_WINDOW = 2000;
const GRAVITY = 600;
const DUST_COUNT = 40;

// Jewel tones: ruby, sapphire, emerald, amethyst, topaz, amber
const GLASS_COLORS = [
  { name: 'ruby',     base: [220, 30, 60],   glow: [255, 80, 100]  },
  { name: 'sapphire', base: [30, 80, 220],    glow: [80, 140, 255]  },
  { name: 'emerald',  base: [20, 180, 80],    glow: [60, 255, 130]  },
  { name: 'amethyst', base: [140, 50, 200],   glow: [180, 100, 255] },
  { name: 'topaz',    base: [240, 180, 30],   glow: [255, 220, 80]  },
  { name: 'amber',    base: [220, 120, 20],   glow: [255, 160, 60]  },
];

// ── State ──
let W, H, cellW, cellH, gridOffX, gridOffY;
let state = 'start'; // start | playing | gameover
let grid = [];
let fragments = [];
let particles = [];
let dustMotes = [];
let floatingTexts = [];
let score = 0;
let bestScore = parseInt(localStorage.getItem('glassShatter_best') || '0');
let timeLeft = GAME_DURATION;
let comboMultiplier = 1;
let lastChainTime = 0;
let chainCount = 0;
let flashAlpha = 0;
let edgeGlow = 0;
let mouseX = -1, mouseY = -1;
let hoverCol = -1, hoverRow = -1;
let gameStartTime = 0;
let lastTime = 0;
let animFrame = 0;

// ── Resize ──
function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';

  const maxGridW = W * 0.7;
  const maxGridH = H * 0.82;
  cellW = Math.min(maxGridW / COLS, maxGridH / ROWS);
  cellH = cellW;
  gridOffX = (W - COLS * cellW) / 2;
  gridOffY = (H - ROWS * cellH) / 2 + H * 0.03;

  initDust();
}
window.addEventListener('resize', resize);

// ── Dust Motes ──
function initDust() {
  dustMotes = [];
  for (let i = 0; i < DUST_COUNT; i++) {
    dustMotes.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 10 - 5,
      size: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.3 + 0.05,
      phase: Math.random() * Math.PI * 2
    });
  }
}

// ── Grid ──
function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = createPanel(r, c);
    }
  }
}

function createPanel(r, c) {
  const colorIdx = Math.floor(Math.random() * GLASS_COLORS.length);
  return {
    colorIdx, alive: true,
    offsetY: 0, // for slide-in animation
    shimmer: Math.random() * Math.PI * 2,
    pattern: Math.floor(Math.random() * 4), // geometric pattern type
    brightness: 0, // hover brightness
  };
}

// ── Voronoi-like Shatter ──
function generateShatterFragments(cx, cy, w, h, color) {
  // Generate random seed points inside the cell
  const numPoints = 8 + Math.floor(Math.random() * 5); // 8-12
  const seeds = [];
  for (let i = 0; i < numPoints; i++) {
    seeds.push({
      x: cx + (Math.random() * 0.8 + 0.1) * w,
      y: cy + (Math.random() * 0.8 + 0.1) * h
    });
  }

  // Simple Voronoi approximation: for each seed, create a polygon by
  // computing the half-plane intersections with nearby seeds
  const frags = [];
  const center = { x: cx + w / 2, y: cy + h / 2 };

  for (let i = 0; i < seeds.length; i++) {
    const pts = voronoiCell(seeds, i, cx, cy, w, h);
    if (pts.length < 3) continue;

    // Compute centroid
    let centX = 0, centY = 0;
    for (const p of pts) { centX += p.x; centY += p.y; }
    centX /= pts.length; centY /= pts.length;

    // Direction away from center
    const dx = centX - center.x;
    const dy = centY - center.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;

    const speed = 150 + Math.random() * 250;
    frags.push({
      points: pts.map(p => ({ x: p.x - centX, y: p.y - centY })),
      x: centX, y: centY,
      vx: (dx / dist) * speed + (Math.random() - 0.5) * 100,
      vy: (dy / dist) * speed - 100 - Math.random() * 150,
      rotation: 0,
      rotSpeed: (Math.random() - 0.5) * 8,
      color: color,
      alpha: 0.85,
      scale: 1,
      life: 1,
      trail: []
    });
  }
  return frags;
}

function voronoiCell(seeds, idx, bx, by, bw, bh) {
  // Start with bounding rectangle
  let polygon = [
    { x: bx, y: by }, { x: bx + bw, y: by },
    { x: bx + bw, y: by + bh }, { x: bx, y: by + bh }
  ];

  const s = seeds[idx];
  for (let j = 0; j < seeds.length; j++) {
    if (j === idx) continue;
    const o = seeds[j];
    // Bisector between s and o
    const mx = (s.x + o.x) / 2, my = (s.y + o.y) / 2;
    const nx = o.x - s.x, ny = o.y - s.y;
    // Clip polygon to half-plane on s's side
    polygon = clipPolygon(polygon, mx, my, nx, ny);
    if (polygon.length < 3) return [];
  }
  return polygon;
}

function clipPolygon(poly, px, py, nx, ny) {
  if (poly.length < 3) return [];
  const out = [];
  for (let i = 0; i < poly.length; i++) {
    const a = poly[i], b = poly[(i + 1) % poly.length];
    const da = (a.x - px) * nx + (a.y - py) * ny;
    const db = (b.x - px) * nx + (b.y - py) * ny;
    if (da <= 0) out.push(a);
    if ((da <= 0) !== (db <= 0)) {
      const t = da / (da - db);
      out.push({ x: a.x + t * (b.x - a.x), y: a.y + t * (b.y - a.y) });
    }
  }
  return out;
}

// ── Chain Reaction ──
function shatterPanel(r, c, depth) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 0;
  const panel = grid[r][c];
  if (!panel || !panel.alive) return 0;

  const targetColor = arguments[3] !== undefined ? arguments[3] : panel.colorIdx;
  if (depth > 0 && panel.colorIdx !== targetColor) return 0;

  panel.alive = false;

  const cx = gridOffX + c * cellW;
  const cy = gridOffY + r * cellH;
  const color = GLASS_COLORS[panel.colorIdx];

  // Generate fragments
  const frags = generateShatterFragments(cx + GAP, cy + GAP, cellW - GAP * 2, cellH - GAP * 2, color);
  fragments.push(...frags);

  // Particle burst
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 200;
    particles.push({
      x: cx + cellW / 2, y: cy + cellH / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 50,
      life: 1, decay: 1.5 + Math.random(),
      size: 1 + Math.random() * 3,
      color: color.glow
    });
  }

  let count = 1;

  // Chain to adjacent same-color panels
  const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
  for (const [dr, dc] of dirs) {
    count += shatterPanel(r + dr, c + dc, depth + 1, targetColor);
  }

  return count;
}

function handleClick(px, py) {
  if (state !== 'playing') return;

  // Convert pixel to grid coords
  const c = Math.floor((px - gridOffX) / cellW);
  const r = Math.floor((py - gridOffY) / cellH);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  if (!grid[r][c] || !grid[r][c].alive) return;

  const chainSize = shatterPanel(r, c, 0);
  if (chainSize === 0) return;

  // Combo system
  const now = performance.now();
  if (now - lastChainTime < COMBO_WINDOW) {
    chainCount++;
    comboMultiplier = Math.min(chainCount + 1, 8);
  } else {
    chainCount = 0;
    comboMultiplier = 1;
  }
  lastChainTime = now;

  // Score
  const baseScore = chainSize * 10;
  const chainMult = Math.max(1, chainSize - 1); // chain multiplier
  const points = baseScore * chainMult * comboMultiplier;
  score += points;

  // Flash for big chains
  if (chainSize >= 3) {
    flashAlpha = Math.min(0.3, chainSize * 0.05);
  }

  // Floating text
  floatingTexts.push({
    x: px, y: py,
    text: '+' + points,
    scale: 0, targetScale: 1 + chainSize * 0.15,
    alpha: 1, life: 1,
    color: chainSize >= 4 ? '#ffdd44' : chainSize >= 3 ? '#44ddff' : '#ffffff'
  });

  if (comboMultiplier > 1) {
    floatingTexts.push({
      x: px, y: py + 35,
      text: comboMultiplier + 'x COMBO',
      scale: 0, targetScale: 0.8,
      alpha: 1, life: 1,
      color: '#ff8800'
    });
  }

  if (chainSize >= 3) {
    floatingTexts.push({
      x: px, y: py - 35,
      text: chainSize + ' CHAIN!',
      scale: 0, targetScale: 1.2,
      alpha: 1, life: 0.8,
      color: '#ff44aa'
    });
  }

  // Fill gaps after a short delay
  setTimeout(fillGaps, 200);
}

function fillGaps() {
  // Gravity: panels fall down
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] && grid[r][c].alive) {
        if (writeRow !== r) {
          grid[writeRow][c] = grid[r][c];
          grid[r][c] = null;
          grid[writeRow][c].offsetY = (r - writeRow) * cellH;
        }
        writeRow--;
      }
    }
    // Fill empty spots at top
    for (let r = writeRow; r >= 0; r--) {
      grid[r][c] = createPanel(r, c);
      grid[r][c].offsetY = -(writeRow - r + 1) * cellH - cellH;
    }
  }
}

// ── Grand Finale ──
function grandFinale() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] && grid[r][c].alive) {
        setTimeout(() => {
          if (grid[r] && grid[r][c] && grid[r][c].alive) {
            const panel = grid[r][c];
            panel.alive = false;
            const cx = gridOffX + c * cellW;
            const cy = gridOffY + r * cellH;
            const color = GLASS_COLORS[panel.colorIdx];
            const frags = generateShatterFragments(cx + GAP, cy + GAP, cellW - GAP * 2, cellH - GAP * 2, color);
            fragments.push(...frags);
            for (let i = 0; i < 10; i++) {
              const angle = Math.random() * Math.PI * 2;
              const speed = 30 + Math.random() * 120;
              particles.push({
                x: cx + cellW / 2, y: cy + cellH / 2,
                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 30,
                life: 1, decay: 2 + Math.random(),
                size: 1 + Math.random() * 2, color: color.glow
              });
            }
          }
        }, (r * COLS + c) * 40 + Math.random() * 80);
      }
    }
  }
  flashAlpha = 0.4;
}

// ── Drawing ──
function drawPanel(r, c, panel) {
  if (!panel || !panel.alive) return;
  const x = gridOffX + c * cellW + GAP;
  const y = gridOffY + r * cellH + GAP + panel.offsetY;
  const w = cellW - GAP * 2;
  const h = cellH - GAP * 2;

  if (y + h < 0 || y > H) return; // Off screen

  const color = GLASS_COLORS[panel.colorIdx];
  const [br, bg, bb] = color.base;
  const [gr, gg, gb] = color.glow;

  // Pulsing when time low
  let pulse = 0;
  if (state === 'playing' && timeLeft <= 10) {
    pulse = Math.sin(animFrame * 0.08) * 0.15;
  }

  const hover = panel.brightness;
  const baseAlpha = 0.55 + hover * 0.15 + pulse;

  // Border glow
  ctx.save();
  ctx.shadowColor = `rgba(${gr},${gg},${gb},${0.4 + hover * 0.3})`;
  ctx.shadowBlur = 12 + hover * 8;

  // Main panel fill
  ctx.fillStyle = `rgba(${br},${bg},${bb},${baseAlpha})`;
  ctx.beginPath();
  const rad = 3;
  ctx.roundRect(x, y, w, h, rad);
  ctx.fill();
  ctx.restore();

  // Inner glow gradient
  const grad = ctx.createRadialGradient(x + w / 2, y + h / 2, 0, x + w / 2, y + h / 2, w * 0.7);
  grad.addColorStop(0, `rgba(${gr},${gg},${gb},${0.2 + hover * 0.1 + Math.sin(panel.shimmer + animFrame * 0.02) * 0.05})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // Geometric stained glass pattern
  ctx.save();
  ctx.globalAlpha = 0.15 + hover * 0.05;
  ctx.strokeStyle = `rgba(${gr},${gg},${gb},0.6)`;
  ctx.lineWidth = 0.8;
  ctx.beginPath();

  const pattern = panel.pattern;
  if (pattern === 0) {
    // Diamond pattern
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w, y + h / 2);
    ctx.lineTo(x + w / 2, y + h);
    ctx.lineTo(x, y + h / 2);
    ctx.closePath();
    ctx.moveTo(x + w / 4, y + h / 4);
    ctx.lineTo(x + w * 3 / 4, y + h / 4);
    ctx.lineTo(x + w * 3 / 4, y + h * 3 / 4);
    ctx.lineTo(x + w / 4, y + h * 3 / 4);
    ctx.closePath();
  } else if (pattern === 1) {
    // Radial lines
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
      ctx.moveTo(x + w / 2, y + h / 2);
      ctx.lineTo(x + w / 2 + Math.cos(a) * w / 2, y + h / 2 + Math.sin(a) * h / 2);
    }
    ctx.arc(x + w / 2, y + h / 2, w * 0.25, 0, Math.PI * 2);
  } else if (pattern === 2) {
    // Cross pattern
    ctx.moveTo(x + w / 2, y + 4);
    ctx.lineTo(x + w / 2, y + h - 4);
    ctx.moveTo(x + 4, y + h / 2);
    ctx.lineTo(x + w - 4, y + h / 2);
    ctx.arc(x + w / 2, y + h / 2, w * 0.3, 0, Math.PI * 2);
    ctx.moveTo(x + w / 2 + w * 0.15, y + h / 2);
    ctx.arc(x + w / 2, y + h / 2, w * 0.15, 0, Math.PI * 2);
  } else {
    // Gothic arch pattern
    ctx.moveTo(x + w * 0.2, y + h);
    ctx.quadraticCurveTo(x + w * 0.2, y + h * 0.3, x + w / 2, y + 4);
    ctx.quadraticCurveTo(x + w * 0.8, y + h * 0.3, x + w * 0.8, y + h);
    ctx.moveTo(x + 2, y + h * 0.6);
    ctx.lineTo(x + w - 2, y + h * 0.6);
  }
  ctx.stroke();
  ctx.restore();

  // Top highlight (light reflection)
  const hlGrad = ctx.createLinearGradient(x, y, x, y + h * 0.4);
  hlGrad.addColorStop(0, `rgba(255,255,255,${0.12 + hover * 0.08})`);
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h * 0.4, [rad, rad, 0, 0]);
  ctx.fill();
}

function drawFragment(frag) {
  ctx.save();
  ctx.translate(frag.x, frag.y);
  ctx.rotate(frag.rotation);
  ctx.scale(frag.scale, frag.scale);
  ctx.globalAlpha = frag.alpha;

  const [br, bg, bb] = frag.color.base;
  const [gr, gg, gb] = frag.color.glow;

  ctx.shadowColor = `rgba(${gr},${gg},${gb},${frag.alpha * 0.6})`;
  ctx.shadowBlur = 8;

  ctx.fillStyle = `rgba(${br},${bg},${bb},0.75)`;
  ctx.beginPath();
  if (frag.points.length > 0) {
    ctx.moveTo(frag.points[0].x, frag.points[0].y);
    for (let i = 1; i < frag.points.length; i++) {
      ctx.lineTo(frag.points[i].x, frag.points[i].y);
    }
    ctx.closePath();
  }
  ctx.fill();

  // Highlight edge
  ctx.strokeStyle = `rgba(${gr},${gg},${gb},${frag.alpha * 0.4})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();

  ctx.restore();
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.life;
  ctx.shadowColor = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.life})`;
  ctx.shadowBlur = 6;
  ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.life})`;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawDust(dt) {
  for (const d of dustMotes) {
    d.x += d.vx * dt + Math.sin(d.phase + animFrame * 0.01) * 0.3;
    d.y += d.vy * dt;
    d.phase += dt;
    if (d.x < 0) d.x = W;
    if (d.x > W) d.x = 0;
    if (d.y < 0) d.y = H;
    if (d.y > H) d.y = 0;

    ctx.save();
    ctx.globalAlpha = d.alpha;
    ctx.fillStyle = '#aaccff';
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawStartScreen() {
  // Title
  const pulse = Math.sin(animFrame * 0.03) * 0.1 + 0.9;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Stained glass title effect
  const titleY = H * 0.38;
  ctx.font = `bold ${Math.min(W * 0.1, 80)}px 'Courier New', monospace`;

  // Multiple colored shadow layers
  const colors = ['rgba(220,30,60,0.3)', 'rgba(30,80,220,0.3)', 'rgba(140,50,200,0.3)'];
  for (let i = 0; i < colors.length; i++) {
    ctx.fillStyle = colors[i];
    ctx.fillText('Glass Shatter', W / 2 + Math.sin(animFrame * 0.02 + i * 2) * 3,
      titleY + Math.cos(animFrame * 0.02 + i * 2) * 3);
  }

  ctx.shadowColor = 'rgba(150,200,255,0.8)';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Glass Shatter', W / 2, titleY);
  ctx.restore();

  // Subtitle
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `${Math.min(W * 0.03, 20)}px 'Courier New', monospace`;
  ctx.fillStyle = `rgba(170,190,255,${0.5 + Math.sin(animFrame * 0.05) * 0.3})`;
  ctx.shadowColor = 'rgba(170,190,255,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText('Tap to Start', W / 2, H * 0.52);
  ctx.restore();

  // Best score
  if (bestScore > 0) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = `${Math.min(W * 0.025, 16)}px 'Courier New', monospace`;
    ctx.fillStyle = 'rgba(255,200,60,0.6)';
    ctx.fillText('Best: ' + bestScore, W / 2, H * 0.60);
    ctx.restore();
  }

  // Decorative panels
  drawDecorativePanels();
}

function drawDecorativePanels() {
  const size = Math.min(W, H) * 0.06;
  const cx = W / 2;
  const cy = H * 0.38;
  const radius = Math.min(W, H) * 0.25;

  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + animFrame * 0.005;
    const x = cx + Math.cos(angle) * radius - size / 2;
    const y = cy + Math.sin(angle) * radius * 0.5 - size / 2;
    const color = GLASS_COLORS[i];
    const [br, bg, bb] = color.base;
    const [gr, gg, gb] = color.glow;

    ctx.save();
    ctx.shadowColor = `rgba(${gr},${gg},${gb},0.5)`;
    ctx.shadowBlur = 15;
    ctx.fillStyle = `rgba(${br},${bg},${bb},0.4)`;
    ctx.beginPath();
    ctx.roundRect(x, y, size, size, 3);
    ctx.fill();

    const hlGrad = ctx.createLinearGradient(x, y, x, y + size * 0.4);
    hlGrad.addColorStop(0, 'rgba(255,255,255,0.15)');
    hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hlGrad;
    ctx.fillRect(x, y, size, size * 0.4);
    ctx.restore();
  }
}

function drawGameOver() {
  // Dim background
  ctx.fillStyle = 'rgba(5,5,15,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Game Over title
  ctx.font = `bold ${Math.min(W * 0.08, 60)}px 'Courier New', monospace`;
  ctx.shadowColor = 'rgba(150,200,255,0.6)';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Time\'s Up!', W / 2, H * 0.32);

  // Score
  ctx.font = `bold ${Math.min(W * 0.12, 90)}px 'Courier New', monospace`;
  ctx.shadowColor = 'rgba(100,200,255,0.8)';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#88ddff';
  ctx.fillText(score, W / 2, H * 0.45);

  ctx.font = `${Math.min(W * 0.03, 18)}px 'Courier New', monospace`;
  ctx.fillStyle = 'rgba(200,200,220,0.7)';
  ctx.shadowBlur = 0;
  ctx.fillText('SCORE', W / 2, H * 0.38);

  // Best score
  const isNew = score >= bestScore && score > 0;
  ctx.font = `${Math.min(W * 0.035, 22)}px 'Courier New', monospace`;
  if (isNew) {
    ctx.fillStyle = `rgba(255,200,60,${0.7 + Math.sin(animFrame * 0.08) * 0.3})`;
    ctx.shadowColor = 'rgba(255,200,60,0.5)';
    ctx.shadowBlur = 15;
    ctx.fillText('★ NEW BEST! ★', W / 2, H * 0.54);
  } else {
    ctx.fillStyle = 'rgba(200,200,220,0.5)';
    ctx.fillText('Best: ' + bestScore, W / 2, H * 0.54);
  }

  // Play again
  ctx.font = `${Math.min(W * 0.03, 20)}px 'Courier New', monospace`;
  ctx.fillStyle = `rgba(170,190,255,${0.5 + Math.sin(animFrame * 0.05) * 0.3})`;
  ctx.shadowColor = 'rgba(170,190,255,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText('Tap to Play Again', W / 2, H * 0.65);

  ctx.restore();
}

function drawFloatingText(ft) {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = ft.alpha;
  const s = ft.scale;
  ctx.font = `bold ${Math.round(24 * s)}px 'Courier New', monospace`;
  ctx.shadowColor = ft.color;
  ctx.shadowBlur = 15;
  ctx.fillStyle = ft.color;
  ctx.fillText(ft.text, ft.x, ft.y);
  ctx.restore();
}

// ── Update ──
function update(dt) {
  animFrame++;

  // Update panel slide-in animations
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = grid[r][c];
      if (p && Math.abs(p.offsetY) > 0.5) {
        p.offsetY *= 0.85; // Smooth ease
        if (Math.abs(p.offsetY) < 0.5) p.offsetY = 0;
      }

      // Hover brightness
      if (p && p.alive) {
        const isHover = (r === hoverRow && c === hoverCol);
        p.brightness += ((isHover ? 1 : 0) - p.brightness) * 0.15;
      }
    }
  }

  // Update fragments
  for (let i = fragments.length - 1; i >= 0; i--) {
    const f = fragments[i];
    f.vy += GRAVITY * dt;
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.rotation += f.rotSpeed * dt;
    f.life -= dt * 0.8;
    f.alpha = Math.max(0, f.life);
    f.scale = Math.max(0.1, f.life);

    // Trail
    if (f.life > 0.2 && animFrame % 2 === 0) {
      f.trail.push({ x: f.x, y: f.y, alpha: 0.4 });
    }
    for (let t = f.trail.length - 1; t >= 0; t--) {
      f.trail[t].alpha -= dt * 2;
      if (f.trail[t].alpha <= 0) f.trail.splice(t, 1);
    }

    // Bounce off edges
    if (f.x < 0 || f.x > W) f.vx *= -0.5;
    if (f.y > H) { f.y = H; f.vy *= -0.3; }

    if (f.life <= 0) fragments.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += GRAVITY * 0.3 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.life -= dt * 0.8;
    ft.y -= 60 * dt;
    ft.scale += (ft.targetScale - ft.scale) * 0.15;
    ft.alpha = Math.max(0, ft.life);
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Flash decay
  if (flashAlpha > 0) flashAlpha *= 0.92;

  // Edge glow
  if (state === 'playing' && timeLeft <= 3) {
    edgeGlow = 0.3 + Math.sin(animFrame * 0.15) * 0.2;
  } else {
    edgeGlow *= 0.95;
  }

  // Timer
  if (state === 'playing') {
    timeLeft = Math.max(0, GAME_DURATION - (performance.now() - gameStartTime) / 1000);
    hudScore.textContent = score;
    hudTime.textContent = Math.ceil(timeLeft) + 's';
    hudTime.style.color = timeLeft <= 10 ? (timeLeft <= 3 ? '#ff4444' : '#ffaa44') : '#88aaff';

    if (comboMultiplier > 1) {
      hudCombo.textContent = comboMultiplier + 'x';
      hudCombo.style.opacity = '1';
    } else {
      hudCombo.style.opacity = '0';
    }

    // Combo decay
    if (performance.now() - lastChainTime > COMBO_WINDOW) {
      comboMultiplier = 1;
      chainCount = 0;
    }

    if (timeLeft <= 0) {
      state = 'gameover';
      hud.style.display = 'none';
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('glassShatter_best', bestScore);
      }
      grandFinale();
    }
  }
}

// ── Main Draw ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Subtle background gradient
  const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.6);
  bgGrad.addColorStop(0, 'rgba(20,20,50,0.5)');
  bgGrad.addColorStop(1, 'rgba(5,5,15,0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  drawDust(1 / 60);

  if (state === 'start') {
    drawStartScreen();
  } else {
    // Draw fragment trails
    for (const f of fragments) {
      const [gr, gg, gb] = f.color.glow;
      for (const t of f.trail) {
        ctx.save();
        ctx.globalAlpha = t.alpha * 0.5;
        ctx.fillStyle = `rgba(${gr},${gg},${gb},1)`;
        ctx.shadowColor = `rgba(${gr},${gg},${gb},0.8)`;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Draw grid panels
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        drawPanel(r, c, grid[r][c]);
      }
    }

    // Draw fragments
    for (const f of fragments) drawFragment(f);

    // Draw particles
    for (const p of particles) drawParticle(p);

    // Draw floating texts
    for (const ft of floatingTexts) drawFloatingText(ft);

    // Screen flash
    if (flashAlpha > 0.01) {
      ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Edge glow (red for final seconds)
    if (edgeGlow > 0.01) {
      const thickness = 60;
      ctx.save();
      // Top
      let g = ctx.createLinearGradient(0, 0, 0, thickness);
      g.addColorStop(0, `rgba(255,30,30,${edgeGlow})`);
      g.addColorStop(1, 'rgba(255,30,30,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, thickness);
      // Bottom
      g = ctx.createLinearGradient(0, H, 0, H - thickness);
      g.addColorStop(0, `rgba(255,30,30,${edgeGlow})`);
      g.addColorStop(1, 'rgba(255,30,30,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, H - thickness, W, thickness);
      // Left
      g = ctx.createLinearGradient(0, 0, thickness, 0);
      g.addColorStop(0, `rgba(255,30,30,${edgeGlow})`);
      g.addColorStop(1, 'rgba(255,30,30,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, thickness, H);
      // Right
      g = ctx.createLinearGradient(W, 0, W - thickness, 0);
      g.addColorStop(0, `rgba(255,30,30,${edgeGlow})`);
      g.addColorStop(1, 'rgba(255,30,30,0)');
      ctx.fillStyle = g;
      ctx.fillRect(W - thickness, 0, thickness, H);
      ctx.restore();
    }

    if (state === 'gameover') drawGameOver();
  }
}

// ── Game Loop ──
function loop(timestamp) {
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── Input ──
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * devicePixelRatio,
    y: (touch.clientY - rect.top) * devicePixelRatio
  };
}

function onPointerDown(e) {
  e.preventDefault();
  const pos = getPos(e);

  if (state === 'start') {
    state = 'playing';
    score = 0;
    comboMultiplier = 1;
    chainCount = 0;
    timeLeft = GAME_DURATION;
    gameStartTime = performance.now();
    fragments = [];
    particles = [];
    floatingTexts = [];
    initGrid();
    hud.style.display = 'block';
    return;
  }

  if (state === 'gameover') {
    // Wait a bit before allowing restart
    if (timeLeft <= 0) {
      state = 'start';
      fragments = [];
      particles = [];
    }
    return;
  }

  handleClick(pos.x, pos.y);
}

function onPointerMove(e) {
  const pos = getPos(e);
  mouseX = pos.x;
  mouseY = pos.y;
  hoverCol = Math.floor((mouseX - gridOffX) / cellW);
  hoverRow = Math.floor((mouseY - gridOffY) / cellH);
  if (hoverCol < 0 || hoverCol >= COLS) hoverCol = -1;
  if (hoverRow < 0 || hoverRow >= ROWS) hoverRow = -1;
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches[0]) onPointerMove(e.touches[0]);
}, { passive: false });

// ── Init ──
resize();
initGrid();
lastTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
