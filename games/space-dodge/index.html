<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Dodge - monday.com Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; overflow: hidden; font-family: -apple-system, sans-serif; }
canvas { display: block; }
.hud { position: fixed; top: 20px; left: 20px; color: #fff; font-size: 18px; z-index: 10; }
.hud .score { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #6c5ce7, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hud .time { color: #888; margin-top: 4px; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 20; }
.overlay h1 { font-size: 3rem; color: white; margin-bottom: 10px; }
.overlay .sub { color: #888; font-size: 1.1rem; margin-bottom: 30px; }
.overlay .final { font-size: 2rem; color: #a855f7; font-weight: 800; margin-bottom: 20px; }
.btn { padding: 14px 40px; background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
.btn:hover { transform: scale(1.05); }
.back { position: fixed; top: 20px; right: 20px; color: #666; text-decoration: none; font-size: 14px; z-index: 10; }
.back:hover { color: #fff; }
</style>
</head>
<body>
<a class="back" href="/">← Back to Arcade</a>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="time" id="time">0.0s</div>
</div>
<div class="overlay" id="start-screen">
  <h1>🚀 Space Dodge</h1>
  <div class="sub">Dodge the asteroids. Move with mouse or touch.</div>
  <button class="btn" id="start-btn">Start Game</button>
</div>
<div class="overlay" id="end-screen" style="display:none">
  <h1>💥 Game Over</h1>
  <div class="final" id="final-score"></div>
  <button class="btn" id="restart-btn">Play Again</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let ship = { x: 0, y: 0, size: 20 };
let asteroids = [];
let particles = [];
let stars = [];
let score = 0;
let startTime = 0;
let gameRunning = false;
let animFrame;
let difficulty = 1;

// Stars
for (let i = 0; i < 200; i++) {
  stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, size: Math.random() * 2 + 0.5, speed: Math.random() * 0.5 + 0.1 });
}

function spawnAsteroid() {
  const side = Math.random();
  let x, y, vx, vy;
  const speed = (2 + Math.random() * 3) * difficulty;
  if (side < 0.25) { x = -30; y = Math.random() * H; vx = speed; vy = (Math.random() - 0.5) * speed; }
  else if (side < 0.5) { x = W + 30; y = Math.random() * H; vx = -speed; vy = (Math.random() - 0.5) * speed; }
  else if (side < 0.75) { x = Math.random() * W; y = -30; vx = (Math.random() - 0.5) * speed; vy = speed; }
  else { x = Math.random() * W; y = H + 30; vx = (Math.random() - 0.5) * speed; vy = -speed; }
  const size = 15 + Math.random() * 25;
  asteroids.push({ x, y, vx, vy, size, rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.05 });
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color, size: Math.random() * 3 + 1 });
  }
}

function drawShip(x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Glow
  const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
  grd.addColorStop(0, 'rgba(108,92,231,0.3)');
  grd.addColorStop(1, 'rgba(108,92,231,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI * 2); ctx.fill();
  // Ship body
  ctx.fillStyle = '#6c5ce7';
  ctx.beginPath();
  ctx.moveTo(0, -ship.size);
  ctx.lineTo(-ship.size * 0.7, ship.size * 0.6);
  ctx.lineTo(0, ship.size * 0.3);
  ctx.lineTo(ship.size * 0.7, ship.size * 0.6);
  ctx.closePath();
  ctx.fill();
  // Engine
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.moveTo(-6, ship.size * 0.4);
  ctx.lineTo(0, ship.size * 0.8 + Math.random() * 5);
  ctx.lineTo(6, ship.size * 0.4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);
  ctx.fillStyle = '#3a3a4a';
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const r = a.size * (0.7 + Math.sin(i * 3.7) * 0.3);
    if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
    else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function update() {
  if (!gameRunning) return;
  const elapsed = (Date.now() - startTime) / 1000;
  difficulty = 1 + elapsed / 30;
  
  // Spawn asteroids
  if (Math.random() < 0.02 * difficulty) spawnAsteroid();
  
  // Update asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
    if (a.x < -80 || a.x > W + 80 || a.y < -80 || a.y > H + 80) { asteroids.splice(i, 1); continue; }
    // Collision
    const dx = ship.x - a.x, dy = ship.y - a.y;
    if (Math.sqrt(dx * dx + dy * dy) < a.size + ship.size * 0.5) { gameOver(); return; }
  }
  
  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  score = Math.floor(elapsed * 10);
  document.getElementById('score').textContent = score;
  document.getElementById('time').textContent = elapsed.toFixed(1) + 's';
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  
  // Stars
  ctx.fillStyle = '#ffffff';
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.globalAlpha = 0.3 + s.size * 0.2;
    ctx.fillRect(s.x % W, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
  
  // Asteroids
  for (const a of asteroids) drawAsteroid(a);
  
  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Ship
  if (gameRunning) drawShip(ship.x, ship.y);
}

function loop() {
  update();
  draw();
  animFrame = requestAnimationFrame(loop);
}

function gameOver() {
  gameRunning = false;
  addParticles(ship.x, ship.y, '#ff6b6b', 30);
  addParticles(ship.x, ship.y, '#ffd93d', 20);
  document.getElementById('final-score').textContent = `Score: ${score}`;
  document.getElementById('end-screen').style.display = 'flex';
}

function startGame() {
  asteroids = []; particles = []; score = 0; difficulty = 1;
  ship.x = W / 2; ship.y = H / 2;
  startTime = Date.now();
  gameRunning = true;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').style.display = 'none';
}

// Controls
document.addEventListener('mousemove', e => { if (gameRunning) { ship.x = e.clientX; ship.y = e.clientY; } });
document.addEventListener('touchmove', e => { e.preventDefault(); if (gameRunning) { ship.x = e.touches[0].clientX; ship.y = e.touches[0].clientY; } }, { passive: false });

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

loop();
</script>
</body>
</html>
