<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ink Drop — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #6040cc;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
  opacity: 0.7;
}
.back-link:hover { opacity: 1; }
canvas { display: block; border-radius: 8px; }
#ui {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
}
#score-display {
  position: fixed;
  top: 16px;
  right: 20px;
  font-size: 28px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 20px rgba(120,80,255,0.6);
  z-index: 10;
  opacity: 0;
  transition: opacity 0.5s;
}
#combo-display {
  position: fixed;
  top: 50px;
  right: 20px;
  font-size: 16px;
  color: #ffaa00;
  text-shadow: 0 0 12px rgba(255,170,0,0.5);
  z-index: 10;
  opacity: 0;
  transition: opacity 0.3s;
}
.overlay {
  pointer-events: auto;
  text-align: center;
  padding: 40px;
}
.overlay h1 {
  font-size: 48px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ff6ec7, #7c4dff, #00e5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
}
.overlay .subtitle {
  font-size: 16px;
  color: #888;
  margin-bottom: 32px;
}
.overlay .start-btn {
  background: linear-gradient(135deg, #7c4dff, #448aff);
  border: none;
  color: #fff;
  padding: 14px 48px;
  font-size: 18px;
  font-family: inherit;
  border-radius: 30px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 30px rgba(124,77,255,0.4);
}
.overlay .start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 40px rgba(124,77,255,0.6);
}
.final-score {
  font-size: 60px;
  font-weight: bold;
  background: linear-gradient(135deg, #ff6ec7, #ffaa00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 16px 0;
}
.high-score {
  font-size: 14px;
  color: #888;
  margin-bottom: 24px;
}
</style>
</head>
<body>
<a href="/" class="back-link">← Arcade</a>
<canvas id="game"></canvas>
<div id="score-display">0</div>
<div id="combo-display"></div>
<div id="ui">
  <div id="start-screen" class="overlay">
    <h1>🎨 Ink Drop</h1>
    <p class="subtitle">Tap or click to move · Collect colors · Don't hit the dark</p>
    <button class="start-btn" id="start-btn">Drop In</button>
  </div>
  <div id="death-screen" class="overlay" style="display:none;">
    <h1>Splat!</h1>
    <div class="final-score" id="final-score">0</div>
    <div class="high-score" id="high-score"></div>
    <button class="start-btn" id="restart-btn">Drop Again</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const comboDisplay = document.getElementById('combo-display');
const startScreen = document.getElementById('start-screen');
const deathScreen = document.getElementById('death-screen');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Color palettes - watercolor-inspired
const PALETTES = [
  ['#ff6ec7','#ff9a9e','#fad0c4','#ffecd2'],
  ['#a18cd1','#fbc2eb','#f6d5f7','#e8cff0'],
  ['#667eea','#764ba2','#a855f7','#c084fc'],
  ['#00e5ff','#00b8d4','#0097a7','#26c6da'],
  ['#ffd54f','#ffb300','#ff8f00','#ffe082'],
  ['#69f0ae','#00e676','#00c853','#b9f6ca'],
];

let palette = PALETTES[0];
let paletteIdx = 0;

function nextPalette() {
  paletteIdx = (paletteIdx + 1) % PALETTES.length;
  palette = PALETTES[paletteIdx];
}

// Game state
let playing = false;
let score = 0;
let combo = 0;
let maxCombo = 0;
let highScore = parseInt(localStorage.getItem('inkdrop-high') || '0');
let speed = 2;
let frameCount = 0;

// Player drop
const drop = {
  x: 0, y: 0,
  targetX: 0,
  vx: 0,
  radius: 14,
  color: '#7c4dff',
  trail: [],
  hue: 260,
};

// Ink trails left on the background
let inkSplats = [];

// Collectibles
let orbs = [];
// Obstacles
let obstacles = [];
// Background particles
let bgParticles = [];
// Burst particles
let burstParticles = [];

function initBgParticles() {
  bgParticles = [];
  for (let i = 0; i < 60; i++) {
    bgParticles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      alpha: Math.random() * 0.3 + 0.05,
      hue: Math.random() * 360,
    });
  }
}

function spawnOrb() {
  const col = palette[Math.floor(Math.random() * palette.length)];
  orbs.push({
    x: Math.random() * (W - 80) + 40,
    y: -20,
    radius: Math.random() * 8 + 10,
    color: col,
    glow: 0,
    pulse: Math.random() * Math.PI * 2,
  });
}

function spawnObstacle() {
  const type = Math.random() < 0.4 ? 'bar' : 'circle';
  if (type === 'bar') {
    const w = Math.random() * 120 + 60;
    obstacles.push({
      type: 'bar',
      x: Math.random() * (W - w),
      y: -20,
      w: w,
      h: 6 + Math.random() * 4,
    });
  } else {
    obstacles.push({
      type: 'circle',
      x: Math.random() * (W - 60) + 30,
      y: -20,
      radius: Math.random() * 15 + 12,
    });
  }
}

function addInkSplat(x, y, color, size) {
  inkSplats.push({
    x, y, color,
    radius: size || (Math.random() * 20 + 10),
    alpha: 0.15 + Math.random() * 0.1,
    age: 0,
  });
  // Limit splats for performance
  if (inkSplats.length > 200) inkSplats.shift();
}

function burstAt(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      radius: Math.random() * 4 + 2,
      color,
      alpha: 1,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
    });
  }
}

function startGame() {
  playing = true;
  score = 0;
  combo = 0;
  maxCombo = 0;
  speed = 2;
  frameCount = 0;
  paletteIdx = Math.floor(Math.random() * PALETTES.length);
  palette = PALETTES[paletteIdx];
  drop.x = W / 2;
  drop.y = H * 0.75;
  drop.targetX = W / 2;
  drop.vx = 0;
  drop.trail = [];
  drop.hue = 260;
  orbs = [];
  obstacles = [];
  inkSplats = [];
  burstParticles = [];
  initBgParticles();
  startScreen.style.display = 'none';
  deathScreen.style.display = 'none';
  scoreDisplay.style.opacity = '1';
  scoreDisplay.textContent = '0';
}

function endGame() {
  playing = false;
  scoreDisplay.style.opacity = '0';
  comboDisplay.style.opacity = '0';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('inkdrop-high', highScore);
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('high-score').textContent =
    score >= highScore ? '🏆 New High Score!' : `Best: ${highScore}`;
  deathScreen.style.display = '';
}

// Input
let pointerDown = false;
let pointerX = W / 2;

function onPointerMove(e) {
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  pointerX = clientX;
  if (playing) drop.targetX = clientX;
}

function onPointerDown(e) {
  pointerDown = true;
  onPointerMove(e);
}

function onPointerUp() { pointerDown = false; }

canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e); }, { passive: false });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerDown(e); }, { passive: false });
canvas.addEventListener('touchend', onPointerUp);

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Collision
function circleCircle(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < a.radius + b.radius;
}

function circleRect(circle, rx, ry, rw, rh) {
  const cx = Math.max(rx, Math.min(circle.x, rx + rw));
  const cy = Math.max(ry, Math.min(circle.y, ry + rh));
  const dx = circle.x - cx, dy = circle.y - cy;
  return (dx * dx + dy * dy) < (circle.radius * circle.radius);
}

function update() {
  if (!playing) return;
  frameCount++;

  // Increase difficulty
  speed = 2 + frameCount * 0.001;
  if (speed > 8) speed = 8;

  // Move drop toward target
  const dx = drop.targetX - drop.x;
  drop.vx += dx * 0.08;
  drop.vx *= 0.88;
  drop.x += drop.vx;

  // Clamp
  if (drop.x < drop.radius) drop.x = drop.radius;
  if (drop.x > W - drop.radius) drop.x = W - drop.radius;

  // Trail
  drop.trail.unshift({ x: drop.x, y: drop.y, alpha: 1 });
  if (drop.trail.length > 30) drop.trail.pop();
  drop.trail.forEach(t => t.alpha *= 0.92);

  // Hue shift
  drop.hue = (drop.hue + 0.3) % 360;
  drop.color = `hsl(${drop.hue}, 80%, 65%)`;

  // Spawn
  if (frameCount % Math.max(20, 50 - Math.floor(speed * 3)) === 0) spawnOrb();
  if (frameCount % Math.max(35, 80 - Math.floor(speed * 4)) === 0) spawnObstacle();

  // Palette switch every 500 frames
  if (frameCount % 500 === 0) nextPalette();

  // Move orbs
  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i];
    o.y += speed;
    o.pulse += 0.08;
    o.glow = Math.sin(o.pulse) * 0.3 + 0.7;
    if (o.y > H + 40) { orbs.splice(i, 1); combo = 0; continue; }

    if (circleCircle(drop, o)) {
      score += 10 + combo * 5;
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      burstAt(o.x, o.y, o.color, 12);
      addInkSplat(o.x, o.y, o.color, o.radius * 2.5);
      scoreDisplay.textContent = score;
      if (combo > 1) {
        comboDisplay.textContent = `${combo}x combo!`;
        comboDisplay.style.opacity = '1';
        comboDisplay.style.color = o.color;
      }
      orbs.splice(i, 1);
    }
  }

  // Move obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.y += speed;
    if (ob.y > H + 40) { obstacles.splice(i, 1); continue; }

    let hit = false;
    if (ob.type === 'circle') {
      hit = circleCircle(drop, ob);
    } else {
      hit = circleRect(drop, ob.x, ob.y, ob.w, ob.h);
    }
    if (hit) {
      burstAt(drop.x, drop.y, '#ff1744', 25);
      addInkSplat(drop.x, drop.y, '#ff1744', 40);
      endGame();
      return;
    }
  }

  // Bg particles
  bgParticles.forEach(p => {
    p.y += p.speed + speed * 0.2;
    if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
  });

  // Burst particles
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    p.alpha = p.life;
    if (p.life <= 0) burstParticles.splice(i, 1);
  }

  // Fade combo display
  if (combo === 0) comboDisplay.style.opacity = '0';
}

function drawInkBackground() {
  // Persistent ink splats
  inkSplats.forEach(s => {
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius);
    g.addColorStop(0, s.color + Math.floor(s.alpha * 255).toString(16).padStart(2, '0'));
    g.addColorStop(1, s.color + '00');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.fill();
  });
}

function draw() {
  // Dark background with slight fade (creates trail effect)
  ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
  ctx.fillRect(0, 0, W, H);

  drawInkBackground();

  // Bg particles
  bgParticles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = `hsl(${p.hue}, 60%, 70%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (!playing && startScreen.style.display !== 'none') return;

  // Orbs
  orbs.forEach(o => {
    // Glow
    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.radius * 2.5);
    g.addColorStop(0, o.color + '80');
    g.addColorStop(1, o.color + '00');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.radius * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = o.color;
    ctx.shadowColor = o.color;
    ctx.shadowBlur = 20 * o.glow;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Obstacles
  obstacles.forEach(ob => {
    ctx.fillStyle = '#1a1a2e';
    ctx.strokeStyle = '#ff1744';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ff1744';
    ctx.shadowBlur = 12;
    if (ob.type === 'circle') {
      ctx.beginPath();
      ctx.arc(ob.x, ob.y, ob.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.roundRect(ob.x, ob.y, ob.w, ob.h, 3);
      ctx.fill();
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  });

  // Drop trail
  drop.trail.forEach((t, i) => {
    const a = t.alpha * 0.4;
    const r = drop.radius * (1 - i / drop.trail.length) * 0.8;
    ctx.globalAlpha = a;
    ctx.fillStyle = drop.color;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Drop
  const dg = ctx.createRadialGradient(drop.x, drop.y, 0, drop.x, drop.y, drop.radius * 3);
  dg.addColorStop(0, drop.color + '60');
  dg.addColorStop(1, drop.color + '00');
  ctx.fillStyle = dg;
  ctx.beginPath();
  ctx.arc(drop.x, drop.y, drop.radius * 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.shadowColor = drop.color;
  ctx.shadowBlur = 25;
  ctx.beginPath();
  ctx.arc(drop.x, drop.y, drop.radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = drop.color;
  ctx.beginPath();
  ctx.arc(drop.x, drop.y, drop.radius * 0.7, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Burst particles
  burstParticles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Initial clear
ctx.fillStyle = '#0a0a1a';
ctx.fillRect(0, 0, W, H);
initBgParticles();
loop();
</script>
</body>
</html>
