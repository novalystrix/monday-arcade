<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Singularity — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020208;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff; overflow: hidden;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
.back-link {
  position: fixed; top: 12px; left: 16px;
  color: #4040aa; text-decoration: none; font-size: 13px; z-index: 100;
}
.back-link:hover { color: #6c5ce7; }
#header {
  text-align: center; margin-bottom: 4px;
  font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #333355;
}
#header h1 {
  font-size: 1.6rem; letter-spacing: 0.2em;
  background: linear-gradient(90deg, #6c5ce7, #a855f7, #ec4899, #f59e0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
canvas { display: block; border-radius: 8px; cursor: none; }
#hud {
  position: fixed; top: 12px; right: 16px;
  font-size: 13px; color: #666688; text-align: right; z-index: 100;
  line-height: 1.6;
}
#hud .val { color: #a78bfa; font-weight: bold; }
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; pointer-events: auto;
}
#overlay .title {
  font-size: 3rem; font-weight: 900; letter-spacing: 0.25em;
  background: linear-gradient(135deg, #6c5ce7, #a855f7, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 12px;
}
#overlay .sub {
  font-size: 0.95rem; color: #555577; margin-bottom: 30px; letter-spacing: 0.1em;
}
#overlay .prompt {
  font-size: 0.8rem; color: #4a4a6a; letter-spacing: 0.15em;
  animation: pulse 2s ease-in-out infinite;
}
#overlay .stats {
  margin-bottom: 20px; font-size: 0.85rem; color: #666688; line-height: 1.8;
}
#overlay .stats .val { color: #a78bfa; font-weight: bold; }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.hidden { display: none !important; }
</style>
</head>
<body>
<a href="/" class="back-link">← Arcade</a>
<div id="header"><h1>SINGULARITY</h1></div>
<canvas id="c"></canvas>
<div id="hud">
  MASS <span class="val" id="hud-mass">0</span><br>
  ABSORBED <span class="val" id="hud-absorbed">0</span><br>
  TIME <span class="val" id="hud-time">0:00</span><br>
  COLOR <span class="val" id="hud-color">●</span>
</div>
<div id="overlay">
  <div class="title">SINGULARITY</div>
  <div class="sub">ABSORB · GROW · CONSUME</div>
  <div class="stats hidden" id="end-stats"></div>
  <div class="prompt" id="overlay-prompt">CLICK OR TAP TO COLLAPSE</div>
</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const C = $('c'), ctx = C.getContext('2d');
const HUD = { mass: $('hud-mass'), absorbed: $('hud-absorbed'), time: $('hud-time'), color: $('hud-color') };
const overlay = $('overlay'), endStats = $('end-stats'), overlayPrompt = $('overlay-prompt');

// ── Config ──
const CFG = {
  particleCount: 180,
  antimatterCount: 12,
  starCount: 120,
  colorCycleMs: 8000,
  baseRadius: 14,
  growthPerAbsorb: 0.45,
  maxRadius: 120,
  holeSpeed: 4.5,
  particleSpeed: 1.2,
  antimatterSpeed: 1.8,
  gravitationalPull: 0.6,
  lensDistortion: 0.35,
  trailLength: 18,
  spawnRate: 0.04,
  antimatterSpawnRate: 0.006,
  comboWindow: 800,
  colors: ['#6c5ce7','#a855f7','#ec4899','#f59e0b','#22c55e','#3b82f6'],
  antimatterColor: '#ef4444',
};

// ── State ──
let W, H, playing = false, gameOver = false;
let hole, particles, antimatter, stars, trail;
let mass, absorbed, startTime, colorIdx, lastColorChange;
let combo, lastAbsorbTime, maxCombo;
let shockwaves, screenShake;
let mouseX, mouseY, touching = false;

function resize() {
  W = C.width = Math.min(window.innerWidth, 900);
  H = C.height = Math.min(window.innerHeight - 60, 700);
}
window.addEventListener('resize', resize);
resize();

// ── Helpers ──
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function rng(min, max) { return min + Math.random() * (max - min); }
function randEdge() {
  const side = Math.random() * 4 | 0;
  if (side === 0) return { x: rng(0, W), y: -20 };
  if (side === 1) return { x: W + 20, y: rng(0, H) };
  if (side === 2) return { x: rng(0, W), y: H + 20 };
  return { x: -20, y: rng(0, H) };
}
function lerpColor(a, b, t) {
  const p = (c) => parseInt(c, 16);
  const h = (n) => n.toString(16).padStart(2,'0');
  const ra=p(a.slice(1,3)),ga=p(a.slice(3,5)),ba=p(a.slice(5,7));
  const rb=p(b.slice(1,3)),gb=p(b.slice(3,5)),bb=p(b.slice(5,7));
  return '#'+h(Math.round(ra+(rb-ra)*t))+h(Math.round(ga+(gb-ga)*t))+h(Math.round(ba+(bb-ba)*t));
}
function currentColor(t) {
  const elapsed = (t - lastColorChange) % CFG.colorCycleMs;
  const progress = elapsed / CFG.colorCycleMs;
  const nextIdx = (colorIdx + 1) % CFG.colors.length;
  if (progress > 0.85) {
    colorIdx = nextIdx;
    lastColorChange = t;
    return CFG.colors[colorIdx];
  }
  return lerpColor(CFG.colors[colorIdx], CFG.colors[nextIdx], progress);
}

// ── Entity factories ──
function makeParticle(forceColor) {
  const pos = randEdge();
  const angle = Math.atan2(H/2 - pos.y, W/2 - pos.x) + rng(-0.8, 0.8);
  const ci = forceColor !== undefined ? forceColor : (Math.random() < 0.65 ? colorIdx : (Math.random() * CFG.colors.length | 0));
  return {
    x: pos.x, y: pos.y,
    vx: Math.cos(angle) * CFG.particleSpeed * rng(0.5, 1.5),
    vy: Math.sin(angle) * CFG.particleSpeed * rng(0.5, 1.5),
    r: rng(3, 7),
    colorIdx: ci,
    alpha: 1,
    pulse: rng(0, Math.PI * 2),
  };
}
function makeAntimatter() {
  const pos = randEdge();
  const angle = Math.atan2(hole.y - pos.y, hole.x - pos.x) + rng(-0.3, 0.3);
  return {
    x: pos.x, y: pos.y,
    vx: Math.cos(angle) * CFG.antimatterSpeed * rng(0.8, 1.4),
    vy: Math.sin(angle) * CFG.antimatterSpeed * rng(0.8, 1.4),
    r: rng(5, 10),
    alpha: 1,
    spin: 0,
  };
}
function makeStar() {
  return { x: rng(0, W), y: rng(0, H), r: rng(0.3, 1.5), twinkle: rng(0, Math.PI*2), speed: rng(0.01, 0.04) };
}

// ── Init ──
function init() {
  hole = { x: W/2, y: H/2, r: CFG.baseRadius };
  mouseX = W/2; mouseY = H/2;
  particles = Array.from({length: CFG.particleCount}, () => makeParticle());
  antimatter = Array.from({length: CFG.antimatterCount}, () => makeAntimatter());
  stars = Array.from({length: CFG.starCount}, () => makeStar());
  trail = [];
  mass = 0; absorbed = 0;
  colorIdx = 0; lastColorChange = performance.now();
  combo = 0; lastAbsorbTime = 0; maxCombo = 0;
  shockwaves = [];
  screenShake = { x: 0, y: 0, decay: 0 };
  startTime = performance.now();
}

// ── Drawing ──
function drawStars(t) {
  stars.forEach(s => {
    const a = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkle + t * s.speed));
    // Gravitational lensing — warp star positions near the hole
    const dx = s.x - hole.x, dy = s.y - hole.y;
    const d = Math.hypot(dx, dy);
    const lensR = hole.r * 5;
    let sx = s.x, sy = s.y;
    if (d < lensR && d > hole.r) {
      const strength = CFG.lensDistortion * (1 - d / lensR) * (hole.r / CFG.baseRadius);
      const angle = Math.atan2(dy, dx) + Math.PI / 2;
      sx += Math.cos(angle) * strength * 30;
      sy += Math.sin(angle) * strength * 30;
    }
    ctx.fillStyle = `rgba(200,200,255,${a})`;
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawHole(t) {
  const r = hole.r;
  // Event horizon glow rings
  for (let i = 5; i >= 0; i--) {
    const ringR = r + i * 8 + Math.sin(t * 0.003 + i) * 3;
    const a = 0.06 - i * 0.008;
    const col = currentColor(t);
    ctx.strokeStyle = col.replace(')', `,${a})`).replace('rgb', 'rgba').replace('#', '');
    // Hex to rgba for glow
    const hr = parseInt(col.slice(1,3),16), hg = parseInt(col.slice(3,5),16), hb = parseInt(col.slice(5,7),16);
    ctx.strokeStyle = `rgba(${hr},${hg},${hb},${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, ringR, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Accretion disk
  const grad = ctx.createRadialGradient(hole.x, hole.y, r * 0.3, hole.x, hole.y, r * 3);
  const col = currentColor(t);
  const hr = parseInt(col.slice(1,3),16), hg = parseInt(col.slice(3,5),16), hb = parseInt(col.slice(5,7),16);
  grad.addColorStop(0, `rgba(${hr},${hg},${hb},0.15)`);
  grad.addColorStop(0.5, `rgba(${hr},${hg},${hb},0.05)`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(hole.x, hole.y, r * 3, 0, Math.PI * 2);
  ctx.fill();

  // Spinning accretion ring
  ctx.save();
  ctx.translate(hole.x, hole.y);
  ctx.rotate(t * 0.001);
  ctx.strokeStyle = `rgba(${hr},${hg},${hb},0.25)`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 2.2, r * 0.8, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // Core — pure black
  const coreGrad = ctx.createRadialGradient(hole.x, hole.y, 0, hole.x, hole.y, r);
  coreGrad.addColorStop(0, '#000000');
  coreGrad.addColorStop(0.7, '#000000');
  coreGrad.addColorStop(1, `rgba(${hr},${hg},${hb},0.3)`);
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(hole.x, hole.y, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawTrail() {
  for (let i = 0; i < trail.length; i++) {
    const p = trail[i];
    const a = (i / trail.length) * 0.3;
    ctx.fillStyle = `rgba(108,92,231,${a})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, hole.r * (i / trail.length) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles(t) {
  particles.forEach(p => {
    const col = CFG.colors[p.colorIdx];
    const hr = parseInt(col.slice(1,3),16), hg = parseInt(col.slice(3,5),16), hb = parseInt(col.slice(5,7),16);
    const pulse = 0.6 + 0.4 * Math.sin(p.pulse + t * 0.005);

    // Glow
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
    glow.addColorStop(0, `rgba(${hr},${hg},${hb},${0.3 * p.alpha * pulse})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = `rgba(${hr},${hg},${hb},${p.alpha * pulse})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawAntimatter(t) {
  antimatter.forEach(a => {
    a.spin += 0.08;
    const pulse = 0.7 + 0.3 * Math.sin(t * 0.008 + a.spin);
    // Warning glow
    const glow = ctx.createRadialGradient(a.x, a.y, 0, a.x, a.y, a.r * 4);
    glow.addColorStop(0, `rgba(239,68,68,${0.3 * a.alpha * pulse})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.r * 4, 0, Math.PI * 2);
    ctx.fill();

    // X shape
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.spin);
    ctx.strokeStyle = `rgba(239,68,68,${a.alpha * pulse})`;
    ctx.lineWidth = 2.5;
    const s = a.r;
    ctx.beginPath(); ctx.moveTo(-s, -s); ctx.lineTo(s, s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s, -s); ctx.lineTo(-s, s); ctx.stroke();
    // diamond outline
    ctx.strokeStyle = `rgba(239,68,68,${a.alpha * 0.5})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -s*1.2); ctx.lineTo(s*1.2, 0); ctx.lineTo(0, s*1.2); ctx.lineTo(-s*1.2, 0); ctx.closePath();
    ctx.stroke();
    ctx.restore();
  });
}

function drawShockwaves(t) {
  shockwaves = shockwaves.filter(s => s.alpha > 0.01);
  shockwaves.forEach(s => {
    s.r += 5;
    s.alpha *= 0.92;
    const hr = parseInt(s.color.slice(1,3),16), hg = parseInt(s.color.slice(3,5),16), hb = parseInt(s.color.slice(5,7),16);
    ctx.strokeStyle = `rgba(${hr},${hg},${hb},${s.alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.stroke();
  });
}

function drawCombo() {
  if (combo > 1) {
    ctx.save();
    ctx.font = `bold ${14 + combo * 2}px 'Courier New', monospace`;
    ctx.fillStyle = `rgba(168,139,250,${Math.min(1, 0.3 + combo * 0.15)})`;
    ctx.textAlign = 'center';
    ctx.fillText(`${combo}x COMBO`, hole.x, hole.y - hole.r - 20);
    ctx.restore();
  }
}

// ── Update ──
function update(t, dt) {
  const dtS = dt / 16.67; // normalize to ~60fps

  // Move hole toward mouse/touch
  const dx = mouseX - hole.x, dy = mouseY - hole.y;
  const d = Math.hypot(dx, dy);
  if (d > 2) {
    const speed = CFG.holeSpeed * dtS;
    hole.x += (dx / d) * Math.min(speed, d);
    hole.y += (dy / d) * Math.min(speed, d);
  }

  // Trail
  trail.push({ x: hole.x, y: hole.y });
  if (trail.length > CFG.trailLength) trail.shift();

  // Color cycle
  currentColor(t);

  // Update combo
  if (t - lastAbsorbTime > CFG.comboWindow) combo = 0;

  // Spawn particles
  if (Math.random() < CFG.spawnRate * dtS) particles.push(makeParticle());
  if (Math.random() < CFG.antimatterSpawnRate * dtS) antimatter.push(makeAntimatter());

  // Particles — gravity + absorb
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    // Gravitational pull toward hole
    const pdx = hole.x - p.x, pdy = hole.y - p.y;
    const pd = Math.hypot(pdx, pdy);
    if (pd < hole.r * 6 && pd > 0) {
      const pull = CFG.gravitationalPull * (hole.r / CFG.baseRadius) / (pd * 0.1) * dtS;
      p.vx += (pdx / pd) * pull;
      p.vy += (pdy / pd) * pull;
    }
    p.x += p.vx * dtS;
    p.y += p.vy * dtS;

    // Absorb check
    if (pd < hole.r + p.r) {
      if (p.colorIdx === colorIdx) {
        // Matching color — absorb!
        mass += 1;
        absorbed += 1;
        hole.r = Math.min(CFG.maxRadius, CFG.baseRadius + mass * CFG.growthPerAbsorb);
        combo++;
        lastAbsorbTime = t;
        if (combo > maxCombo) maxCombo = combo;

        // Combo bonus
        if (combo >= 5) {
          shockwaves.push({ x: hole.x, y: hole.y, r: hole.r, alpha: 0.8, color: CFG.colors[colorIdx] });
        }

        particles.splice(i, 1);
      } else {
        // Wrong color — shrink!
        mass = Math.max(0, mass - 0.5);
        hole.r = Math.max(CFG.baseRadius, CFG.baseRadius + mass * CFG.growthPerAbsorb);
        combo = 0;
        screenShake.decay = 6;
        particles.splice(i, 1);
      }
      continue;
    }

    // Out of bounds
    if (p.x < -60 || p.x > W + 60 || p.y < -60 || p.y > H + 60) {
      particles.splice(i, 1);
    }
  }

  // Antimatter
  for (let i = antimatter.length - 1; i >= 0; i--) {
    const a = antimatter[i];
    // Slight homing
    const adx = hole.x - a.x, ady = hole.y - a.y;
    const ad = Math.hypot(adx, ady);
    if (ad > 0) {
      a.vx += (adx / ad) * 0.02 * dtS;
      a.vy += (ady / ad) * 0.02 * dtS;
    }
    a.x += a.vx * dtS;
    a.y += a.vy * dtS;

    // Collision
    if (ad < hole.r + a.r) {
      // Hit! Lose significant mass or game over
      mass -= 5;
      if (mass <= -3) {
        endGame(t);
        return;
      }
      hole.r = Math.max(CFG.baseRadius * 0.7, CFG.baseRadius + mass * CFG.growthPerAbsorb);
      combo = 0;
      screenShake.decay = 15;
      shockwaves.push({ x: a.x, y: a.y, r: 5, alpha: 1, color: CFG.antimatterColor });
      antimatter.splice(i, 1);
      continue;
    }

    if (a.x < -80 || a.x > W + 80 || a.y < -80 || a.y > H + 80) {
      antimatter.splice(i, 1);
    }
  }

  // Screen shake decay
  if (screenShake.decay > 0) {
    screenShake.x = (Math.random() - 0.5) * screenShake.decay;
    screenShake.y = (Math.random() - 0.5) * screenShake.decay;
    screenShake.decay *= 0.85;
    if (screenShake.decay < 0.3) screenShake.decay = 0;
  } else {
    screenShake.x = 0; screenShake.y = 0;
  }

  // HUD
  HUD.mass.textContent = mass.toFixed(0);
  HUD.absorbed.textContent = absorbed;
  const elapsed = ((t - startTime) / 1000) | 0;
  HUD.time.textContent = `${(elapsed / 60 | 0)}:${(elapsed % 60).toString().padStart(2,'0')}`;
  const cc = CFG.colors[colorIdx];
  HUD.color.style.color = cc;
  HUD.color.textContent = '●';
}

function endGame(t) {
  playing = false; gameOver = true;
  const elapsed = ((t - startTime) / 1000) | 0;
  const mins = (elapsed / 60 | 0);
  const secs = (elapsed % 60).toString().padStart(2,'0');
  endStats.innerHTML = `
    MASS REACHED <span class="val">${Math.max(0, mass).toFixed(0)}</span><br>
    PARTICLES ABSORBED <span class="val">${absorbed}</span><br>
    MAX COMBO <span class="val">${maxCombo}x</span><br>
    SURVIVED <span class="val">${mins}:${secs}</span>
  `;
  endStats.classList.remove('hidden');
  overlayPrompt.textContent = 'CLICK OR TAP TO REFORM';
  overlay.classList.remove('hidden');
}

// ── Game loop ──
let lastT = 0;
function loop(t) {
  const dt = Math.min(t - lastT, 50); // cap delta
  lastT = t;

  ctx.clearRect(0, 0, W, H);

  if (playing) {
    ctx.save();
    ctx.translate(screenShake.x, screenShake.y);
    update(t, dt);
    drawStars(t);
    drawTrail();
    drawParticles(t);
    drawAntimatter(t);
    drawShockwaves(t);
    drawHole(t);
    drawCombo();
    ctx.restore();
  } else {
    // Attract screen — ambient particles
    drawStars(t);
    if (particles && particles.length > 0) {
      particles.forEach(p => {
        p.x += p.vx * 0.3;
        p.y += p.vy * 0.3;
        p.pulse += 0.02;
      });
      drawParticles(t);
    }
  }

  requestAnimationFrame(loop);
}

// ── Input ──
function onMove(x, y) {
  const rect = C.getBoundingClientRect();
  mouseX = x - rect.left;
  mouseY = y - rect.top;
}
C.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
C.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
C.addEventListener('touchstart', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

function startGame() {
  init();
  playing = true; gameOver = false;
  overlay.classList.add('hidden');
  endStats.classList.add('hidden');
}

overlay.addEventListener('click', startGame);
overlay.addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, { passive: false });

// Boot
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
