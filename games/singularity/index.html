<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Singularity</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
  }
  canvas { display: block; }
  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    color: #8040ff;
    text-decoration: none;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 1px;
    z-index: 100;
    text-shadow: 0 0 8px #8040ff;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.7; }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 50;
    gap: 20px;
  }
  #overlay h1 {
    font-size: clamp(32px, 6vw, 64px);
    letter-spacing: 8px;
    color: #8040ff;
    text-shadow: 0 0 30px #8040ff, 0 0 60px #8040ff88;
    animation: pulse 2s ease-in-out infinite;
  }
  #overlay .subtitle {
    font-size: clamp(12px, 2vw, 16px);
    color: #aaa;
    letter-spacing: 3px;
    text-align: center;
    max-width: 400px;
    line-height: 1.8;
  }
  #overlay .start-btn, #overlay .play-again-btn {
    margin-top: 16px;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid #8040ff;
    color: #8040ff;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
    text-shadow: 0 0 8px #8040ff;
    box-shadow: 0 0 20px #8040ff44;
    transition: all 0.2s;
  }
  #overlay .start-btn:hover, #overlay .play-again-btn:hover {
    background: #8040ff22;
    box-shadow: 0 0 40px #8040ff88;
  }
  .stat-row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat-box {
    text-align: center;
    border: 1px solid #8040ff44;
    padding: 12px 20px;
    min-width: 100px;
  }
  .stat-label { font-size: 10px; color: #666; letter-spacing: 2px; margin-bottom: 4px; }
  .stat-value { font-size: 24px; color: #8040ff; text-shadow: 0 0 10px #8040ff; }
  #hud {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    text-align: right;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    pointer-events: none;
  }
  .hud-line { margin-bottom: 4px; color: #aaa; }
  .hud-line span { color: #8040ff; text-shadow: 0 0 8px #8040ff; font-size: 16px; }
  .combo-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 99;
    font-size: 32px;
    font-family: 'Courier New', monospace;
    color: #ffcc44;
    text-shadow: 0 0 20px #ffcc44;
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 4px;
  }
  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 30px #8040ff, 0 0 60px #8040ff88; }
    50% { text-shadow: 0 0 50px #8040ff, 0 0 100px #8040ffaa, 0 0 20px #fff; }
  }
</style>
</head>
<body>
<a href="/" class="back-link">← Arcade</a>

<div id="hud">
  <div class="hud-line">MASS <span id="hud-mass">0</span></div>
  <div class="hud-line">COMBO <span id="hud-combo">x1</span></div>
  <div class="hud-line">TIME <span id="hud-time">2:00</span></div>
  <div class="hud-line" style="font-size:10px;color:#555;">HI <span id="hud-hi" style="color:#8040ff88;font-size:12px;">0</span></div>
</div>

<div id="combo-display" class="combo-display"></div>

<div id="overlay">
  <h1>SINGULARITY</h1>
  <p class="subtitle">Become a black hole.<br>Consume the cosmos.<br>Grow without limit.</p>
  <button class="start-btn" id="start-btn">[ CLICK TO BEGIN ]</button>
</div>

<canvas id="canvas"></canvas>

<script>
(function() {
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────
const GAME_DURATION = 120; // seconds
const BH_START_RADIUS = 15;
const BH_MASS_RADIUS = (m) => BH_START_RADIUS + 8 * Math.log(m + 1);
const BH_PULL_RADIUS = (r) => r * 3;
const MAX_PARTICLES = 300;
const OBJECT_TYPES = [
  { type: 'asteroid',   mass: 1,  baseRadius: 3,  color: '#cccccc', glow: '#aaaaaa' },
  { type: 'asteroid',   mass: 1,  baseRadius: 4,  color: '#dddddd', glow: '#bbbbbb' },
  { type: 'smallstar',  mass: 3,  baseRadius: 7,  color: '#ffdd44', glow: '#ffaa00' },
  { type: 'smallstar',  mass: 3,  baseRadius: 8,  color: '#ff9944', glow: '#ff6600' },
  { type: 'planet',     mass: 5,  baseRadius: 13, color: '#44aaff', glow: '#0066ff' },
  { type: 'planet',     mass: 5,  baseRadius: 14, color: '#44ffaa', glow: '#00cc88' },
  { type: 'planet',     mass: 5,  baseRadius: 12, color: '#ff6644', glow: '#ff3300' },
  { type: 'largestar',  mass: 10, baseRadius: 20, color: '#ffffaa', glow: '#ffff00' },
  { type: 'largestar',  mass: 10, baseRadius: 22, color: '#ff8844', glow: '#ff4400' },
];

// ─── State ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let gameState = 'idle'; // idle | playing | over
let bhX, bhY, bhTargetX, bhTargetY, bhMass, bhRadius, bhPullRadius;
let objects = [];
let particles = [];
let accretionParticles = [];
let bgStars = [];
let score, objectsConsumed, comboCount, comboTimer, maxCombo;
let timeLeft, lastTimestamp, spawnTimer, spawnInterval;
let shakeX = 0, shakeY = 0, shakeDuration = 0;
let supernovaProgress = 0, supernovaActive = false;
let mouseX, mouseY;
let highScore = parseInt(localStorage.getItem('singularity_hi') || '0');
let frameCount = 0;

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (gameState === 'idle' || gameState === 'over') return;
  // keep BH in bounds
  if (bhX > W) bhX = W / 2;
  if (bhY > H) bhY = H / 2;
}
window.addEventListener('resize', resize);

// ─── Background Stars ─────────────────────────────────────────────────────────
function initBgStars() {
  bgStars = [];
  for (let layer = 0; layer < 3; layer++) {
    const count = layer === 0 ? 200 : layer === 1 ? 100 : 50;
    const speed = layer === 0 ? 0.02 : layer === 1 ? 0.05 : 0.1;
    const size = layer === 0 ? 0.8 : layer === 1 ? 1.2 : 2;
    for (let i = 0; i < count; i++) {
      bgStars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        ox: Math.random() * W,
        oy: Math.random() * H,
        layer, speed, size,
        brightness: 0.3 + Math.random() * 0.7
      });
    }
  }
}

function drawBgStars() {
  const cx = mouseX || W / 2;
  const cy = mouseY || H / 2;
  const dx = (cx - W / 2) / W;
  const dy = (cy - H / 2) / H;
  for (const s of bgStars) {
    const px = (s.ox + dx * s.speed * 120 + W) % W;
    const py = (s.oy + dy * s.speed * 120 + H) % H;
    s.x = px; s.y = py;
    const alpha = s.brightness * (0.5 + 0.5 * Math.sin(frameCount * 0.01 + s.ox));
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── Object Spawning ──────────────────────────────────────────────────────────
function spawnObject() {
  const elapsed = GAME_DURATION - timeLeft;
  // Weight toward bigger objects as time passes
  const bigChance = Math.min(elapsed / 80, 0.5);
  let pool;
  if (Math.random() < bigChance) {
    pool = OBJECT_TYPES.filter(t => t.mass >= 5);
  } else if (Math.random() < 0.4) {
    pool = OBJECT_TYPES.filter(t => t.mass === 1);
  } else {
    pool = OBJECT_TYPES;
  }
  const template = pool[Math.floor(Math.random() * pool.length)];

  // Spawn at edge
  let x, y, vx, vy;
  const edge = Math.floor(Math.random() * 4);
  const baseSpeed = 0.3 + Math.random() * 0.5;
  if (edge === 0) { x = Math.random() * W; y = -30; vx = (Math.random()-0.5)*0.4; vy = baseSpeed; }
  else if (edge === 1) { x = W+30; y = Math.random() * H; vx = -baseSpeed; vy = (Math.random()-0.5)*0.4; }
  else if (edge === 2) { x = Math.random() * W; y = H+30; vx = (Math.random()-0.5)*0.4; vy = -baseSpeed; }
  else { x = -30; y = Math.random() * H; vx = baseSpeed; vy = (Math.random()-0.5)*0.4; }

  objects.push({
    x, y, vx, vy,
    type: template.type,
    mass: template.mass,
    radius: template.baseRadius + Math.random() * 3,
    color: template.color,
    glow: template.glow,
    phase: Math.random() * Math.PI * 2,
    rotation: Math.random() * Math.PI * 2,
    alive: true
  });
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnConsumptionParticles(x, y, color, glow, count) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.015 + Math.random() * 0.02,
      radius: 1 + Math.random() * 3,
      color, glow,
      spiraling: true,
      targetX: bhX, targetY: bhY
    });
  }
}

function initAccretionDisk() {
  accretionParticles = [];
  for (let i = 0; i < 80; i++) {
    const angle = (i / 80) * Math.PI * 2;
    const radiusFactor = 1.5 + Math.random() * 0.8;
    accretionParticles.push({
      angle,
      radiusFactor,
      speed: 0.02 + Math.random() * 0.015,
      size: 1 + Math.random() * 2,
      brightness: 0.4 + Math.random() * 0.6
    });
  }
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawBlackHole() {
  const r = bhRadius;
  const pr = bhPullRadius;

  // Lensing distortion ring (subtle gradient ring)
  const lensOuter = r * 2.5;
  const lensGrad = ctx.createRadialGradient(bhX, bhY, r * 0.9, bhX, bhY, lensOuter);
  lensGrad.addColorStop(0, 'rgba(0,0,0,0)');
  lensGrad.addColorStop(0.3, 'rgba(80,0,180,0.04)');
  lensGrad.addColorStop(0.7, 'rgba(80,0,180,0.08)');
  lensGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(bhX, bhY, lensOuter, 0, Math.PI * 2);
  ctx.fillStyle = lensGrad;
  ctx.fill();

  // Outer glow
  ctx.save();
  ctx.shadowBlur = 40;
  ctx.shadowColor = '#8040ff';
  const outerGrad = ctx.createRadialGradient(bhX, bhY, r * 0.8, bhX, bhY, r * 1.6);
  outerGrad.addColorStop(0, 'rgba(128,64,255,0.6)');
  outerGrad.addColorStop(0.5, 'rgba(80,0,180,0.3)');
  outerGrad.addColorStop(1, 'rgba(0,0,80,0)');
  ctx.beginPath();
  ctx.arc(bhX, bhY, r * 1.6, 0, Math.PI * 2);
  ctx.fillStyle = outerGrad;
  ctx.fill();
  ctx.restore();

  // Accretion disk
  for (const p of accretionParticles) {
    p.angle += p.speed;
    const diskR = (r + 8) * p.radiusFactor;
    const px = bhX + Math.cos(p.angle) * diskR;
    const py = bhY + Math.sin(p.angle) * diskR * 0.35; // flatten ellipse
    const t = (p.angle % (Math.PI * 2)) / (Math.PI * 2);
    // Color: inner hot white → orange → fade out
    const hue = t < 0.5 ? `rgba(255,${180+75*t},${50*(1-t)},${p.brightness})` : `rgba(255,${180-(t-0.5)*180},0,${p.brightness*(1-(t-0.5)*0.5)})`;
    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#ffaa44';
    ctx.fillStyle = hue;
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Event horizon — black circle with purple/blue edge
  ctx.save();
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#6020cc';
  const grad = ctx.createRadialGradient(bhX, bhY, r * 0.3, bhX, bhY, r);
  grad.addColorStop(0, '#000000');
  grad.addColorStop(0.7, '#0a0010');
  grad.addColorStop(0.9, '#1a0040');
  grad.addColorStop(1, '#4010aa');
  ctx.beginPath();
  ctx.arc(bhX, bhY, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();

  // Gravitational pull radius indicator (subtle)
  if (bhMass > 0) {
    ctx.save();
    ctx.strokeStyle = 'rgba(128,64,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.arc(bhX, bhY, pr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

function drawObject(obj) {
  const t = frameCount * 0.02 + obj.phase;
  const pulse = 1 + 0.08 * Math.sin(t);

  ctx.save();
  ctx.shadowBlur = 12 + 4 * Math.sin(t);
  ctx.shadowColor = obj.glow;

  if (obj.type === 'planet') {
    // Planet with atmosphere ring
    ctx.save();
    ctx.translate(obj.x, obj.y);
    ctx.rotate(obj.rotation);
    obj.rotation += 0.005;
    const grad = ctx.createRadialGradient(-obj.radius * 0.3, -obj.radius * 0.3, 0, 0, 0, obj.radius);
    grad.addColorStop(0, lightenColor(obj.color, 0.5));
    grad.addColorStop(0.7, obj.color);
    grad.addColorStop(1, darkenColor(obj.color, 0.5));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, obj.radius, 0, Math.PI * 2);
    ctx.fill();
    // Atmosphere ring
    ctx.strokeStyle = obj.glow + '66';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, obj.radius * 1.5, obj.radius * 0.35, 0.4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  } else if (obj.type === 'largestar') {
    // Pulsing large star with corona
    const r = obj.radius * pulse;
    const coronaGrad = ctx.createRadialGradient(obj.x, obj.y, r * 0.6, obj.x, obj.y, r * 2);
    coronaGrad.addColorStop(0, obj.glow + 'ff');
    coronaGrad.addColorStop(0.5, obj.glow + '44');
    coronaGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = coronaGrad;
    ctx.beginPath();
    ctx.arc(obj.x, obj.y, r * 2, 0, Math.PI * 2);
    ctx.fill();
    const starGrad = ctx.createRadialGradient(obj.x - r * 0.2, obj.y - r * 0.2, 0, obj.x, obj.y, r);
    starGrad.addColorStop(0, '#ffffff');
    starGrad.addColorStop(0.4, lightenColor(obj.color, 0.4));
    starGrad.addColorStop(1, obj.color);
    ctx.fillStyle = starGrad;
    ctx.beginPath();
    ctx.arc(obj.x, obj.y, r, 0, Math.PI * 2);
    ctx.fill();
  } else if (obj.type === 'smallstar') {
    const r = obj.radius * (1 + 0.1 * Math.sin(t));
    const grad = ctx.createRadialGradient(obj.x, obj.y, 0, obj.x, obj.y, r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, obj.color);
    grad.addColorStop(1, obj.glow);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(obj.x, obj.y, r, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Asteroid
    ctx.fillStyle = obj.color;
    ctx.beginPath();
    ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    if (p.spiraling) {
      const dx = p.targetX - p.x;
      const dy = p.targetY - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 5) { particles.splice(i, 1); continue; }
      const pull = 0.1 + (1 - p.life) * 0.3;
      p.vx += (dx / dist) * pull;
      p.vy += (dy / dist) * pull;
      p.vx *= 0.95; p.vy *= 0.95;
    }
    p.x += p.vx;
    p.y += p.vy;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.glow;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Color Helpers ────────────────────────────────────────────────────────────
function lightenColor(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+255*amt|0)},${Math.min(255,g+255*amt|0)},${Math.min(255,b+255*amt|0)})`;
}
function darkenColor(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-255*amt|0)},${Math.max(0,g-255*amt|0)},${Math.max(0,b-255*amt|0)})`;
}

// ─── Game Logic ───────────────────────────────────────────────────────────────
function initGame() {
  resize();
  bhX = W / 2; bhY = H / 2;
  bhTargetX = W / 2; bhTargetY = H / 2;
  bhMass = 0;
  bhRadius = BH_MASS_RADIUS(0);
  bhPullRadius = BH_PULL_RADIUS(bhRadius);
  objects = [];
  particles = [];
  score = 0; objectsConsumed = 0;
  comboCount = 0; comboTimer = 0; maxCombo = 1;
  timeLeft = GAME_DURATION;
  lastTimestamp = null;
  spawnTimer = 0; spawnInterval = 2500;
  shakeX = 0; shakeY = 0; shakeDuration = 0;
  supernovaProgress = 0; supernovaActive = false;
  frameCount = 0;
  mouseX = W/2; mouseY = H/2;
  initBgStars();
  initAccretionDisk();
  // Spawn some initial objects
  for (let i = 0; i < 8; i++) spawnObject();
  updateHUD();
}

function updateHUD() {
  document.getElementById('hud-mass').textContent = score;
  document.getElementById('hud-combo').textContent = 'x' + (comboCount > 1 ? comboCount : 1);
  const m = Math.floor(timeLeft / 60);
  const s = Math.floor(timeLeft % 60);
  document.getElementById('hud-time').textContent = m + ':' + String(s).padStart(2,'0');
  document.getElementById('hud-hi').textContent = highScore;
}

function showCombo(mult) {
  const el = document.getElementById('combo-display');
  el.textContent = 'COMBO x' + mult + '!';
  el.style.opacity = '1';
  el.style.fontSize = (24 + mult * 4) + 'px';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 1200);
}

function startShake(intensity) {
  shakeDuration = 0.4;
  shakeX = intensity; shakeY = intensity;
}

function gameOver() {
  gameState = 'over';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('singularity_hi', highScore);
  }
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <h1>SINGULARITY</h1>
    <p class="subtitle" style="color:#8040ff;font-size:18px;letter-spacing:4px;">— SUPERNOVA —</p>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-label">MASS</div><div class="stat-value">${score}</div></div>
      <div class="stat-box"><div class="stat-label">CONSUMED</div><div class="stat-value">${objectsConsumed}</div></div>
      <div class="stat-box"><div class="stat-label">MAX COMBO</div><div class="stat-value">x${maxCombo}</div></div>
      <div class="stat-box"><div class="stat-label">HIGH SCORE</div><div class="stat-value">${highScore}</div></div>
    </div>
    <button class="play-again-btn" id="start-btn">[ PLAY AGAIN ]</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', () => {
    overlay.style.display = 'none';
    gameState = 'playing';
    initGame();
  });
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
function update(dt) {
  frameCount++;

  // BH movement — smooth easing toward cursor
  bhX += (bhTargetX - bhX) * Math.min(1, dt * 6);
  bhY += (bhTargetY - bhY) * Math.min(1, dt * 6);

  // Screen shake
  if (shakeDuration > 0) {
    shakeDuration -= dt;
    shakeX = (Math.random() - 0.5) * 8 * shakeDuration;
    shakeY = (Math.random() - 0.5) * 8 * shakeDuration;
    if (shakeDuration <= 0) { shakeX = 0; shakeY = 0; }
  }

  // Timer
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    supernovaActive = true;
  }

  // Supernova
  if (supernovaActive) {
    supernovaProgress += dt * 1.2;
    if (supernovaProgress >= 1) { gameOver(); return; }
  }

  // Spawn
  spawnTimer += dt * 1000;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnInterval = Math.max(600, spawnInterval - 20);
    const count = 1 + Math.floor((GAME_DURATION - timeLeft) / 30);
    for (let i = 0; i < count; i++) spawnObject();
  }

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; }
  }

  // Object updates
  bhRadius = BH_MASS_RADIUS(bhMass);
  bhPullRadius = BH_PULL_RADIUS(bhRadius);

  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    const dx = bhX - obj.x;
    const dy = bhY - obj.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < bhPullRadius) {
      if (obj.mass <= bhMass || (bhMass === 0 && obj.mass === 1)) {
        // Attracted
        const strength = (1 - dist/bhPullRadius) * 0.8;
        obj.vx += (dx/dist) * strength * dt * 60;
        obj.vy += (dy/dist) * strength * dt * 60;
      } else {
        // Repulsion for objects bigger than BH
        const repel = 0.3 * dt * 60;
        obj.vx -= (dx/dist) * repel;
        obj.vy -= (dy/dist) * repel;
      }
    }

    // Consume
    if (dist < bhRadius + obj.radius * 0.5 && (obj.mass <= bhMass || (bhMass === 0 && obj.mass === 1))) {
      // Consume!
      comboTimer = 2;
      comboCount++;
      if (comboCount > maxCombo) maxCombo = comboCount;
      const mult = comboCount >= 3 ? comboCount : 1;
      score += obj.mass * mult;
      bhMass += obj.mass;
      objectsConsumed++;
      if (comboCount >= 3) showCombo(comboCount);
      // Shake on big objects
      if (obj.mass >= 5) startShake(obj.mass);
      // Particles
      const pCount = obj.mass === 1 ? 6 : obj.mass === 3 ? 12 : obj.mass === 5 ? 18 : 28;
      spawnConsumptionParticles(obj.x, obj.y, obj.color, obj.glow, pCount);
      objects.splice(i, 1);
      continue;
    }

    obj.vx *= 0.999;
    obj.vy *= 0.999;
    obj.x += obj.vx;
    obj.y += obj.vy;

    // Remove off-screen (generous bounds)
    if (obj.x < -100 || obj.x > W+100 || obj.y < -100 || obj.y > H+100) {
      objects.splice(i, 1);
    }
  }
  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  // Deep space bg
  ctx.fillStyle = '#000005';
  ctx.fillRect(0, 0, W, H);

  drawBgStars();

  // Slight nebula tint around BH area
  const nebula = ctx.createRadialGradient(bhX, bhY, bhRadius, bhX, bhY, bhPullRadius * 2);
  nebula.addColorStop(0, 'rgba(20,0,60,0)');
  nebula.addColorStop(0.5, 'rgba(20,0,60,0.05)');
  nebula.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nebula;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(shakeX, shakeY);

  for (const obj of objects) drawObject(obj);
  drawParticles();
  drawBlackHole();

  ctx.restore();

  // Supernova flash
  if (supernovaActive) {
    const alpha = Math.min(1, supernovaProgress * 1.5);
    ctx.fillStyle = `rgba(255,220,180,${alpha * 0.9})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
    ctx.fillRect(0, 0, W, H);
    // Text
    if (supernovaProgress > 0.4) {
      const ta = Math.min(1, (supernovaProgress - 0.4) * 3);
      ctx.save();
      ctx.globalAlpha = ta;
      ctx.fillStyle = '#8040ff';
      ctx.font = 'bold 48px "Courier New"';
      ctx.textAlign = 'center';
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#8040ff';
      ctx.fillText('SUPERNOVA', W/2, H/2);
      ctx.restore();
    }
  }
}

function loop(ts) {
  if (gameState !== 'playing') return;
  const dt = lastTimestamp ? Math.min((ts - lastTimestamp) / 1000, 0.05) : 0.016;
  lastTimestamp = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── Input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (gameState === 'playing') {
    bhTargetX = e.clientX;
    bhTargetY = e.clientY;
  }
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  if (gameState === 'playing') {
    bhTargetX = t.clientX;
    bhTargetY = t.clientY;
  }
}, { passive: false });
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  bhTargetX = t.clientX;
  bhTargetY = t.clientY;
}, { passive: true });

// ─── Start ────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  gameState = 'playing';
  initGame();
  requestAnimationFrame(loop);
});

// Initial render
resize();
initBgStars();
(function idleLoop(ts) {
  if (gameState !== 'idle') return;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000005';
  ctx.fillRect(0, 0, W, H);
  frameCount++;
  drawBgStars();
  // Draw decorative idle BH
  bhX = W/2 + Math.sin(ts*0.0005)*30;
  bhY = H/2 + Math.cos(ts*0.0004)*20;
  bhRadius = 25 + 5*Math.sin(ts*0.001);
  bhPullRadius = bhRadius * 3;
  bhMass = 10;
  if (!accretionParticles.length) initAccretionDisk();
  drawBlackHole();
  requestAnimationFrame(idleLoop);
})(0);

document.getElementById('hud-hi').textContent = highScore;

})();
</script>
</body>
</html>
