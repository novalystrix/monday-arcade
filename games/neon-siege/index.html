<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Siege — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020208;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; font-family: 'Courier New', monospace; color: #fff;
  overflow: hidden; user-select: none; -webkit-user-select: none;
}
a.back { position: fixed; top: 12px; left: 16px; color: #6040cc; text-decoration: none; font-size: 13px; z-index: 100; opacity: .7; }
a.back:hover { opacity: 1; }
canvas { display: block; }
#hud { position: fixed; top: 12px; right: 16px; text-align: right; z-index: 100; font-size: 14px; line-height: 1.6; text-shadow: 0 0 8px rgba(0,229,255,.4); }
#hud .score { font-size: 32px; font-weight: bold; color: #00e5ff; }
#hud .combo { color: #ffd700; font-size: 16px; }
#hud .wave { color: #ff6ec7; font-size: 14px; }
#hud .lives { font-size: 20px; }
#overlay {
  position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(2,2,8,.92); z-index: 200; transition: opacity .4s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
#overlay h1 {
  font-size: 52px;
  background: linear-gradient(135deg, #ff6ec7, #6040cc, #00e5ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
#overlay .sub { color: #888; font-size: 13px; margin-bottom: 28px; }
#overlay .final { color: #00e5ff; font-size: 22px; margin-bottom: 12px; display: none; }
#overlay .best { color: #ffd700; font-size: 14px; margin-bottom: 24px; display: none; }
#overlay button {
  padding: 14px 40px; font-size: 18px; font-family: inherit; border: 2px solid #6040cc;
  background: transparent; color: #fff; cursor: pointer; border-radius: 6px;
  transition: all .2s;
}
#overlay button:hover { background: #6040cc; box-shadow: 0 0 20px rgba(96,64,204,.6); }
#controls { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); color: #555; font-size: 12px; z-index: 100; }
</style>
</head>
<body>
<a class="back" href="/">← Arcade</a>
<canvas id="c"></canvas>
<div id="hud">
  <div class="score" id="score">0</div>
  <div class="combo" id="combo"></div>
  <div class="wave" id="wave"></div>
  <div class="lives" id="lives"></div>
</div>
<div id="overlay">
  <h1>NEON SIEGE</h1>
  <div class="sub">arena shooter • survive the swarm</div>
  <div class="final" id="final"></div>
  <div class="best" id="best"></div>
  <button id="startBtn">ENTER THE GRID</button>
</div>
<div id="controls">WASD / Arrows move • Mouse aims • Click / Space shoots</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const cvs = $('c'), ctx = cvs.getContext('2d');
const overlay = $('overlay'), startBtn = $('startBtn');
const scoreEl = $('score'), comboEl = $('combo'), waveEl = $('wave'), livesEl = $('lives');
const finalEl = $('final'), bestEl = $('best');

let W, H, cx, cy;
function resize() {
  W = cvs.width = innerWidth; H = cvs.height = innerHeight;
  cx = W / 2; cy = H / 2;
}
resize(); addEventListener('resize', resize);

// --- Audio (procedural) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur, type = 'square', vol = 0.08) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxShoot() { playSound(800 + Math.random() * 400, 0.06, 'square', 0.04); }
function sfxHit() { playSound(200 + Math.random() * 100, 0.15, 'sawtooth', 0.06); }
function sfxDie() { playSound(80, 0.4, 'sawtooth', 0.1); }
function sfxWave() { playSound(523, 0.15, 'sine', 0.07); setTimeout(() => playSound(659, 0.15, 'sine', 0.07), 100); setTimeout(() => playSound(784, 0.2, 'sine', 0.07), 200); }

// --- State ---
let player, bullets, enemies, particles, gridPulse;
let score, combo, comboTimer, wave, waveTimer, waveEnemies, lives;
let shakeX, shakeY, shakeDur;
let keys = {}, mouseX = 0, mouseY = 0, mouseDown = false, spaceDown = false;
let running = false, gameOver = false, shootCd = 0;
let highScore = +(localStorage.getItem('ns_hi') || 0);
let lastTime = 0;

const COLORS = ['#00e5ff','#ff6ec7','#ffd700','#39ff14','#ff4444','#b366ff','#ff8c00'];
const ENEMY_TYPES = [
  { shape: 'diamond', color: '#ff6ec7', speed: 80, hp: 1, pts: 10, size: 14 },
  { shape: 'triangle', color: '#39ff14', speed: 60, hp: 2, pts: 25, size: 16 },
  { shape: 'hexagon', color: '#ff8c00', speed: 45, hp: 3, pts: 50, size: 18 },
  { shape: 'square', color: '#b366ff', speed: 100, hp: 1, pts: 15, size: 12 },
  { shape: 'star', color: '#ff4444', speed: 35, hp: 5, pts: 100, size: 22 },
];

function init() {
  player = { x: cx, y: cy, angle: 0, r: 12, flash: 0, invuln: 0 };
  bullets = []; enemies = []; particles = [];
  score = 0; combo = 0; comboTimer = 0;
  wave = 0; waveTimer = 2; waveEnemies = 0;
  lives = 3; shakeX = 0; shakeY = 0; shakeDur = 0;
  shootCd = 0; gridPulse = 0;
  gameOver = false;
  updateHUD();
}

function shake(amt, dur) { shakeDur = Math.max(shakeDur, dur); shakeX = amt; shakeY = amt; }

function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (0.3 + Math.random()) * speed;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4 + Math.random()*0.4, maxLife: 0.4 + Math.random()*0.4, color, r: 1.5 + Math.random()*2 });
  }
}

function spawnEnemy() {
  const type = ENEMY_TYPES[Math.min(Math.floor(Math.random() * Math.min(wave, ENEMY_TYPES.length)), ENEMY_TYPES.length - 1)];
  let x, y;
  const side = Math.floor(Math.random() * 4);
  const margin = 40;
  if (side === 0) { x = -margin; y = Math.random() * H; }
  else if (side === 1) { x = W + margin; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = -margin; }
  else { x = Math.random() * W; y = H + margin; }
  const speedMult = 1 + wave * 0.05;
  enemies.push({ x, y, type, hp: type.hp, r: type.size, angle: Math.random() * Math.PI * 2, speed: type.speed * speedMult * (0.8 + Math.random() * 0.4), flash: 0, wobble: Math.random() * Math.PI * 2 });
}

function startWave() {
  wave++;
  const count = 4 + wave * 3 + Math.floor(wave * wave * 0.3);
  waveEnemies = count;
  waveTimer = 0;
  sfxWave();
  gridPulse = 1;
  for (let i = 0; i < count; i++) {
    setTimeout(() => { if (running && !gameOver) spawnEnemy(); }, i * (Math.max(200 - wave * 8, 60)));
  }
}

function fireBullet() {
  if (shootCd > 0) return;
  shootCd = 0.1;
  const a = player.angle;
  const speed = 600;
  bullets.push({ x: player.x + Math.cos(a)*16, y: player.y + Math.sin(a)*16, vx: Math.cos(a)*speed, vy: Math.sin(a)*speed, life: 1.2, color: '#00e5ff', r: 3 });
  sfxShoot();
  // muzzle flash
  spawnParticles(player.x + Math.cos(a)*20, player.y + Math.sin(a)*20, '#00e5ff', 3, 80);
}

function updateHUD() {
  scoreEl.textContent = score.toLocaleString();
  comboEl.textContent = combo > 1 ? `×${combo} COMBO` : '';
  comboEl.style.textShadow = combo > 5 ? '0 0 12px #ffd700' : '';
  waveEl.textContent = wave > 0 ? `WAVE ${wave}` : '';
  livesEl.textContent = '♦'.repeat(lives);
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function update(dt) {
  if (gameOver) return;

  // player movement
  let mx = 0, my = 0;
  if (keys['w'] || keys['arrowup']) my -= 1;
  if (keys['s'] || keys['arrowdown']) my += 1;
  if (keys['a'] || keys['arrowleft']) mx -= 1;
  if (keys['d'] || keys['arrowright']) mx += 1;
  const pSpeed = 250;
  if (mx || my) {
    const len = Math.hypot(mx, my);
    player.x += (mx / len) * pSpeed * dt;
    player.y += (my / len) * pSpeed * dt;
  }
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));
  player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);
  player.flash = Math.max(0, player.flash - dt * 4);
  player.invuln = Math.max(0, player.invuln - dt);

  // shoot
  shootCd = Math.max(0, shootCd - dt);
  if (mouseDown || spaceDown) fireBullet();

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) { bullets.splice(i, 1); continue; }
    // hit enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (dist(b, e) < b.r + e.r) {
        e.hp--; e.flash = 1;
        bullets.splice(i, 1);
        spawnParticles(b.x, b.y, e.type.color, 6, 120);
        if (e.hp <= 0) {
          combo++; comboTimer = 2;
          const pts = e.type.pts * Math.min(combo, 20);
          score += pts;
          spawnParticles(e.x, e.y, e.type.color, 20, 200);
          shake(4, 0.1);
          sfxHit();
          enemies.splice(j, 1);
        }
        break;
      }
    }
  }

  // enemies chase player
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    e.x += (dx / d) * e.speed * dt;
    e.y += (dy / d) * e.speed * dt;
    e.angle += dt * 2;
    e.wobble += dt * 3;
    e.flash = Math.max(0, e.flash - dt * 5);

    // hit player
    if (player.invuln <= 0 && dist(e, player) < e.r + player.r) {
      lives--;
      player.invuln = 1.5;
      player.flash = 1;
      shake(10, 0.3);
      sfxDie();
      spawnParticles(player.x, player.y, '#ff4444', 30, 250);
      enemies.splice(i, 1);
      if (lives <= 0) {
        gameOver = true;
        if (score > highScore) { highScore = score; localStorage.setItem('ns_hi', highScore); }
        finalEl.textContent = `Score: ${score.toLocaleString()}`;
        finalEl.style.display = 'block';
        bestEl.textContent = `Best: ${highScore.toLocaleString()}`;
        bestEl.style.display = 'block';
        startBtn.textContent = 'RETRY';
        overlay.classList.remove('hidden');
      }
    }
  }

  // combo decay
  comboTimer -= dt;
  if (comboTimer <= 0) { combo = 0; comboTimer = 0; }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // wave logic
  if (enemies.length === 0 && waveEnemies === 0) {
    waveTimer += dt;
    if (waveTimer > 2) { startWave(); }
  }
  waveEnemies = Math.max(0, waveEnemies - 0); // bookkeeping handled by setTimeout

  // grid pulse
  gridPulse = Math.max(0, gridPulse - dt * 0.8);

  // shake
  if (shakeDur > 0) {
    shakeDur -= dt;
    shakeX *= 0.9; shakeY *= 0.9;
  } else { shakeX = 0; shakeY = 0; }

  updateHUD();
}

// --- Drawing ---
function drawGrid() {
  const spacing = 50;
  const alpha = 0.06 + gridPulse * 0.12;
  ctx.strokeStyle = `rgba(96,64,204,${alpha})`;
  ctx.lineWidth = 0.5;
  const ox = (player.x * 0.1) % spacing;
  const oy = (player.y * 0.1) % spacing;
  for (let x = -spacing + ox; x < W + spacing; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = -spacing + oy; y < H + spacing; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function glow(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
function noGlow() { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }

function drawPlayer() {
  const p = player;
  if (p.invuln > 0 && Math.floor(p.invuln * 10) % 2 === 0) return;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  const c = p.flash > 0 ? '#fff' : '#00e5ff';
  glow(c, 16);
  ctx.strokeStyle = c; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(18, 0); ctx.lineTo(-10, -10); ctx.lineTo(-6, 0); ctx.lineTo(-10, 10); ctx.closePath();
  ctx.stroke();
  // engine glow
  glow('#ff6ec7', 8);
  ctx.fillStyle = '#ff6ec7';
  ctx.beginPath(); ctx.arc(-10, 0, 3 + Math.random()*2, 0, Math.PI*2); ctx.fill();
  noGlow();
  ctx.restore();
}

function drawShape(x, y, type, angle, flash) {
  const r = type.size;
  const c = flash > 0 ? '#fff' : type.color;
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
  glow(c, 14); ctx.strokeStyle = c; ctx.lineWidth = 2;
  ctx.beginPath();
  const shape = type.shape;
  if (shape === 'diamond') {
    ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath();
  } else if (shape === 'triangle') {
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    } ctx.closePath();
  } else if (shape === 'hexagon') {
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    } ctx.closePath();
  } else if (shape === 'square') {
    ctx.rect(-r, -r, r*2, r*2);
  } else if (shape === 'star') {
    for (let i = 0; i < 10; i++) {
      const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const sr = i % 2 === 0 ? r : r * 0.5;
      i === 0 ? ctx.moveTo(Math.cos(a)*sr, Math.sin(a)*sr) : ctx.lineTo(Math.cos(a)*sr, Math.sin(a)*sr);
    } ctx.closePath();
  }
  ctx.stroke();
  noGlow();
  ctx.restore();
}

function drawBullets() {
  for (const b of bullets) {
    glow(b.color, 10);
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    // trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(b.x - b.vx*0.02, b.y - b.vy*0.02, b.r*0.7, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  noGlow();
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    glow(p.color, 6);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  noGlow();
}

function drawVignette() {
  const g = ctx.createRadialGradient(cx, cy, Math.min(W,H)*0.3, cx, cy, Math.max(W,H)*0.8);
  g.addColorStop(0, 'transparent');
  g.addColorStop(1, 'rgba(2,2,8,0.7)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function draw() {
  ctx.save();
  // screen shake
  if (shakeDur > 0) ctx.translate((Math.random()-0.5)*shakeX*2, (Math.random()-0.5)*shakeY*2);

  // fade trail
  ctx.fillStyle = 'rgba(2,2,8,0.25)';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawBullets();
  for (const e of enemies) drawShape(e.x, e.y, e.type, e.angle, e.flash);
  drawPlayer();
  drawParticles();
  drawVignette();

  ctx.restore();
}

function gameLoop(time) {
  if (!running) return;
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// --- Input ---
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key === ' ') { spaceDown = true; e.preventDefault(); } });
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; if (e.key === ' ') spaceDown = false; });
addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
// touch
addEventListener('touchstart', e => { mouseDown = true; const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; }, {passive: true});
addEventListener('touchmove', e => { const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; }, {passive: true});
addEventListener('touchend', () => { mouseDown = false; }, {passive: true});

startBtn.addEventListener('click', () => {
  audioCtx.resume();
  overlay.classList.add('hidden');
  init();
  running = true;
  lastTime = performance.now();
  // clear canvas fully on fresh start
  ctx.fillStyle = '#020208'; ctx.fillRect(0, 0, W, H);
  requestAnimationFrame(gameLoop);
});
</script>
</body>
</html>
