<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pendulum — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050510;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #00ccff;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

canvas { display: block; }

#hud {
  position: fixed;
  top: 12px;
  right: 16px;
  text-align: right;
  z-index: 100;
  font-size: 14px;
  line-height: 1.6;
  text-shadow: 0 0 8px rgba(0,200,255,0.5);
}

#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  background: rgba(5,5,16,0.85);
  backdrop-filter: blur(8px);
  transition: opacity 0.4s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }

#overlay h1 {
  font-size: clamp(28px, 6vw, 52px);
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(90deg, #00ccff, #ff44cc, #00ccff);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3s linear infinite;
  margin-bottom: 8px;
}
@keyframes shimmer { to { background-position: 200% 0; } }

#overlay .sub {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 32px;
}

#overlay .prompt {
  font-size: 16px;
  color: rgba(255,255,255,0.7);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

#level-banner {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(24px, 5vw, 44px);
  letter-spacing: 8px;
  text-transform: uppercase;
  color: #00ccff;
  text-shadow: 0 0 30px rgba(0,200,255,0.6);
  z-index: 150;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
</style>
</head>
<body>
<a href="/" class="back-link">← Arcade</a>
<div id="hud">
  <div>LEVEL <span id="hud-level">1</span></div>
  <div>SWINGS <span id="hud-swings">0</span></div>
  <div>BEST <span id="hud-best">—</span></div>
</div>
<div id="overlay">
  <h1>Pendulum</h1>
  <div class="sub">swing · release · fly</div>
  <div class="prompt">click or tap to start</div>
</div>
<div id="level-banner"></div>
<canvas id="c"></canvas>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const banner = document.getElementById('level-banner');
const hudLevel = document.getElementById('hud-level');
const hudSwings = document.getElementById('hud-swings');
const hudBest = document.getElementById('hud-best');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Audio ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, dur, vol = 0.12, type = 'sine') {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sndAttach() { playTone(520, 0.15, 0.1); }
function sndRelease() { playTone(380, 0.12, 0.08, 'triangle'); }
function sndGoal() {
  playTone(660, 0.15, 0.15);
  setTimeout(() => playTone(880, 0.15, 0.15), 100);
  setTimeout(() => playTone(1100, 0.2, 0.12), 200);
}
function sndFall() { playTone(180, 0.4, 0.1, 'sawtooth'); }

// --- Particles ---
let particles = [];
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      r: Math.random() * 3 + 1,
      color
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.03;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Trail ---
let trail = [];
const TRAIL_MAX = 40;

// --- Stars (parallax background) ---
let stars = [];
function makeStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 3 - H,
      r: Math.random() * 1.5 + 0.3,
      depth: Math.random() * 0.5 + 0.1,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}
makeStars();

// --- Game State ---
const GRAVITY = 0.35;
const ROPE_DAMPING = 0.998;
const MAX_ROPE = 200;

let state = 'title'; // title, playing, dead, won
let level = 1;
let swings = 0;
let bestSwings = {};
let cameraY = 0;
let targetCamY = 0;
let anchors = [];
let goal = {};
let player = { x: 0, y: 0, vx: 0, vy: 0 };
let attached = null; // { anchor, angle, len, angVel }
let levelAnim = 0;

function generateLevel(n) {
  anchors = [];
  const count = 4 + Math.min(n, 12);
  const spacing = 160 + Math.min(n * 5, 60);
  const startY = H - 100;

  // First anchor directly above start
  anchors.push({ x: W * 0.5, y: startY - 120, r: 8, color: '#00ccff' });

  for (let i = 1; i < count; i++) {
    const prevA = anchors[i - 1];
    const xOff = (Math.random() - 0.5) * (W * 0.6);
    let nx = prevA.x + xOff;
    nx = Math.max(60, Math.min(W - 60, nx));
    const ny = prevA.y - spacing + (Math.random() - 0.5) * 40;
    const hue = (200 + i * 25) % 360;
    anchors.push({ x: nx, y: ny, r: 6 + Math.random() * 3, color: `hsl(${hue},100%,65%)` });
  }

  const last = anchors[anchors.length - 1];
  goal = {
    x: last.x + (Math.random() - 0.5) * 100,
    y: last.y - spacing,
    r: 22,
    pulse: 0
  };

  player = { x: W * 0.5, y: startY, vx: 0, vy: 0 };
  attached = null;
  cameraY = 0;
  targetCamY = 0;
  trail = [];
  particles = [];
  swings = 0;
}

function showBanner(text) {
  banner.textContent = text;
  banner.style.opacity = '1';
  levelAnim = 80;
}

function startGame() {
  ensureAudio();
  state = 'playing';
  level = 1;
  overlay.classList.add('hidden');
  generateLevel(level);
  showBanner('Level 1');
  hudLevel.textContent = level;
  hudSwings.textContent = 0;
}

function nextLevel() {
  const key = level;
  if (!bestSwings[key] || swings < bestSwings[key]) bestSwings[key] = swings;
  level++;
  generateLevel(level);
  showBanner('Level ' + level);
  hudLevel.textContent = level;
  hudSwings.textContent = 0;
  sndGoal();
}

function die() {
  state = 'dead';
  sndFall();
  spawnParticles(player.x, player.y - cameraY, '#ff4444', 25);
  setTimeout(() => {
    generateLevel(level);
    state = 'playing';
    hudSwings.textContent = 0;
  }, 1000);
}

// --- Input ---
function findNearest(px, py) {
  let best = null, bestD = Infinity;
  for (const a of anchors) {
    const dx = a.x - px, dy = a.y - py;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < MAX_ROPE && d < bestD) { best = a; bestD = d; }
  }
  return best;
}

function handleDown() {
  if (state === 'title') { startGame(); return; }
  if (state !== 'playing') return;
  if (attached) {
    // Release
    const speed = attached.angVel * attached.len;
    player.vx = -Math.cos(attached.angle) * speed;
    player.vy = -Math.sin(attached.angle) * speed;
    spawnParticles(player.x, player.y - cameraY, attached.anchor.color, 8);
    sndRelease();
    attached = null;
  } else {
    // Attach to nearest
    const nearest = findNearest(player.x, player.y);
    if (nearest) {
      const dx = player.x - nearest.x;
      const dy = player.y - nearest.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);
      // Calc initial angular velocity from player velocity
      const tangent = { x: -Math.sin(angle), y: Math.cos(angle) };
      const angVel = (player.vx * tangent.x + player.vy * tangent.y) / len;
      attached = { anchor: nearest, angle, len, angVel };
      swings++;
      hudSwings.textContent = swings;
      sndAttach();
      spawnParticles(nearest.x, nearest.y - cameraY, nearest.color, 6);
    }
  }
}

canvas.addEventListener('mousedown', handleDown);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleDown(); });

// --- Update ---
function update() {
  if (state !== 'playing') return;

  if (attached) {
    const a = attached;
    // Pendulum physics
    const gravTorque = -GRAVITY * Math.sin(a.angle) / a.len;
    a.angVel += gravTorque;
    a.angVel *= ROPE_DAMPING;
    a.angle += a.angVel;

    player.x = a.anchor.x + Math.cos(a.angle) * a.len;
    player.y = a.anchor.y + Math.sin(a.angle) * a.len;
    player.vx = 0;
    player.vy = 0;
  } else {
    // Free flight
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    // Wall bounce
    if (player.x < 10) { player.x = 10; player.vx = Math.abs(player.vx) * 0.6; }
    if (player.x > W - 10) { player.x = W - 10; player.vx = -Math.abs(player.vx) * 0.6; }
  }

  // Camera follows player upward
  targetCamY = Math.min(0, -(player.y - H * 0.6));
  cameraY += (targetCamY - cameraY) * 0.08;

  // Trail
  trail.push({ x: player.x, y: player.y, life: 1 });
  if (trail.length > TRAIL_MAX) trail.shift();
  for (const t of trail) t.life -= 1 / TRAIL_MAX;

  // Check goal
  const gx = goal.x - player.x, gy = goal.y - player.y;
  if (Math.sqrt(gx * gx + gy * gy) < goal.r + 8) {
    spawnParticles(goal.x, goal.y - cameraY, '#ffcc00', 30);
    const key = level;
    if (!bestSwings[key] || swings < bestSwings[key]) bestSwings[key] = swings;
    hudBest.textContent = bestSwings[key];
    nextLevel();
    return;
  }

  // Fall death
  if (player.y > H + 200 - cameraY) {
    die();
  }

  goal.pulse += 0.04;
  updateParticles();

  if (levelAnim > 0) {
    levelAnim--;
    if (levelAnim === 0) banner.style.opacity = '0';
  }
}

// --- Draw ---
function drawStars() {
  for (const s of stars) {
    const sy = ((s.y + cameraY * s.depth) % (H * 2) + H * 2) % (H * 2) - H * 0.5;
    const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(s.twinkle + performance.now() * 0.001 * s.depth));
    ctx.globalAlpha = twinkle * 0.6;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, sy, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawRope() {
  if (!attached) return;
  const a = attached.anchor;
  ctx.strokeStyle = a.color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.6;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(a.x, a.y + cameraY);
  ctx.lineTo(player.x, player.y + cameraY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
}

function drawAnchors() {
  for (const a of anchors) {
    const sy = a.y + cameraY;
    if (sy < -50 || sy > H + 50) continue;

    // Glow
    const grad = ctx.createRadialGradient(a.x, sy, 0, a.x, sy, a.r * 3);
    grad.addColorStop(0, a.color + '44');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(a.x, sy, a.r * 3, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = a.color;
    ctx.beginPath();
    ctx.arc(a.x, sy, a.r, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    ctx.fillStyle = '#ffffff44';
    ctx.beginPath();
    ctx.arc(a.x - a.r * 0.3, sy - a.r * 0.3, a.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGoal() {
  const sy = goal.y + cameraY;
  if (sy < -60 || sy > H + 60) return;

  const pulseR = goal.r + Math.sin(goal.pulse) * 4;

  // Outer ring glow
  for (let i = 3; i > 0; i--) {
    ctx.strokeStyle = `rgba(255,204,0,${0.1 / i})`;
    ctx.lineWidth = i * 4;
    ctx.beginPath();
    ctx.arc(goal.x, sy, pulseR + i * 6, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Spinning ring
  const t = performance.now() * 0.002;
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(goal.x, sy, pulseR, t, t + Math.PI * 1.4);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(goal.x, sy, pulseR, t + Math.PI, t + Math.PI + Math.PI * 1.4);
  ctx.stroke();

  // Inner star
  ctx.fillStyle = '#ffcc00';
  ctx.globalAlpha = 0.6 + Math.sin(goal.pulse * 2) * 0.3;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = t + (i * Math.PI * 2) / 5 - Math.PI / 2;
    const r = i % 2 === 0 ? 8 : 4;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](goal.x + Math.cos(a) * r, sy + Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const sy = player.y + cameraY;

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const ty = t.y + cameraY;
    ctx.globalAlpha = (i / trail.length) * 0.4;
    ctx.fillStyle = attached ? attached.anchor.color : '#00ccff';
    ctx.beginPath();
    ctx.arc(t.x, ty, 3 * (i / trail.length), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Player glow
  const grad = ctx.createRadialGradient(player.x, sy, 0, player.x, sy, 20);
  grad.addColorStop(0, 'rgba(0,204,255,0.3)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(player.x, sy, 20, 0, Math.PI * 2);
  ctx.fill();

  // Player core
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#00ccff';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(player.x, sy, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(1, '#0a0a2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawAnchors();
  drawGoal();
  drawRope();
  drawPlayer();
  drawParticles();
}

// --- Loop ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
