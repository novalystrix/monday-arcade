<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Supernova — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #6060cc;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
}
canvas {
  display: block;
  touch-action: none;
}
</style>
</head>
<body>
<a href="/" class="back-link">← Arcade</a>
<canvas id="c"></canvas>
<script>
// ─── SUPERNOVA ─── Chain Reaction Game ───
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── SIZING ───
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── CONSTANTS ───
const STAR_COLORS = [
  { core: '#fff8e0', glow: '#ffcc33', outer: '#ff8800' },  // golden
  { core: '#ffffff', glow: '#aaccff', outer: '#4488ff' },  // blue-white
  { core: '#ffe8d8', glow: '#ff7744', outer: '#cc3300' },  // orange-red
  { core: '#fff4e0', glow: '#ffdd66', outer: '#ffaa22' },  // warm amber
  { core: '#f0f0ff', glow: '#88aaff', outer: '#3366cc' },  // cool blue
];
const TOTAL_ROUNDS = 10;

// ─── STATE ───
let state = 'title'; // title | playing | chainWait | roundEnd | gameOver
let round = 0;
let score = 0;
let bestChain = 0;
let roundChain = 0;
let roundBonus = 0;
let totalStars = 0;
let hasClicked = false;
let chainFinishTimer = 0;

// Background stars
let bgStars = [];
// Game stars
let stars = [];
// Active explosions
let explosions = [];
// Particles
let particles = [];
// Floating texts
let floatingTexts = [];
// Screen shake
let shakeX = 0, shakeY = 0, shakeIntensity = 0;

// Hint pulse
let hintTimer = 0;

// ─── BACKGROUND STARS ───
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 200; i++) {
    bgStars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.3 + 0.05,
      brightness: Math.random() * 0.5 + 0.5,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}
initBgStars();

// ─── SPAWN STARS ───
function spawnStars() {
  stars = [];
  explosions = [];
  particles = [];
  floatingTexts = [];
  hasClicked = false;
  roundChain = 0;
  roundBonus = 0;
  chainFinishTimer = 0;

  const count = Math.floor(30 + Math.random() * 20);
  totalStars = count;
  const spreadFactor = 1 + round * 0.05;
  const speedFactor = 0.3 + round * 0.08;
  const margin = 80;

  for (let i = 0; i < count; i++) {
    const size = Math.random() * 12 + 6; // 6-18
    const colorSet = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
    const angle = Math.random() * Math.PI * 2;
    stars.push({
      x: margin + Math.random() * (canvas.width - margin * 2) * spreadFactor,
      y: margin + Math.random() * (canvas.height - margin * 2) * spreadFactor,
      vx: Math.cos(angle) * speedFactor * (Math.random() * 0.5 + 0.5),
      vy: Math.sin(angle) * speedFactor * (Math.random() * 0.5 + 0.5),
      r: size,
      color: colorSet,
      pulse: Math.random() * Math.PI * 2,
      alive: true,
      detonateDelay: -1 // -1 = not triggered
    });
  }
}

// ─── EXPLODE A STAR ───
function detonateStar(star) {
  if (!star.alive) return;
  star.alive = false;
  roundChain++;

  const expRadius = star.r * 5 + 20;
  explosions.push({
    x: star.x,
    y: star.y,
    radius: 0,
    maxRadius: expRadius,
    speed: 3,
    color: star.color,
    alpha: 1,
    done: false
  });

  // Particles
  const pCount = Math.floor(20 + Math.random() * 20);
  for (let i = 0; i < pCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    const life = Math.random() * 40 + 30;
    particles.push({
      x: star.x,
      y: star.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: life,
      maxLife: life,
      r: Math.random() * 3 + 1,
      color: star.color
    });
  }

  // Screen shake
  shakeIntensity = Math.min(shakeIntensity + 2, 15);

  // Floating combo text
  if (roundChain > 1) {
    floatingTexts.push({
      x: star.x,
      y: star.y - 20,
      text: `x${roundChain}!`,
      alpha: 1,
      vy: -1.5,
      scale: roundChain > 10 ? 1.5 : roundChain > 5 ? 1.2 : 1
    });
  }

  // Check chain triggers
  stars.forEach(s => {
    if (s.alive && s.detonateDelay < 0) {
      const dx = s.x - star.x;
      const dy = s.y - star.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < expRadius + s.r) {
        s.detonateDelay = Math.floor(8 + Math.random() * 12); // frames delay
      }
    }
  });
}

// ─── UPDATE ───
function update() {
  // Background stars
  bgStars.forEach(s => {
    s.y += s.speed;
    s.twinkle += 0.02;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  });

  if (state === 'title' || state === 'gameOver' || state === 'roundEnd') {
    hintTimer += 0.03;
    return;
  }

  if (state !== 'playing' && state !== 'chainWait') return;

  // Update game stars
  stars.forEach(s => {
    if (!s.alive) return;
    s.x += s.vx;
    s.y += s.vy;
    s.pulse += 0.05;

    // Bounce off edges
    if (s.x < s.r || s.x > canvas.width - s.r) s.vx *= -1;
    if (s.y < s.r || s.y > canvas.height - s.r) s.vy *= -1;
    s.x = Math.max(s.r, Math.min(canvas.width - s.r, s.x));
    s.y = Math.max(s.r, Math.min(canvas.height - s.r, s.y));

    // Detonate delay
    if (s.detonateDelay > 0) {
      s.detonateDelay--;
    } else if (s.detonateDelay === 0) {
      detonateStar(s);
    }
  });

  // Update explosions
  explosions.forEach(e => {
    if (e.done) return;
    e.radius += e.speed;
    if (e.radius >= e.maxRadius) {
      e.done = true;
    }
    e.alpha = Math.max(0, 1 - e.radius / e.maxRadius);
  });
  explosions = explosions.filter(e => !e.done || e.alpha > 0);

  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  // Floating texts
  floatingTexts.forEach(t => {
    t.y += t.vy;
    t.alpha -= 0.015;
  });
  floatingTexts = floatingTexts.filter(t => t.alpha > 0);

  // Screen shake decay
  shakeIntensity *= 0.9;
  if (shakeIntensity < 0.5) shakeIntensity = 0;
  shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
  shakeY = (Math.random() - 0.5) * shakeIntensity * 2;

  // Check if chain reaction is over
  if (hasClicked && state === 'chainWait') {
    const anyPending = stars.some(s => s.alive && s.detonateDelay >= 0);
    const anyActiveExplosion = explosions.some(e => !e.done);
    if (!anyPending && !anyActiveExplosion) {
      chainFinishTimer++;
      if (chainFinishTimer > 60) { // 1 second pause
        endRound();
      }
    } else {
      chainFinishTimer = 0;
    }
  }
}

// ─── END ROUND ───
function endRound() {
  const pct = roundChain / totalStars;
  roundBonus = pct > 0.5 ? Math.floor(roundChain * pct * 10) : 0;
  score += roundChain * 10 + roundBonus;
  if (roundChain > bestChain) bestChain = roundChain;
  state = 'roundEnd';
  hintTimer = 0;
}

// ─── DRAW ───
function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Clear
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);

  // Background stars
  bgStars.forEach(s => {
    const twinkle = 0.5 + 0.5 * Math.sin(s.twinkle);
    ctx.globalAlpha = s.brightness * twinkle;
    ctx.fillStyle = '#aabbdd';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (state === 'title') {
    drawTitle();
    ctx.restore();
    return;
  }

  if (state === 'gameOver') {
    drawGameOver();
    ctx.restore();
    return;
  }

  // Draw game stars
  stars.forEach(s => {
    if (!s.alive) return;
    const pulse = 1 + 0.15 * Math.sin(s.pulse);
    const r = s.r * pulse;

    // Outer glow
    ctx.save();
    ctx.shadowBlur = 25;
    ctx.shadowColor = s.color.glow;
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = s.color.outer;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 1.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Mid glow
    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = s.color.glow;
    ctx.fillStyle = s.color.glow;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Core
    ctx.fillStyle = s.color.core;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Pending detonation indicator
    if (s.detonateDelay > 0) {
      ctx.save();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(Date.now() * 0.02);
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 2.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  });

  // Draw explosions
  explosions.forEach(e => {
    if (e.alpha <= 0) return;

    // Filled glow
    const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
    grad.addColorStop(0, `rgba(255,255,255,${e.alpha * 0.3})`);
    grad.addColorStop(0.3, `rgba(255,200,100,${e.alpha * 0.15})`);
    grad.addColorStop(1, `rgba(255,100,50,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fill();

    // Ring
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = e.color.glow;
    ctx.strokeStyle = e.color.glow;
    ctx.lineWidth = 3 * e.alpha;
    ctx.globalAlpha = e.alpha;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  });

  // Draw particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.color.glow;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color.core;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
    ctx.fill();

    // Trail
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = p.color.glow;
    ctx.beginPath();
    ctx.arc(p.x - p.vx * 3, p.y - p.vy * 3, p.r * alpha * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Floating texts
  floatingTexts.forEach(t => {
    ctx.save();
    ctx.globalAlpha = t.alpha;
    ctx.fillStyle = '#ffdd44';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ffaa00';
    ctx.font = `bold ${Math.floor(20 * t.scale)}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  });

  // HUD
  drawHUD();

  // Hint
  if (state === 'playing' && !hasClicked) {
    hintTimer += 0.02;
    const pulse = 0.4 + 0.3 * Math.sin(hintTimer * 3);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#aabbcc';
    ctx.font = '16px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Click a star to detonate', canvas.width / 2, canvas.height - 40);
    ctx.restore();
  }

  // Round end overlay
  if (state === 'roundEnd') {
    drawRoundEnd();
  }

  ctx.restore();
}

// ─── DRAW TITLE ───
function drawTitle() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Title glow
  ctx.save();
  ctx.shadowBlur = 40;
  ctx.shadowColor = '#ffaa33';
  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold 56px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SUPERNOVA', cx, cy - 40);
  ctx.restore();

  // Subtitle
  ctx.fillStyle = '#8888aa';
  ctx.font = '16px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('One click. One chain reaction.', cx, cy + 10);

  // Start button
  const pulse = 0.6 + 0.4 * Math.sin(hintTimer * 3);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffaa44';
  ctx.font = '20px "Courier New", monospace';
  ctx.fillText('[ Click to Start ]', cx, cy + 70);
  ctx.globalAlpha = 1;

  // Instructions
  ctx.fillStyle = '#555577';
  ctx.font = '13px "Courier New", monospace';
  ctx.fillText('Detonate stars. Trigger chain reactions. Maximize your score.', cx, cy + 130);
}

// ─── DRAW HUD ───
function drawHUD() {
  ctx.save();
  ctx.fillStyle = 'rgba(10,10,26,0.6)';
  ctx.fillRect(0, 0, canvas.width, 36);

  ctx.fillStyle = '#8899aa';
  ctx.font = '14px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`Round ${round}/${TOTAL_ROUNDS}`, 70, 24);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(`Score: ${score}`, canvas.width / 2, 24);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#88aacc';
  ctx.fillText(`Best Chain: ${bestChain}`, canvas.width - 20, 24);
  ctx.restore();
}

// ─── DRAW ROUND END ───
function drawRoundEnd() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Dim overlay
  ctx.fillStyle = 'rgba(5,5,15,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const pct = roundChain / totalStars;
  const starRating = pct >= 0.75 ? 3 : pct >= 0.5 ? 2 : pct > 0 ? 1 : 0;

  // Stars display
  ctx.save();
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#ffaa00';
  ctx.font = '36px "Courier New", monospace';
  ctx.textAlign = 'center';
  let starStr = '';
  for (let i = 0; i < 3; i++) starStr += i < starRating ? '★' : '☆';
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(starStr, cx, cy - 60);
  ctx.restore();

  // Stats
  ctx.fillStyle = '#ccccdd';
  ctx.font = '18px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`Chain: ${roundChain} / ${totalStars} stars`, cx, cy - 15);
  ctx.fillText(`${Math.round(pct * 100)}% detonated`, cx, cy + 15);

  if (roundBonus > 0) {
    ctx.fillStyle = '#ffaa44';
    ctx.fillText(`Bonus: +${roundBonus}`, cx, cy + 45);
  }

  // Continue
  const pulse = 0.5 + 0.5 * Math.sin(hintTimer * 3);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88aacc';
  ctx.font = '16px "Courier New", monospace';
  ctx.fillText(round < TOTAL_ROUNDS ? '[ Click for Next Round ]' : '[ Click for Results ]', cx, cy + 100);
  ctx.globalAlpha = 1;
}

// ─── DRAW GAME OVER ───
function drawGameOver() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  ctx.save();
  ctx.shadowBlur = 40;
  ctx.shadowColor = '#ff6633';
  ctx.fillStyle = '#ffaa44';
  ctx.font = 'bold 42px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', cx, cy - 60);
  ctx.restore();

  ctx.fillStyle = '#ccccdd';
  ctx.font = '20px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`Final Score: ${score}`, cx, cy);
  ctx.fillText(`Best Chain: ${bestChain}`, cx, cy + 35);

  const pulse = 0.5 + 0.5 * Math.sin(hintTimer * 3);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffaa44';
  ctx.font = '18px "Courier New", monospace';
  ctx.fillText('[ Play Again ]', cx, cy + 100);
  ctx.globalAlpha = 1;
}

// ─── INPUT ───
function handleClick(x, y) {
  if (state === 'title') {
    round = 1;
    score = 0;
    bestChain = 0;
    state = 'playing';
    spawnStars();
    return;
  }

  if (state === 'roundEnd') {
    if (round < TOTAL_ROUNDS) {
      round++;
      state = 'playing';
      spawnStars();
    } else {
      state = 'gameOver';
      hintTimer = 0;
    }
    return;
  }

  if (state === 'gameOver') {
    state = 'title';
    hintTimer = 0;
    return;
  }

  if (state === 'playing' && !hasClicked) {
    hasClicked = true;
    state = 'chainWait';

    // Find nearest star
    let nearest = null;
    let nearDist = Infinity;
    stars.forEach(s => {
      if (!s.alive) return;
      const dx = s.x - x;
      const dy = s.y - y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < nearDist && dist < s.r * 3) {
        nearDist = dist;
        nearest = s;
      }
    });

    if (nearest) {
      detonateStar(nearest);
    } else {
      // Missed — create small explosion at click point, might still trigger nearby
      explosions.push({
        x: x, y: y,
        radius: 0, maxRadius: 40,
        speed: 2,
        color: STAR_COLORS[0],
        alpha: 1, done: false
      });
      // Check if any stars in range
      stars.forEach(s => {
        if (s.alive && s.detonateDelay < 0) {
          const dx = s.x - x;
          const dy = s.y - y;
          if (Math.sqrt(dx * dx + dy * dy) < 40 + s.r) {
            s.detonateDelay = Math.floor(5 + Math.random() * 8);
          }
        }
      });
      shakeIntensity = 3;
    }
  }
}

canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  handleClick(t.clientX, t.clientY);
}, { passive: false });

// ─── LOOP ───
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
