<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Plasma Pong — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050510;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff; overflow: hidden;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
.back-link {
  position: fixed; top: 12px; left: 16px;
  color: #4040aa; text-decoration: none; font-size: 13px; z-index: 100;
}
.back-link:hover { color: #6c5ce7; }
#header {
  text-align: center; margin-bottom: 8px;
  font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #444466;
}
#header h1 {
  font-size: 1.6rem; letter-spacing: 0.15em;
  background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff, #06d6a0);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#stats { display: flex; gap: 24px; font-size: 0.8rem; margin-top: 4px; color: #444466; justify-content: center; }
#stats span { color: #8338ec; }
canvas { border-radius: 8px; display: block; cursor: none; }
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(5,5,16,0.92); z-index: 50; text-align: center;
}
#overlay h2 {
  font-size: 2.2rem; letter-spacing: 0.2em; margin-bottom: 16px;
  background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#overlay p { color: #666688; font-size: 0.9rem; margin: 6px 0; }
#overlay .start-hint { color: #8338ec; margin-top: 20px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
.combo-popup {
  position: fixed; pointer-events: none; z-index: 60;
  font-size: 2rem; font-weight: bold; letter-spacing: 0.1em;
  background: linear-gradient(90deg, #ff006e, #ffbe0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: comboFloat 1s ease-out forwards;
}
@keyframes comboFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
}
</style>
</head>
<body>
<a class="back-link" href="/">← Arcade</a>
<div id="header">
  <h1>🌊 Plasma Pong</h1>
  <div id="stats">
    <div>Score: <span id="score">0</span></div>
    <div>Combo: <span id="combo">0</span>x</div>
    <div>Rally: <span id="rally">0</span></div>
  </div>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <h2>PLASMA PONG</h2>
  <p>Move your paddle · Survive · Chain combos</p>
  <p style="color:#555">Mouse / Touch to move</p>
  <p class="start-hint">Click or Tap to Start</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const rallyEl = document.getElementById('rally');

// --- Sizing ---
let W, H;
function resize() {
  const s = Math.min(window.innerWidth * 0.95, 600);
  W = canvas.width = s;
  H = canvas.height = s * 1.3;
}
resize();
window.addEventListener('resize', resize);

// --- State ---
let running = false;
let score = 0, combo = 0, rally = 0, bestRally = 0;
let shakeT = 0, shakeIntensity = 0;

// --- Colors ---
const NEON = ['#ff006e','#8338ec','#3a86ff','#06d6a0','#ffbe0b','#fb5607'];
function rndNeon() { return NEON[Math.random()*NEON.length|0]; }
function hsl(h,s,l) { return `hsl(${h},${s}%,${l}%)`; }

// --- Paddles ---
const PAD_W_RATIO = 0.22;
const PAD_H = 14;
const PAD_R = 7;
let player = { x: 0, y: 0, w: 0, color: '#3a86ff', trail: [] };
let cpu = { x: 0, y: 0, w: 0, color: '#ff006e', trail: [], speed: 0 };

function initPaddles() {
  player.w = cpu.w = W * PAD_W_RATIO;
  player.x = cpu.x = W / 2;
  player.y = H - 40;
  cpu.y = 40;
  cpu.speed = 3.5;
  player.trail = [];
  cpu.trail = [];
}

// --- Ball ---
let ball = { x:0, y:0, vx:0, vy:0, r:8, color:'#fff', speed:0, trail:[] };
function initBall() {
  ball.x = W/2; ball.y = H/2;
  ball.speed = 4.5;
  const angle = (Math.random()*0.8+0.6) * (Math.random()<0.5?1:-1);
  ball.vx = Math.sin(angle) * ball.speed;
  ball.vy = Math.cos(angle) * ball.speed * (Math.random()<0.5?1:-1);
  ball.trail = [];
  ball.color = '#fff';
}

// --- Particles ---
let particles = [];
function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * spread + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 3 + 1,
      color,
      life: 1,
      decay: Math.random() * 0.03 + 0.015
    });
  }
}

// --- Plasma blobs (background) ---
let plasmaBlobs = [];
function initPlasma() {
  plasmaBlobs = [];
  for (let i = 0; i < 6; i++) {
    plasmaBlobs.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 80 + 40,
      vx: (Math.random()-0.5) * 0.5,
      vy: (Math.random()-0.5) * 0.5,
      hue: Math.random() * 360,
      hueSpeed: Math.random() * 0.5 + 0.2
    });
  }
}

// --- Shockwave rings ---
let rings = [];
function spawnRing(x, y, color) {
  rings.push({ x, y, r: 5, maxR: 80 + Math.random()*40, color, alpha: 0.8 });
}

// --- Input ---
let inputX = 0;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  inputX = (e.clientX - rect.left) / rect.width * W;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  inputX = (e.touches[0].clientX - rect.left) / rect.width * W;
}, { passive: false });

function startGame() {
  if (running) return;
  running = true;
  overlay.style.display = 'none';
  score = 0; combo = 0; rally = 0;
  scoreEl.textContent = '0';
  comboEl.textContent = '0';
  rallyEl.textContent = '0';
  particles = [];
  rings = [];
  initPaddles();
  initBall();
  initPlasma();
  inputX = W / 2;
}

overlay.addEventListener('click', startGame);
overlay.addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, { passive: false });

// --- Combo popup ---
function showCombo(x, y, text) {
  const el = document.createElement('div');
  el.className = 'combo-popup';
  el.textContent = text;
  el.style.left = (canvas.getBoundingClientRect().left + x / W * canvas.getBoundingClientRect().width) + 'px';
  el.style.top = (canvas.getBoundingClientRect().top + y / H * canvas.getBoundingClientRect().height) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// --- Drawing helpers ---
function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x - w/2 + r, y - h/2);
  ctx.lineTo(x + w/2 - r, y - h/2);
  ctx.quadraticCurveTo(x + w/2, y - h/2, x + w/2, y - h/2 + r);
  ctx.lineTo(x + w/2, y + h/2 - r);
  ctx.quadraticCurveTo(x + w/2, y + h/2, x + w/2 - r, y + h/2);
  ctx.lineTo(x - w/2 + r, y + h/2);
  ctx.quadraticCurveTo(x - w/2, y + h/2, x - w/2, y + h/2 - r);
  ctx.lineTo(x - w/2, y - h/2 + r);
  ctx.quadraticCurveTo(x - w/2, y - h/2, x - w/2 + r, y - h/2);
  ctx.closePath();
}

function drawGlowCircle(x, y, r, color, glowR) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, glowR || r * 3);
  grad.addColorStop(0, color);
  grad.addColorStop(0.4, color + '66');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, glowR || r * 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.arc(x - r*0.25, y - r*0.25, r*0.35, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// --- Main loop ---
let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  const dt = Math.min((t - lastT) / 16.67, 3);
  lastT = t;

  // Clear with slight fade for trails
  ctx.fillStyle = 'rgba(5,5,16,0.15)';
  ctx.fillRect(0, 0, W, H);

  // --- Plasma background ---
  ctx.globalCompositeOperation = 'lighter';
  for (const b of plasmaBlobs) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.hue += b.hueSpeed * dt;
    if (b.x < -b.r) b.x = W + b.r;
    if (b.x > W + b.r) b.x = -b.r;
    if (b.y < -b.r) b.y = H + b.r;
    if (b.y > H + b.r) b.y = -b.r;
    const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    grad.addColorStop(0, hsl(b.hue % 360, 80, 30) + '22');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  if (!running) return;

  // Shake
  let sx = 0, sy = 0;
  if (shakeT > 0) {
    shakeT -= dt;
    sx = (Math.random()-0.5) * shakeIntensity;
    sy = (Math.random()-0.5) * shakeIntensity;
    shakeIntensity *= 0.9;
  }
  ctx.save();
  ctx.translate(sx, sy);

  // --- Center line ---
  ctx.strokeStyle = '#ffffff08';
  ctx.setLineDash([8, 12]);
  ctx.beginPath();
  ctx.moveTo(0, H/2); ctx.lineTo(W, H/2);
  ctx.stroke();
  ctx.setLineDash([]);

  // --- Player paddle ---
  const targetX = Math.max(player.w/2, Math.min(W - player.w/2, inputX));
  player.x += (targetX - player.x) * 0.25 * dt;
  player.trail.push({ x: player.x, y: player.y, t: 1 });
  if (player.trail.length > 12) player.trail.shift();

  // Draw paddle trail
  ctx.globalCompositeOperation = 'lighter';
  for (const pt of player.trail) {
    pt.t -= 0.08 * dt;
    if (pt.t <= 0) continue;
    ctx.globalAlpha = pt.t * 0.3;
    drawRoundedRect(pt.x, pt.y, player.w, PAD_H, PAD_R);
    ctx.fillStyle = player.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  player.trail = player.trail.filter(p => p.t > 0);

  // Paddle glow
  const pGrad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.w);
  pGrad.addColorStop(0, player.color + '33');
  pGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = pGrad;
  ctx.fillRect(player.x - player.w, player.y - player.w/2, player.w*2, player.w);

  drawRoundedRect(player.x, player.y, player.w, PAD_H, PAD_R);
  ctx.fillStyle = player.color;
  ctx.fill();
  ctx.shadowColor = player.color;
  ctx.shadowBlur = 15;
  ctx.fill();
  ctx.shadowBlur = 0;

  // --- CPU paddle ---
  const cpuTarget = ball.vy < 0 ? ball.x + ball.vx * 10 : W/2;
  const cpuDiff = cpuTarget - cpu.x;
  const cpuMaxSpeed = cpu.speed + rally * 0.05;
  cpu.x += Math.sign(cpuDiff) * Math.min(Math.abs(cpuDiff), cpuMaxSpeed * dt);
  cpu.x = Math.max(cpu.w/2, Math.min(W - cpu.w/2, cpu.x));

  cpu.trail.push({ x: cpu.x, y: cpu.y, t: 1 });
  if (cpu.trail.length > 12) cpu.trail.shift();

  ctx.globalCompositeOperation = 'lighter';
  for (const pt of cpu.trail) {
    pt.t -= 0.08 * dt;
    if (pt.t <= 0) continue;
    ctx.globalAlpha = pt.t * 0.3;
    drawRoundedRect(pt.x, pt.y, cpu.w, PAD_H, PAD_R);
    ctx.fillStyle = cpu.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  cpu.trail = cpu.trail.filter(p => p.t > 0);

  const cGrad = ctx.createRadialGradient(cpu.x, cpu.y, 0, cpu.x, cpu.y, cpu.w);
  cGrad.addColorStop(0, cpu.color + '33');
  cGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = cGrad;
  ctx.fillRect(cpu.x - cpu.w, cpu.y - cpu.w/2, cpu.w*2, cpu.w);

  drawRoundedRect(cpu.x, cpu.y, cpu.w, PAD_H, PAD_R);
  ctx.fillStyle = cpu.color;
  ctx.fill();
  ctx.shadowColor = cpu.color;
  ctx.shadowBlur = 15;
  ctx.fill();
  ctx.shadowBlur = 0;

  // --- Ball physics ---
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // Wall bounce
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); spawnParticles(ball.x, ball.y, rndNeon(), 8, 3); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); spawnParticles(ball.x, ball.y, rndNeon(), 8, 3); }

  // Paddle collision helper
  function paddleHit(pad, isPlayer) {
    const dx = ball.x - pad.x;
    const hitZone = pad.w / 2 + ball.r;
    if (Math.abs(dx) < hitZone) {
      const normalized = dx / (pad.w / 2); // -1 to 1
      const angle = normalized * 1.1; // max deflection
      const speedBoost = Math.min(ball.speed + 0.15, 12);
      ball.speed = speedBoost;
      ball.vx = Math.sin(angle) * ball.speed;
      ball.vy = (isPlayer ? -1 : 1) * Math.cos(angle) * ball.speed;
      ball.y = isPlayer ? pad.y - PAD_H/2 - ball.r : pad.y + PAD_H/2 + ball.r;

      // Effects
      rally++;
      if (isPlayer) {
        combo++;
        score += 10 * combo;
      }
      ball.color = rndNeon();
      const hitColor = isPlayer ? player.color : cpu.color;
      spawnParticles(ball.x, ball.y, hitColor, 15 + combo * 3, 5);
      spawnParticles(ball.x, ball.y, ball.color, 8, 4);
      spawnRing(ball.x, ball.y, hitColor);
      shakeT = 6; shakeIntensity = 3 + Math.min(combo, 8);

      if (combo >= 3 && isPlayer) showCombo(ball.x, ball.y, combo + 'x COMBO!');
      if (rally >= 10 && rally % 5 === 0) showCombo(W/2, H/2, '🔥 RALLY ' + rally);

      scoreEl.textContent = score;
      comboEl.textContent = combo;
      rallyEl.textContent = rally;
      return true;
    }
    return false;
  }

  // Player paddle collision
  if (ball.vy > 0 && ball.y + ball.r >= player.y - PAD_H/2 && ball.y < player.y + PAD_H) {
    paddleHit(player, true);
  }

  // CPU paddle collision
  if (ball.vy < 0 && ball.y - ball.r <= cpu.y + PAD_H/2 && ball.y > cpu.y - PAD_H) {
    paddleHit(cpu, false);
  }

  // Ball out - score and reset
  if (ball.y < -20 || ball.y > H + 20) {
    if (ball.y < -20) {
      score += 50 * Math.max(combo, 1);
      spawnParticles(ball.x, 0, '#06d6a0', 40, 8);
      showCombo(W/2, H * 0.3, '⚡ GOAL! +' + (50 * Math.max(combo, 1)));
      shakeT = 10; shakeIntensity = 12;
      for (let i = 0; i < 3; i++) spawnRing(ball.x, 0, rndNeon());
    } else {
      // Player lost this rally
      spawnParticles(ball.x, H, '#ff006e', 30, 6);
      shakeT = 8; shakeIntensity = 8;
    }
    combo = 0;
    rally = 0;
    scoreEl.textContent = score;
    comboEl.textContent = combo;
    rallyEl.textContent = rally;
    initBall();
  }

  // --- Ball trail ---
  ball.trail.push({ x: ball.x, y: ball.y, color: ball.color, t: 1 });
  if (ball.trail.length > 20) ball.trail.shift();

  ctx.globalCompositeOperation = 'lighter';
  for (const pt of ball.trail) {
    pt.t -= 0.06 * dt;
    if (pt.t <= 0) continue;
    ctx.globalAlpha = pt.t * 0.6;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, ball.r * pt.t, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ball.trail = ball.trail.filter(p => p.t > 0);

  // Ball
  drawGlowCircle(ball.x, ball.y, ball.r, ball.color, ball.r * 4);

  // --- Shockwave rings ---
  ctx.globalCompositeOperation = 'lighter';
  for (const ring of rings) {
    ring.r += 3 * dt;
    ring.alpha -= 0.025 * dt;
    if (ring.alpha <= 0) continue;
    ctx.globalAlpha = ring.alpha;
    ctx.strokeStyle = ring.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  rings = rings.filter(r => r.alpha > 0);

  // --- Particles ---
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) continue;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  particles = particles.filter(p => p.life > 0);

  // Cap particles
  if (particles.length > 300) particles.splice(0, particles.length - 300);

  ctx.restore();
}

// Init plasma for menu background
initPlasma();
requestAnimationFrame(loop);
</script>
</body>
</html>
