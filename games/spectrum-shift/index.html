<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spectrum Shift — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #06060f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #4040aa;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
  transition: color 0.2s;
}
.back-link:hover { color: #e0e0ff; }

.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 420px;
  padding: 40px 12px 8px;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.hud-score { color: #39ff14; }
.hud-combo { color: #ffaa00; transition: transform 0.15s; }
.hud-combo.pop { transform: scale(1.5); }
.hud-best { color: #ff6b9d; }

canvas {
  border: 1px solid #1a1a3a;
  box-shadow: 0 0 60px rgba(120,80,255,0.15);
  border-radius: 6px;
  touch-action: none;
}

.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(6,6,15,0.94);
  z-index: 20;
  gap: 14px;
  transition: opacity 0.3s;
}
.overlay h1 {
  font-size: 2.2rem;
  letter-spacing: 0.18em;
  text-shadow: 0 0 40px currentColor;
}
.overlay .sub {
  color: #555577;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
}
.overlay .final-score {
  font-size: 3rem;
  color: #39ff14;
  text-shadow: 0 0 30px #39ff1466;
}
.overlay .instructions {
  max-width: 320px;
  text-align: center;
  color: #8888bb;
  font-size: 0.7rem;
  line-height: 1.8;
}
.color-keys {
  display: flex;
  gap: 20px;
  margin-top: 6px;
}
.color-key {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 0.65rem;
  color: #888;
}
.color-key .swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  box-shadow: 0 0 12px currentColor;
}
.hidden { display: none; }

/* Mobile touch controls */
.touch-controls {
  display: none;
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  gap: 16px;
  z-index: 50;
}
.touch-btn {
  width: 70px;
  height: 56px;
  border: 2px solid;
  border-radius: 12px;
  background: rgba(0,0,0,0.5);
  font-size: 0.6rem;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.touch-btn:active { transform: scale(0.92); }

@media (hover: none) and (pointer: coarse) {
  .touch-controls { display: flex; }
}
</style>
</head>
<body>

<a href="/" class="back-link">← arcade</a>

<div class="hud">
  <span class="hud-score">SCORE: <span id="score">0</span></span>
  <span class="hud-combo" id="comboDisplay">×1</span>
  <span class="hud-best">BEST: <span id="best">0</span></span>
</div>

<canvas id="game"></canvas>

<!-- Start overlay -->
<div class="overlay" id="startOverlay">
  <h1 style="color:#b060ff;">SPECTRUM SHIFT</h1>
  <div class="instructions">
    Shift your prism's color to match incoming barriers.<br>
    Phase through matching colors. Wrong color = shatter.
  </div>
  <div class="color-keys">
    <div class="color-key"><div class="swatch" style="background:#ff3366;color:#ff3366;"></div>A / ←</div>
    <div class="color-key"><div class="swatch" style="background:#33ddff;color:#33ddff;"></div>S / ↓</div>
    <div class="color-key"><div class="swatch" style="background:#66ff33;color:#66ff33;"></div>D / →</div>
  </div>
  <div class="sub" style="margin-top:12px;">[ PRESS ANY KEY OR TAP ]</div>
</div>

<!-- Game Over overlay -->
<div class="overlay hidden" id="gameOverOverlay">
  <h1 style="color:#ff3366;">SHATTERED</h1>
  <div class="final-score" id="finalScore">0</div>
  <div class="sub">MAX COMBO: <span id="finalCombo">×1</span></div>
  <div class="sub" style="margin-top:8px;">[ PRESS ANY KEY OR TAP ]</div>
</div>

<!-- Touch controls -->
<div class="touch-controls" id="touchControls">
  <button class="touch-btn" id="btnRed" style="color:#ff3366;border-color:#ff336666;">RED</button>
  <button class="touch-btn" id="btnCyan" style="color:#33ddff;border-color:#33ddff66;">CYAN</button>
  <button class="touch-btn" id="btnGreen" style="color:#66ff33;border-color:#66ff3366;">GREEN</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Sizing ---
const W = 400, H = 600;
canvas.width = W;
canvas.height = H;
function resize() {
  const maxH = window.innerHeight - 60;
  const maxW = window.innerWidth - 20;
  const scale = Math.min(maxW / W, maxH / H, 1);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// --- Colors ---
const COLORS = [
  { name: 'red',   hex: '#ff3366', rgb: [255,51,102] },
  { name: 'cyan',  hex: '#33ddff', rgb: [51,221,255] },
  { name: 'green', hex: '#66ff33', rgb: [102,255,51] },
];

// --- State ---
let state = 'start'; // start | play | dead
let score = 0, best = parseInt(localStorage.getItem('spectrum-shift-best') || '0');
let combo = 0, maxCombo = 0, comboMultiplier = 1;
let speed = 1.8;
let prism = { x: W / 2, y: H - 80, colorIdx: 0, size: 18, glow: 0 };
let barriers = [];
let particles = [];
let bgStars = [];
let shakeTimer = 0;
let frameCount = 0;
let lastBarrier = 0;
let barrierInterval = 90;

document.getElementById('best').textContent = best;

// --- Background stars ---
for (let i = 0; i < 80; i++) {
  bgStars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.3 + 0.1,
    alpha: Math.random() * 0.5 + 0.2,
  });
}

// --- Barriers ---
function spawnBarrier() {
  // A barrier is a full-width wall with a gap, the wall sections are colored
  const gapWidth = Math.max(60, 100 - score * 0.3);
  const gapX = Math.random() * (W - gapWidth - 40) + 20;
  const colorIdx = Math.floor(Math.random() * 3);
  
  // Sometimes spawn multi-color barriers at higher scores
  if (score > 30 && Math.random() < 0.3) {
    // Split barrier: two colors
    const midX = W / 2 + (Math.random() - 0.5) * 100;
    const c1 = Math.floor(Math.random() * 3);
    let c2 = (c1 + 1 + Math.floor(Math.random() * 2)) % 3;
    barriers.push({
      y: -20,
      segments: [
        { x: 0, w: midX, colorIdx: c1 },
        { x: midX, w: W - midX, colorIdx: c2 },
      ],
      height: 16 + Math.random() * 8,
      passed: false,
    });
  } else {
    barriers.push({
      y: -20,
      segments: [
        { x: 0, w: W, colorIdx: colorIdx },
      ],
      height: 14 + Math.random() * 10,
      passed: false,
    });
  }
}

// --- Particles ---
function emitParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const vel = Math.random() * spread + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * vel,
      vy: Math.sin(angle) * vel,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      size: Math.random() * 3 + 1.5,
      color,
    });
  }
}

function emitPhaseParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 40,
      y,
      vx: (Math.random() - 0.5) * 2,
      vy: -Math.random() * 1.5,
      life: 1,
      decay: 0.03 + Math.random() * 0.02,
      size: Math.random() * 2.5 + 1,
      color,
    });
  }
}

// --- Drawing ---
function drawPrism() {
  const c = COLORS[prism.colorIdx];
  const s = prism.size;
  const x = prism.x, y = prism.y;
  
  // Glow
  const glowSize = s * 2.5 + Math.sin(frameCount * 0.08) * 4 + prism.glow * 10;
  const grad = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
  grad.addColorStop(0, c.hex + '40');
  grad.addColorStop(1, c.hex + '00');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, glowSize, 0, Math.PI * 2);
  ctx.fill();
  
  // Prism (diamond shape)
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(frameCount * 0.02);
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.lineTo(s * 0.7, 0);
  ctx.moveTo(0, -s);
  ctx.lineTo(-s * 0.7, 0);
  ctx.lineTo(0, s);
  ctx.lineTo(s * 0.7, 0);
  ctx.closePath();
  ctx.fillStyle = c.hex;
  ctx.shadowColor = c.hex;
  ctx.shadowBlur = 20;
  ctx.fill();
  
  // Inner highlight
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.5);
  ctx.lineTo(s * 0.3, 0);
  ctx.lineTo(0, s * 0.5);
  ctx.lineTo(-s * 0.3, 0);
  ctx.closePath();
  ctx.fillStyle = '#ffffff44';
  ctx.fill();
  
  ctx.restore();
  ctx.shadowBlur = 0;
  
  if (prism.glow > 0) prism.glow *= 0.9;
}

function drawBarrier(b) {
  for (const seg of b.segments) {
    const c = COLORS[seg.colorIdx];
    
    // Main bar
    ctx.fillStyle = c.hex + '30';
    ctx.fillRect(seg.x, b.y, seg.w, b.height);
    
    // Edge glow lines
    ctx.strokeStyle = c.hex + '80';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = c.hex;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(seg.x, b.y);
    ctx.lineTo(seg.x + seg.w, b.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(seg.x, b.y + b.height);
    ctx.lineTo(seg.x + seg.w, b.y + b.height);
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    // Scan line effect
    const scanY = b.y + (frameCount * 2 % b.height);
    ctx.strokeStyle = c.hex + '15';
    ctx.lineWidth = 1;
    for (let sy = b.y; sy < b.y + b.height; sy += 3) {
      ctx.beginPath();
      ctx.moveTo(seg.x, sy);
      ctx.lineTo(seg.x + seg.w, sy);
      ctx.stroke();
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawBackground() {
  // Gradient bg
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#06060f');
  grad.addColorStop(0.5, '#0a0a1e');
  grad.addColorStop(1, '#06060f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // Stars
  for (const s of bgStars) {
    ctx.globalAlpha = s.alpha + Math.sin(frameCount * 0.03 + s.x) * 0.15;
    ctx.fillStyle = '#8888cc';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
  
  // Vertical scan lines (subtle)
  ctx.fillStyle = '#ffffff02';
  for (let x = 0; x < W; x += 3) {
    ctx.fillRect(x, 0, 1, H);
  }
}

// --- Collision ---
function checkCollision(barrier) {
  const px = prism.x, py = prism.y;
  if (py + prism.size * 0.6 > barrier.y && py - prism.size * 0.6 < barrier.y + barrier.height) {
    // Which segment is the prism in?
    for (const seg of barrier.segments) {
      if (px > seg.x && px < seg.x + seg.w) {
        return seg.colorIdx;
      }
    }
  }
  return -1;
}

// --- Game loop ---
function update() {
  frameCount++;
  
  // Move stars
  for (const s of bgStars) {
    s.y += s.speed * speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }
  
  // Barriers
  lastBarrier++;
  if (lastBarrier >= barrierInterval) {
    spawnBarrier();
    lastBarrier = 0;
    // Speed up gradually
    if (barrierInterval > 40) barrierInterval -= 0.5;
  }
  
  for (let i = barriers.length - 1; i >= 0; i--) {
    const b = barriers[i];
    b.y += speed;
    
    // Check collision
    const hitColor = checkCollision(b);
    if (hitColor >= 0 && !b.passed) {
      if (hitColor === prism.colorIdx) {
        // Phase through! Score!
        b.passed = true;
        combo++;
        comboMultiplier = 1 + Math.floor(combo / 5) * 0.5;
        if (combo > maxCombo) maxCombo = combo;
        const points = Math.floor(10 * comboMultiplier);
        score += points;
        prism.glow = 1;
        emitPhaseParticles(prism.x, b.y, COLORS[prism.colorIdx].hex);
        
        // Update HUD
        document.getElementById('score').textContent = score;
        const cd = document.getElementById('comboDisplay');
        cd.textContent = combo >= 5 ? `×${comboMultiplier.toFixed(1)}` : `×1`;
        cd.classList.add('pop');
        setTimeout(() => cd.classList.remove('pop'), 150);
        
        // Increase speed slightly
        speed = Math.min(5, 1.8 + score * 0.015);
      } else {
        // CRASH
        die(COLORS[hitColor]);
        return;
      }
    }
    
    // Remove off-screen
    if (b.y > H + 30) {
      if (!b.passed) {
        // Missed barrier — reset combo
        combo = 0;
        comboMultiplier = 1;
        document.getElementById('comboDisplay').textContent = '×1';
      }
      barriers.splice(i, 1);
    }
  }
  
  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  if (shakeTimer > 0) shakeTimer--;
}

function draw() {
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeTimer * 1.5,
      (Math.random() - 0.5) * shakeTimer * 1.5
    );
  }
  
  drawBackground();
  
  for (const b of barriers) drawBarrier(b);
  drawParticles();
  drawPrism();
  
  // Color indicator bar at bottom
  const c = COLORS[prism.colorIdx];
  ctx.fillStyle = c.hex + '20';
  ctx.fillRect(0, H - 4, W, 4);
  ctx.fillStyle = c.hex;
  ctx.shadowColor = c.hex;
  ctx.shadowBlur = 8;
  ctx.fillRect(prism.x - 30, H - 4, 60, 4);
  ctx.shadowBlur = 0;
  
  ctx.restore();
}

function die(hitColor) {
  state = 'dead';
  shakeTimer = 15;
  
  // Shatter particles
  emitParticles(prism.x, prism.y, '#ffffff', 30, 5);
  emitParticles(prism.x, prism.y, COLORS[prism.colorIdx].hex, 20, 4);
  emitParticles(prism.x, prism.y, hitColor.hex, 15, 3);
  
  // Save best
  if (score > best) {
    best = score;
    localStorage.setItem('spectrum-shift-best', best);
    document.getElementById('best').textContent = best;
  }
  
  // Show game over after brief delay
  setTimeout(() => {
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalCombo').textContent = `×${maxCombo}`;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
  }, 600);
}

function resetGame() {
  score = 0; combo = 0; maxCombo = 0; comboMultiplier = 1;
  speed = 1.8;
  barriers = [];
  particles = [];
  prism = { x: W / 2, y: H - 80, colorIdx: 0, size: 18, glow: 0 };
  lastBarrier = 0;
  barrierInterval = 90;
  frameCount = 0;
  shakeTimer = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('comboDisplay').textContent = '×1';
}

function loop() {
  if (state === 'play') {
    update();
  } else if (state === 'dead') {
    // Still animate particles and shake
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (shakeTimer > 0) shakeTimer--;
  }
  draw();
  requestAnimationFrame(loop);
}

// --- Controls ---
function shiftColor(idx) {
  if (state !== 'play') return;
  if (idx !== prism.colorIdx) {
    prism.colorIdx = idx;
    prism.glow = 0.6;
    emitParticles(prism.x, prism.y, COLORS[idx].hex, 6, 2);
  }
}

function handleStart() {
  if (state === 'start') {
    state = 'play';
    document.getElementById('startOverlay').classList.add('hidden');
  } else if (state === 'dead') {
    resetGame();
    state = 'play';
    document.getElementById('gameOverOverlay').classList.add('hidden');
  }
}

document.addEventListener('keydown', e => {
  if (state !== 'play') {
    if (['Space','Enter','KeyA','KeyS','KeyD'].includes(e.code)) handleStart();
    return;
  }
  
  switch (e.code) {
    case 'KeyA': case 'ArrowLeft':  shiftColor(0); break;
    case 'KeyS': case 'ArrowDown':  shiftColor(1); break;
    case 'KeyD': case 'ArrowRight': shiftColor(2); break;
  }
});

// Mouse/touch to move prism horizontally
let dragging = false;
canvas.addEventListener('pointerdown', e => {
  dragging = true;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  prism.x = Math.max(20, Math.min(W - 20, (e.clientX - rect.left) * scaleX));
});
canvas.addEventListener('pointermove', e => {
  if (!dragging || state !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  prism.x = Math.max(20, Math.min(W - 20, (e.clientX - rect.left) * scaleX));
});
canvas.addEventListener('pointerup', () => dragging = false);
canvas.addEventListener('pointerleave', () => dragging = false);

// Touch buttons for color shift
document.getElementById('btnRed').addEventListener('pointerdown', e => { e.preventDefault(); shiftColor(0); });
document.getElementById('btnCyan').addEventListener('pointerdown', e => { e.preventDefault(); shiftColor(1); });
document.getElementById('btnGreen').addEventListener('pointerdown', e => { e.preventDefault(); shiftColor(2); });

// Overlays
document.getElementById('startOverlay').addEventListener('click', handleStart);
document.getElementById('gameOverOverlay').addEventListener('click', handleStart);

// --- Init ---
requestAnimationFrame(loop);
</script>
</body>
</html>
