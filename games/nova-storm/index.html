<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nova Storm — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050510;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #6040dd;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
}
.back-link:hover { color: #a080ff; }
canvas { display: block; border-radius: 4px; }
#hud {
  position: fixed;
  top: 12px;
  right: 16px;
  text-align: right;
  font-size: 14px;
  z-index: 100;
  text-shadow: 0 0 8px rgba(100,60,220,0.8);
}
#hud .score { font-size: 28px; font-weight: bold; color: #e0c0ff; }
#hud .combo { font-size: 16px; color: #ff6090; }
#hud .wave { font-size: 13px; color: #80c0ff; margin-top: 4px; }
#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  background: rgba(5,5,16,0.85);
}
#overlay h1 {
  font-size: 48px;
  background: linear-gradient(135deg, #a060ff, #ff4080, #40d0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  margin-bottom: 8px;
}
#overlay .sub { color: #a0a0c0; font-size: 14px; margin-bottom: 24px; }
#overlay .controls { color: #707090; font-size: 12px; line-height: 1.8; }
#overlay .start-btn {
  margin-top: 20px;
  padding: 12px 36px;
  font-size: 18px;
  font-family: inherit;
  background: linear-gradient(135deg, #6030c0, #c04080);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
#overlay .start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(160,80,255,0.5);
}
#game-over {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  background: rgba(5,5,16,0.9);
}
#game-over h1 { font-size: 42px; color: #ff4060; margin-bottom: 8px; }
#game-over .final-score { font-size: 24px; color: #e0c0ff; margin-bottom: 6px; }
#game-over .final-wave { font-size: 15px; color: #80c0ff; margin-bottom: 20px; }
#game-over .start-btn {
  padding: 12px 36px;
  font-size: 18px;
  font-family: inherit;
  background: linear-gradient(135deg, #6030c0, #c04080);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
<body>
<a class="back-link" href="/">← Arcade</a>
<div id="hud" style="display:none;">
  <div class="score" id="score-display">0</div>
  <div class="combo" id="combo-display"></div>
  <div class="wave" id="wave-display">WAVE 1</div>
  <div style="margin-top:8px; font-size:11px; color:#606080;" id="hp-display"></div>
</div>

<div id="overlay">
  <h1>NOVA STORM</h1>
  <div class="sub">Neon Arena Shooter</div>
  <div class="controls">
    WASD / Arrows — Move<br>
    Mouse — Aim &amp; Shoot<br>
    Chain kills for combo multiplier!
  </div>
  <button class="start-btn" id="start-btn">START</button>
</div>

<div id="game-over">
  <h1>GAME OVER</h1>
  <div class="final-score" id="final-score"></div>
  <div class="final-wave" id="final-wave"></div>
  <button class="start-btn" id="restart-btn">PLAY AGAIN</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Sizing ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- State ---
let running = false;
let player, bullets, enemies, particles, powerups, stars;
let score, combo, comboTimer, wave, waveTimer, enemiesLeft;
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let screenShake = 0;
let hiScore = parseInt(localStorage.getItem('novastorm-hi') || '0');

// --- Input ---
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { mouse.down = true; });
canvas.addEventListener('mouseup', e => { mouse.down = false; });
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY; mouse.down = true;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.down = false; });

// --- Stars background ---
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.5 + 0.1,
      speed: Math.random() * 0.3 + 0.05
    });
  }
}

// --- Player ---
function initPlayer() {
  return {
    x: canvas.width / 2,
    y: canvas.height / 2,
    r: 14,
    speed: 4.5,
    hp: 3,
    maxHp: 3,
    shootCd: 0,
    shootRate: 8,
    invuln: 0,
    trail: []
  };
}

// --- Spawning ---
function spawnEnemy() {
  const types = ['chaser', 'drifter', 'shooter', 'splitter'];
  const weights = [4, 3, wave >= 3 ? 2 : 0, wave >= 5 ? 1 : 0];
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total, type;
  for (let i = 0; i < types.length; i++) {
    r -= weights[i];
    if (r <= 0) { type = types[i]; break; }
  }
  type = type || 'chaser';

  // Spawn at edge
  let x, y;
  const side = Math.floor(Math.random() * 4);
  if (side === 0) { x = -20; y = Math.random() * canvas.height; }
  else if (side === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
  else if (side === 2) { x = Math.random() * canvas.width; y = -20; }
  else { x = Math.random() * canvas.width; y = canvas.height + 20; }

  const baseSpeed = 1.2 + wave * 0.15;
  const e = { x, y, type, r: 12, hp: 1, angle: 0, timer: 0 };

  if (type === 'chaser') {
    e.speed = baseSpeed * (0.8 + Math.random() * 0.4);
    e.color = '#ff4060';
    e.glow = 'rgba(255,64,96,0.4)';
    e.sides = 3;
  } else if (type === 'drifter') {
    e.speed = baseSpeed * 0.6;
    e.color = '#40ff80';
    e.glow = 'rgba(64,255,128,0.4)';
    e.sides = 6;
    e.r = 16;
    e.hp = 2;
    e.vx = (Math.random() - 0.5) * e.speed * 2;
    e.vy = (Math.random() - 0.5) * e.speed * 2;
  } else if (type === 'shooter') {
    e.speed = baseSpeed * 0.5;
    e.color = '#ffaa20';
    e.glow = 'rgba(255,170,32,0.4)';
    e.sides = 4;
    e.r = 14;
    e.shootCd = 60 + Math.floor(Math.random() * 60);
  } else if (type === 'splitter') {
    e.speed = baseSpeed * 0.7;
    e.color = '#c040ff';
    e.glow = 'rgba(192,64,255,0.4)';
    e.sides = 5;
    e.r = 18;
    e.hp = 3;
  }
  return e;
}

function spawnWave() {
  wave++;
  const count = 4 + wave * 2 + Math.floor(wave / 3);
  enemiesLeft = count;
  waveTimer = 0;
  for (let i = 0; i < Math.min(count, 6); i++) {
    enemies.push(spawnEnemy());
  }
  document.getElementById('wave-display').textContent = 'WAVE ' + wave;
}

// --- Particles ---
function explode(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed + 1;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      r: Math.random() * 3 + 1,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      color
    });
  }
}

// --- Power-ups ---
function maybeDropPowerup(x, y) {
  if (Math.random() > 0.12) return;
  const types = ['heal', 'rapid', 'spread'];
  const type = types[Math.floor(Math.random() * types.length)];
  const colors = { heal: '#40ff80', rapid: '#ffff40', spread: '#40c0ff' };
  powerups.push({ x, y, type, r: 10, life: 400, color: colors[type] });
}

// --- Game Start ---
function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  player = initPlayer();
  bullets = [];
  enemies = [];
  particles = [];
  powerups = [];
  score = 0;
  combo = 0;
  comboTimer = 0;
  wave = 0;
  screenShake = 0;
  initStars();
  spawnWave();
  running = true;
  loop();
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// --- Shooting ---
let rapidTimer = 0, spreadTimer = 0;

function shoot() {
  if (player.shootCd > 0) return;
  const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const speed = 10;
  const makeB = (angle) => ({
    x: player.x + Math.cos(angle) * player.r,
    y: player.y + Math.sin(angle) * player.r,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: 3,
    life: 80,
    color: '#c0a0ff'
  });
  bullets.push(makeB(a));
  if (spreadTimer > 0) {
    bullets.push(makeB(a - 0.2));
    bullets.push(makeB(a + 0.2));
  }
  player.shootCd = rapidTimer > 0 ? 4 : player.shootRate;
}

// --- Update ---
function update() {
  // Player movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  if (dx || dy) {
    const len = Math.sqrt(dx * dx + dy * dy);
    player.x += (dx / len) * player.speed;
    player.y += (dy / len) * player.speed;
  }
  player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
  player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

  // Trail
  player.trail.push({ x: player.x, y: player.y });
  if (player.trail.length > 12) player.trail.shift();

  // Shoot
  if (mouse.down) shoot();
  if (player.shootCd > 0) player.shootCd--;
  if (player.invuln > 0) player.invuln--;
  if (rapidTimer > 0) rapidTimer--;
  if (spreadTimer > 0) spreadTimer--;

  // Combo decay
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 0;
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0 || b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
      bullets.splice(i, 1);
      continue;
    }
    // Enemy bullet check
    if (b.enemy) {
      const ddx = b.x - player.x, ddy = b.y - player.y;
      if (Math.sqrt(ddx * ddx + ddy * ddy) < player.r + b.r && player.invuln <= 0) {
        player.hp--;
        player.invuln = 60;
        screenShake = 12;
        explode(player.x, player.y, '#ff4060', 15, 4);
        bullets.splice(i, 1);
        if (player.hp <= 0) { gameOver(); return; }
      }
      continue;
    }
    // Hit enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const ddx = b.x - e.x, ddy = b.y - e.y;
      if (Math.sqrt(ddx * ddx + ddy * ddy) < e.r + b.r) {
        e.hp--;
        explode(b.x, b.y, e.color, 6, 3);
        bullets.splice(i, 1);
        if (e.hp <= 0) {
          killEnemy(j);
        }
        break;
      }
    }
  }

  // Enemies
  waveTimer++;
  // Trickle spawn remaining enemies
  if (enemiesLeft > enemies.length && waveTimer % 40 === 0) {
    enemies.push(spawnEnemy());
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.timer++;
    e.angle += 0.03;

    if (e.type === 'chaser') {
      const a = Math.atan2(player.y - e.y, player.x - e.x);
      e.x += Math.cos(a) * e.speed;
      e.y += Math.sin(a) * e.speed;
    } else if (e.type === 'drifter') {
      e.x += e.vx;
      e.y += e.vy;
      if (e.x < 0 || e.x > canvas.width) e.vx *= -1;
      if (e.y < 0 || e.y > canvas.height) e.vy *= -1;
    } else if (e.type === 'shooter') {
      const a = Math.atan2(player.y - e.y, player.x - e.x);
      e.x += Math.cos(a) * e.speed;
      e.y += Math.sin(a) * e.speed;
      e.shootCd--;
      if (e.shootCd <= 0) {
        const ba = Math.atan2(player.y - e.y, player.x - e.x);
        bullets.push({
          x: e.x, y: e.y,
          vx: Math.cos(ba) * 5, vy: Math.sin(ba) * 5,
          r: 4, life: 120, color: '#ffaa20', enemy: true
        });
        e.shootCd = Math.max(40, 90 - wave * 5);
      }
    } else if (e.type === 'splitter') {
      const a = Math.atan2(player.y - e.y, player.x - e.x);
      e.x += Math.cos(a) * e.speed;
      e.y += Math.sin(a) * e.speed;
    }

    // Collision with player
    const ddx = e.x - player.x, ddy = e.y - player.y;
    if (Math.sqrt(ddx * ddx + ddy * ddy) < player.r + e.r && player.invuln <= 0) {
      player.hp--;
      player.invuln = 60;
      screenShake = 10;
      explode(player.x, player.y, '#ff4060', 15, 4);
      if (player.hp <= 0) { gameOver(); return; }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Power-ups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.life--;
    if (pu.life <= 0) { powerups.splice(i, 1); continue; }
    const ddx = pu.x - player.x, ddy = pu.y - player.y;
    if (Math.sqrt(ddx * ddx + ddy * ddy) < player.r + pu.r) {
      if (pu.type === 'heal') {
        player.hp = Math.min(player.hp + 1, player.maxHp);
      } else if (pu.type === 'rapid') {
        rapidTimer = 300;
      } else if (pu.type === 'spread') {
        spreadTimer = 300;
      }
      explode(pu.x, pu.y, pu.color, 20, 5);
      powerups.splice(i, 1);
    }
  }

  // Next wave
  if (enemies.length === 0 && enemiesLeft <= 0) {
    spawnWave();
  }

  // Screenshake decay
  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.5) screenShake = 0;

  // Stars drift
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  }

  // HUD
  document.getElementById('score-display').textContent = score;
  document.getElementById('combo-display').textContent = combo > 1 ? `x${combo} COMBO` : '';
  document.getElementById('hp-display').textContent = '❤️'.repeat(player.hp) + '🖤'.repeat(player.maxHp - player.hp);
}

function killEnemy(idx) {
  const e = enemies[idx];
  explode(e.x, e.y, e.color, 25, 6);
  screenShake = 8;

  // Splitter spawns mini chasers
  if (e.type === 'splitter') {
    for (let k = 0; k < 3; k++) {
      const a = (Math.PI * 2 / 3) * k;
      const mini = {
        x: e.x + Math.cos(a) * 20,
        y: e.y + Math.sin(a) * 20,
        type: 'chaser', r: 8, hp: 1,
        speed: e.speed * 1.3,
        color: '#d080ff', glow: 'rgba(208,128,255,0.4)',
        sides: 3, angle: 0, timer: 0
      };
      enemies.push(mini);
    }
  }

  combo++;
  comboTimer = 90;
  const mult = Math.min(combo, 10);
  const pts = 10 * mult;
  score += pts;
  enemiesLeft--;
  maybeDropPowerup(e.x, e.y);
  enemies.splice(idx, 1);
}

function gameOver() {
  running = false;
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('novastorm-hi', String(hiScore));
  }
  document.getElementById('hud').style.display = 'none';
  document.getElementById('game-over').style.display = 'flex';
  document.getElementById('final-score').textContent = `Score: ${score}` + (score >= hiScore ? ' ★ NEW BEST!' : ` (Best: ${hiScore})`);
  document.getElementById('final-wave').textContent = `Reached Wave ${wave}`;
}

// --- Draw ---
function drawPoly(x, y, r, sides, angle, color, glow) {
  ctx.save();
  ctx.shadowColor = glow || color;
  ctx.shadowBlur = 18;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const a = angle + (Math.PI * 2 / sides) * i - Math.PI / 2;
    const px = x + Math.cos(a) * r;
    const py = y + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function draw() {
  ctx.save();
  if (screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake * 2,
      (Math.random() - 0.5) * screenShake * 2
    );
  }

  // BG
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(60,40,120,0.08)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = 0; x < canvas.width; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Player trail
  for (let i = 0; i < player.trail.length; i++) {
    const t = player.trail[i];
    const a = i / player.trail.length;
    ctx.globalAlpha = a * 0.3;
    ctx.fillStyle = '#a060ff';
    ctx.beginPath();
    ctx.arc(t.x, t.y, player.r * a * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Player
  if (player.invuln <= 0 || Math.floor(player.invuln / 4) % 2 === 0) {
    ctx.save();
    ctx.shadowColor = 'rgba(160,96,255,0.8)';
    ctx.shadowBlur = 25;
    ctx.strokeStyle = '#c0a0ff';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const pa = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    // Diamond shape pointing at mouse
    const pts = [
      [player.x + Math.cos(pa) * player.r * 1.3, player.y + Math.sin(pa) * player.r * 1.3],
      [player.x + Math.cos(pa + 2.3) * player.r, player.y + Math.sin(pa + 2.3) * player.r],
      [player.x + Math.cos(pa + Math.PI) * player.r * 0.7, player.y + Math.sin(pa + Math.PI) * player.r * 0.7],
      [player.x + Math.cos(pa - 2.3) * player.r, player.y + Math.sin(pa - 2.3) * player.r],
    ];
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = 'rgba(160,96,255,0.15)';
    ctx.fill();
    ctx.restore();
  }

  // Bullets
  for (const b of bullets) {
    ctx.save();
    ctx.shadowColor = b.enemy ? 'rgba(255,170,32,0.8)' : 'rgba(192,160,255,0.8)';
    ctx.shadowBlur = 12;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Enemies
  for (const e of enemies) {
    drawPoly(e.x, e.y, e.r, e.sides, e.angle, e.color, e.glow);
    // HP pips for multi-hp enemies
    if (e.hp > 1) {
      ctx.fillStyle = e.color;
      ctx.globalAlpha = 0.7;
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('•'.repeat(e.hp), e.x, e.y + e.r + 12);
      ctx.globalAlpha = 1;
    }
  }

  // Power-ups
  for (const pu of powerups) {
    const pulse = 1 + Math.sin(pu.life * 0.1) * 0.2;
    ctx.save();
    ctx.shadowColor = pu.color;
    ctx.shadowBlur = 20;
    ctx.strokeStyle = pu.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, pu.r * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = pu.color;
    ctx.globalAlpha = 0.3;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    const icons = { heal: '+', rapid: '⚡', spread: '◈' };
    ctx.fillText(icons[pu.type], pu.x, pu.y + 4);
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// --- Loop ---
function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

initStars();
</script>
</body>
</html>
