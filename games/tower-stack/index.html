<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tower Stack — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
  font-family: 'Courier New', monospace;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; overflow: hidden; color: #fff;
  touch-action: none;
}
.back-link {
  position: fixed; top: 12px; left: 16px;
  color: #4040aa; text-decoration: none; font-size: 13px; z-index: 100;
}
.back-link:hover { color: #6c5ce7; }

#game-wrapper {
  position: relative;
  width: 400px; height: 600px;
  max-width: 95vw; max-height: 90vh;
}
canvas { width: 100%; height: 100%; border-radius: 16px; box-shadow: 0 0 40px rgba(108,92,231,0.25); }

.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: rgba(10,10,26,0.92); border-radius: 16px; z-index: 10;
  transition: opacity 0.3s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay h1 {
  font-size: 2.2rem; letter-spacing: 0.15em;
  background: linear-gradient(90deg, #00d4ff, #ff2d78, #39ff14, #ffb300);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.overlay .subtitle { font-size: 0.85rem; color: #555577; margin-bottom: 28px; letter-spacing: 0.1em; }
.overlay .score-display { font-size: 3.5rem; color: #ffb300; text-shadow: 0 0 20px #ffb30066; margin: 8px 0; }
.overlay .high-score { font-size: 0.8rem; color: #6c5ce7; margin-bottom: 20px; letter-spacing: 0.1em; }
.btn {
  font-family: 'Courier New', monospace; font-size: 0.95rem;
  padding: 12px 36px; border: 2px solid #6c5ce7; border-radius: 4px;
  cursor: pointer; background: transparent; color: #6c5ce7;
  letter-spacing: 0.15em; text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
}
.btn:hover { background: #6c5ce7; color: #fff; }

#hud {
  position: absolute; top: 16px; left: 0; right: 0;
  display: flex; justify-content: space-between; padding: 0 20px;
  z-index: 5; pointer-events: none;
}
#hud .label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: #444466; }
#hud .value { font-size: 1.4rem; color: #fff; }

#perfect-text {
  position: absolute; top: 38%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.8rem; letter-spacing: 0.15em;
  color: #fff; text-shadow: 0 0 20px #fff;
  z-index: 6; opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#combo {
  position: absolute; top: 48%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.1rem; color: #ffb300; letter-spacing: 0.1em;
  z-index: 6; opacity: 0; pointer-events: none;
}
.monday-badge {
  position: absolute; bottom: 12px; right: 16px;
  font-size: 0.6rem; color: #222244; z-index: 5; pointer-events: none;
}
</style>
</head>
<body>
<a class="back-link" href="/">← Back to Arcade</a>

<div id="game-wrapper">
  <canvas id="game"></canvas>
  <div id="hud">
    <div><div class="label">Score</div><div class="value" id="score-val">0</div></div>
    <div style="text-align:right"><div class="label">Best</div><div class="value" id="best-val">0</div></div>
  </div>
  <div id="perfect-text">✨ PERFECT!</div>
  <div id="combo"></div>

  <div class="overlay" id="start-screen">
    <h1>TOWER STACK</h1>
    <p class="subtitle">Tap to stack. Don't miss!</p>
    <button class="btn" onclick="startGame()">PLAY</button>
    <p style="color:#222244;font-size:0.65rem;margin-top:16px">Built by Míriel, Orion, Elanor, Narvi, Nova</p>
  </div>

  <div class="overlay hidden" id="gameover-screen">
    <h1>GAME OVER</h1>
    <div class="score-display" id="final-score">0</div>
    <p class="high-score" id="high-score-text">Best: 0</p>
    <button class="btn" onclick="startGame()">PLAY AGAIN</button>
  </div>

  <div class="monday-badge">monday arcade</div>
</div>

<script src="../shared/sounds.js"></script>
<script>
ArcadeSound.initSoundButton(document.body);

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const DPR = Math.min(window.devicePixelRatio || 1, 2);
const W = 400, H = 600;
canvas.width = W * DPR;
canvas.height = H * DPR;
ctx.scale(DPR, DPR);

let blocks = [], currentBlock = null, gameRunning = false;
let score = 0, highScore = parseInt(localStorage.getItem('towerstack-best') || '0');
let combo = 0, cameraY = 0, targetCameraY = 0;
let particles = [], shakeAmount = 0, perfectTimer = 0;

// Elanor's neon color palette
const NEON_COLORS = [
  ['#00d4ff', '#00a8cc'], // cyan
  ['#ff2d78', '#cc2060'], // pink
  ['#39ff14', '#2acc10'], // lime
  ['#ffb300', '#cc8e00'], // amber
  ['#a855f7', '#8833cc'], // purple
  ['#ff6b35', '#cc5228'], // orange
];

const BLOCK_HEIGHT = 28;
const BASE_SPEED = 2.2;
const PERFECT_THRESHOLD = 2; // ±2px tolerance (Narvi)
const MIN_WIDTH = 14;
const MAX_SPEED = 7; // Narvi: speed cap

document.getElementById('best-val').textContent = highScore;

function getColor(index) { return NEON_COLORS[index % NEON_COLORS.length]; }

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 6;
    this.vy = -Math.random() * 4 - 1;
    this.life = 1;
    this.decay = 0.025 + Math.random() * 0.02;
    this.size = 1.5 + Math.random() * 3;
    this.color = color;
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.12; this.life -= this.decay; }
  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, w, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x + Math.random() * w, y, color));
  }
}

// Stars
const stars = Array.from({ length: 60 }, () => ({
  x: Math.random() * W, y: Math.random() * H,
  size: Math.random() * 1.5 + 0.5,
  alpha: Math.random() * 0.5 + 0.2,
  twinkle: Math.random() * Math.PI * 2
}));

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const t = Date.now() * 0.001;
  stars.forEach(s => {
    ctx.globalAlpha = s.alpha * (0.6 + 0.4 * Math.sin(t + s.twinkle));
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y % H, s.size, s.size);
  });
  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBlock(block) {
  const [c1, c2] = getColor(block.index);
  const isSmall = block.width < 40;

  ctx.shadowColor = c1;
  ctx.shadowBlur = isSmall ? 4 : 8;

  const grad = ctx.createLinearGradient(block.x, block.y, block.x, block.y + BLOCK_HEIGHT);
  grad.addColorStop(0, c1);
  grad.addColorStop(1, c2);
  ctx.fillStyle = grad;
  roundRect(block.x, block.y, block.width, BLOCK_HEIGHT, 5);
  ctx.fill();

  // Highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(block.x + 2, block.y + 2, block.width - 4, BLOCK_HEIGHT / 2 - 2, 3);
  ctx.fill();
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  blocks = []; particles = [];
  score = 0; combo = 0; cameraY = 0; targetCameraY = 0; shakeAmount = 0;

  const baseW = 120;
  blocks.push({ x: (W - baseW) / 2, y: H - 60, width: baseW, index: 0, settled: true });
  spawnNewBlock();
  gameRunning = true;
  updateHUD();
}

function spawnNewBlock() {
  const prev = blocks[blocks.length - 1];
  // Narvi: cap speed to prevent impossible difficulty
  const speed = Math.min(BASE_SPEED + score * 0.07, MAX_SPEED);
  const dir = blocks.length % 2 === 0 ? 1 : -1;
  currentBlock = {
    x: dir > 0 ? -prev.width : W,
    y: prev.y - BLOCK_HEIGHT - 2,
    width: prev.width,
    index: blocks.length,
    speed: speed * dir,
    settled: false
  };
}

function dropBlock() {
  if (!currentBlock || !gameRunning) return;
  const prev = blocks[blocks.length - 1];
  const cur = currentBlock;

  // Narvi: proper intersection calculation (handles overhang on EITHER side)
  const overlapLeft = Math.max(cur.x, prev.x);
  const overlapRight = Math.min(cur.x + cur.width, prev.x + prev.width);
  const overlapWidth = overlapRight - overlapLeft;

  if (overlapWidth <= 0) { gameOver(); return; }

  // Narvi: ±2px perfect threshold
  const centerDiff = Math.abs((cur.x + cur.width / 2) - (prev.x + prev.width / 2));

  if (centerDiff <= PERFECT_THRESHOLD) {
    // Perfect!
    combo++;
    ArcadeSound.success();
    if (combo >= 2) ArcadeSound.combo(combo);
    cur.x = prev.x; cur.width = prev.width;
    cur.settled = true; blocks.push(cur);
    const [c1] = getColor(cur.index);
    spawnParticles(cur.x, cur.y, cur.width, c1, 16);
    spawnParticles(cur.x, cur.y, cur.width, '#ffffff', 8);
    showPerfect();
    // Slight width bonus on perfect
    if (cur.width < 120) { cur.width = Math.min(cur.width + 3, 120); cur.x = prev.x + (prev.width - cur.width) / 2; }
  } else {
    combo = 0;
    ArcadeSound.tap();
    ArcadeSound.pop();
    cur.x = overlapLeft; cur.width = overlapWidth;
    cur.settled = true; blocks.push(cur);
    const [c1] = getColor(cur.index);
    spawnParticles(overlapLeft, cur.y, overlapWidth, c1, 6);
  }

  score++;
  shakeAmount = 2.5;

  if (cur.width < MIN_WIDTH) { gameOver(); return; }
  if (cur.y < H * 0.45) targetCameraY += BLOCK_HEIGHT + 2;

  spawnNewBlock();
  updateHUD();
}

function showPerfect() {
  const el = document.getElementById('perfect-text');
  const [c1] = getColor(blocks.length);
  el.style.color = '#fff';
  el.style.textShadow = `0 0 20px ${c1}`;
  el.style.opacity = '1';
  perfectTimer = 45;
  const comboEl = document.getElementById('combo');
  if (combo >= 2) { comboEl.textContent = combo + '× COMBO!'; comboEl.style.opacity = '1'; }
}

function gameOver() {
  ArcadeSound.gameOver();
  gameRunning = false; currentBlock = null; shakeAmount = 8;
  if (score > highScore) { highScore = score; localStorage.setItem('towerstack-best', highScore.toString()); }
  setTimeout(() => {
    document.getElementById('final-score').textContent = score;
    document.getElementById('high-score-text').textContent = 'Best: ' + highScore;
    document.getElementById('gameover-screen').classList.remove('hidden');
  }, 500);
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('best-val').textContent = highScore;
}

function gameLoop() {
  drawBackground();
  cameraY += (targetCameraY - cameraY) * 0.08;

  let sx = 0, sy = 0;
  if (shakeAmount > 0) {
    sx = (Math.random() - 0.5) * shakeAmount;
    sy = (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.88;
    if (shakeAmount < 0.3) shakeAmount = 0;
  }

  ctx.save();
  ctx.translate(sx, sy + cameraY);
  blocks.forEach(b => drawBlock(b));

  if (currentBlock && gameRunning) {
    // Narvi: bounce correctly at edges
    currentBlock.x += currentBlock.speed;
    if (currentBlock.x + currentBlock.width > W) {
      currentBlock.x = W - currentBlock.width;
      currentBlock.speed = -Math.abs(currentBlock.speed);
    }
    if (currentBlock.x < 0) {
      currentBlock.x = 0;
      currentBlock.speed = Math.abs(currentBlock.speed);
    }
    drawBlock(currentBlock);
  }

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });
  ctx.restore();

  if (perfectTimer > 0) {
    perfectTimer--;
    if (perfectTimer === 0) {
      document.getElementById('perfect-text').style.opacity = '0';
      document.getElementById('combo').style.opacity = '0';
    }
  }
  requestAnimationFrame(gameLoop);
}

// Input — Narvi: prevent scroll on mobile
document.addEventListener('click', e => { if (!gameRunning || e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return; dropBlock(); });
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); if (gameRunning) dropBlock(); } });
document.addEventListener('touchstart', e => {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
  e.preventDefault();
  if (gameRunning) dropBlock();
}, { passive: false });

gameLoop();
</script>
</body>
</html>
