<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Drift — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #05050a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff; overflow: hidden;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
.back-link {
  position: fixed; top: 12px; left: 16px;
  color: #4040aa; text-decoration: none; font-size: 13px; z-index: 100;
}
.back-link:hover { color: #00d4ff; }
#header {
  text-align: center; margin-bottom: 4px;
  font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #333355;
}
#header h1 {
  font-size: 1.8rem; letter-spacing: 0.2em;
  background: linear-gradient(90deg, #00d4ff, #ff006e, #ffd93d, #00d4ff);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: shimmer 3s ease infinite;
}
@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
#stats { display: flex; gap: 24px; font-size: 0.8rem; margin-top: 4px; color: #444466; justify-content: center; }
#stats span { color: #00d4ff; }
canvas { border-radius: 8px; display: block; margin-top: 4px; }
#overlay {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(5,5,10,0.94); z-index: 50;
  transition: opacity 0.3s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
#overlay h2 {
  font-size: 2.2rem; letter-spacing: 0.2em; margin-bottom: 12px;
  background: linear-gradient(90deg, #00d4ff, #ff006e, #ffd93d);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#overlay .sub { color: #555577; font-size: 0.85rem; margin-bottom: 24px; }
#overlay .score-line { color: #ffd93d; font-size: 1.3rem; margin-bottom: 8px; }
#overlay .best-line { color: #00d4ff; font-size: 0.9rem; margin-bottom: 24px; }
#overlay .btn {
  padding: 12px 36px; border: 1px solid #00d4ff44;
  background: #00d4ff11; color: #00d4ff; font-family: inherit;
  font-size: 0.9rem; letter-spacing: 0.15em; cursor: pointer;
  border-radius: 6px; transition: all 0.2s;
}
#overlay .btn:hover { background: #00d4ff33; border-color: #00d4ff88; }
#combo-popup {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 2rem; font-weight: bold; z-index: 40;
  pointer-events: none; opacity: 0;
  text-shadow: 0 0 30px currentColor;
  transition: transform 0.2s ease-out, opacity 0.5s;
}
#combo-popup.show {
  transform: translate(-50%, -50%) scale(1.2);
  opacity: 1;
}
#mobile-controls {
  display: none; position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%); z-index: 60; gap: 16px;
}
@media (pointer: coarse) {
  #mobile-controls { display: flex; }
}
.mobile-btn {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
  color: #00d4ff; font-size: 1.4rem; display: flex;
  align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.mobile-btn:active { background: rgba(0,212,255,0.3); }
</style>
</head>
<body>
<a href="/" class="back-link">← ARCADE</a>
<div id="header">
  <h1>🏎️ NEON DRIFT</h1>
  <div id="stats">
    SCORE <span id="score-display">0</span>
    &nbsp;|&nbsp; DRIFT <span id="drift-display">0x</span>
    &nbsp;|&nbsp; BEST <span id="best-display">0</span>
  </div>
</div>
<canvas id="game"></canvas>

<div id="overlay">
  <h2>NEON DRIFT</h2>
  <div class="sub">drift through neon circuits — chain combos for glory</div>
  <div class="score-line" id="final-score" style="display:none">Score: 0</div>
  <div class="best-line" id="final-best" style="display:none">Best: 0</div>
  <button class="btn" id="start-btn">START</button>
  <div class="sub" style="margin-top:16px; font-size:0.7rem; color:#333">
    ← → to steer &nbsp;|&nbsp; HOLD SPACE to drift &nbsp;|&nbsp; ↑ boost
  </div>
</div>

<div id="combo-popup"></div>

<div id="mobile-controls">
  <button class="mobile-btn" id="m-left">◀</button>
  <button class="mobile-btn" id="m-drift" style="width:80px; border-radius:12px; font-size:0.7rem;">DRIFT</button>
  <button class="mobile-btn" id="m-right">▶</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const comboPopup = document.getElementById('combo-popup');
const scoreEl = document.getElementById('score-display');
const driftEl = document.getElementById('drift-display');
const bestEl = document.getElementById('best-display');
const finalScore = document.getElementById('final-score');
const finalBest = document.getElementById('final-best');

// Sizing
function resize() {
  const s = Math.min(window.innerWidth - 20, window.innerHeight - 120, 600);
  canvas.width = s;
  canvas.height = s;
}
resize();
window.addEventListener('resize', resize);

// State
let running = false;
let score = 0;
let best = parseInt(localStorage.getItem('neon-drift-best') || '0');
let driftCombo = 0;
let driftTimer = 0;
let comboTimeout = null;
bestEl.textContent = best;

// Track generation
const TRACK_SEGMENTS = 200;
const TRACK_WIDTH = 120;
let track = []; // array of { x, y } center points
let trackAngle = 0;

function generateTrack() {
  track = [];
  let x = canvas.width / 2;
  let y = canvas.height - 80;
  let angle = -Math.PI / 2;
  for (let i = 0; i < TRACK_SEGMENTS; i++) {
    track.push({ x, y });
    // Gentle curves with occasional sharp turns
    const curvature = Math.sin(i * 0.05) * 0.04 + Math.sin(i * 0.13) * 0.03 + Math.sin(i * 0.31) * 0.02;
    angle += curvature;
    x += Math.cos(angle) * 18;
    y += Math.sin(angle) * 18;
  }
}

// Car
const car = {
  x: 0, y: 0, angle: 0,
  speed: 0, maxSpeed: 4, drift: 0,
  trackPos: 5, // position along track
  lateralOffset: 0,
  trail: [], // glowing trail points
  particles: [],
  alive: true
};

// Input
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile
let mobileLeft = false, mobileRight = false, mobileDrift = false;
const ml = document.getElementById('m-left');
const mr = document.getElementById('m-right');
const md = document.getElementById('m-drift');
ml.addEventListener('touchstart', e => { e.preventDefault(); mobileLeft = true; });
ml.addEventListener('touchend', e => { mobileLeft = false; });
mr.addEventListener('touchstart', e => { e.preventDefault(); mobileRight = true; });
mr.addEventListener('touchend', e => { mobileRight = false; });
md.addEventListener('touchstart', e => { e.preventDefault(); mobileDrift = true; });
md.addEventListener('touchend', e => { mobileDrift = false; });

// Colors
const NEON_COLORS = ['#00d4ff', '#ff006e', '#ffd93d', '#39ff14', '#ff6b35', '#bf5af2'];
let carColor = NEON_COLORS[0];
let frameCount = 0;

function getTrackPoint(pos) {
  const idx = Math.floor(pos);
  const frac = pos - idx;
  if (idx < 0 || idx >= track.length - 1) return track[Math.max(0, Math.min(idx, track.length - 1))];
  const a = track[idx];
  const b = track[idx + 1];
  return { x: a.x + (b.x - a.x) * frac, y: a.y + (b.y - a.y) * frac };
}

function getTrackAngle(pos) {
  const idx = Math.floor(pos);
  if (idx < 0 || idx >= track.length - 1) return 0;
  const a = track[idx];
  const b = track[idx + 1];
  return Math.atan2(b.y - a.y, b.x - a.x);
}

function spawnParticle(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    car.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function showCombo(text, color) {
  comboPopup.textContent = text;
  comboPopup.style.color = color;
  comboPopup.classList.remove('show');
  void comboPopup.offsetWidth;
  comboPopup.classList.add('show');
  clearTimeout(comboTimeout);
  comboTimeout = setTimeout(() => comboPopup.classList.remove('show'), 800);
}

function startGame() {
  generateTrack();
  car.trackPos = 5;
  car.lateralOffset = 0;
  car.speed = 0;
  car.drift = 0;
  car.trail = [];
  car.particles = [];
  car.alive = true;
  score = 0;
  driftCombo = 0;
  driftTimer = 0;
  frameCount = 0;
  carColor = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
  overlay.classList.add('hidden');
  running = true;
  loop();
}

function endGame() {
  running = false;
  if (score > best) {
    best = score;
    localStorage.setItem('neon-drift-best', best);
  }
  bestEl.textContent = best;
  finalScore.textContent = `Score: ${score}`;
  finalScore.style.display = '';
  finalBest.textContent = `Best: ${best}`;
  finalBest.style.display = '';
  startBtn.textContent = 'RETRY';
  overlay.classList.remove('hidden');
}

function update() {
  if (!car.alive) return;
  frameCount++;

  const steerLeft = keys['ArrowLeft'] || keys['KeyA'] || mobileLeft;
  const steerRight = keys['ArrowRight'] || keys['KeyD'] || mobileRight;
  const isDrifting = keys['Space'] || mobileDrift;
  const boost = keys['ArrowUp'] || keys['KeyW'];

  // Speed
  const targetSpeed = boost ? car.maxSpeed * 1.4 : car.maxSpeed;
  car.speed += (targetSpeed - car.speed) * 0.05;

  // Move along track
  car.trackPos += car.speed * 0.15;

  // Check if reached end
  if (car.trackPos >= track.length - 2) {
    // Generate a new track seamlessly
    generateTrack();
    car.trackPos = 5;
    car.lateralOffset = 0;
    // Bonus for completing a circuit
    score += 500;
    showCombo('CIRCUIT COMPLETE! +500', '#ffd93d');
  }

  // Get track curvature
  const angleHere = getTrackAngle(car.trackPos);
  const angleAhead = getTrackAngle(Math.min(car.trackPos + 3, track.length - 2));
  const curvature = angleAhead - angleHere;

  // Steering
  const steerForce = isDrifting ? 3.5 : 2.2;
  if (steerLeft) car.lateralOffset -= steerForce;
  if (steerRight) car.lateralOffset += steerForce;

  // Drift physics — car slides outward on curves
  if (isDrifting) {
    car.drift += curvature * 60;
    car.lateralOffset += car.drift * 0.3;
    car.drift *= 0.92;

    // Drift scoring
    if (Math.abs(car.drift) > 0.5) {
      driftTimer++;
      if (driftTimer % 10 === 0) {
        driftCombo++;
        const points = driftCombo * 10;
        score += points;
        if (driftCombo % 5 === 0) {
          showCombo(`${driftCombo}x DRIFT! +${points}`, '#ff006e');
        }
      }
    }
  } else {
    if (driftCombo > 0 && driftTimer > 0) {
      // Land the drift
      const bonus = driftCombo * 25;
      score += bonus;
      if (driftCombo >= 3) showCombo(`DRIFT LANDED! +${bonus}`, '#39ff14');
    }
    driftCombo = 0;
    driftTimer = 0;
    car.drift *= 0.85;
  }

  // Clamp lateral offset (stay on track)
  const halfTrack = TRACK_WIDTH / 2 - 8;
  if (Math.abs(car.lateralOffset) > halfTrack) {
    // Scraping the wall — slow down and spawn sparks
    car.speed *= 0.96;
    car.lateralOffset = Math.sign(car.lateralOffset) * halfTrack;
    const pt = getTrackPoint(car.trackPos);
    spawnParticle(pt.x, pt.y, '#ffd93d', 2);

    // Too much wall contact = crash
    if (Math.abs(car.lateralOffset) >= halfTrack && Math.abs(car.drift) > 3) {
      car.alive = false;
      spawnParticle(pt.x, pt.y, '#ff006e', 30);
      setTimeout(endGame, 600);
      return;
    }
  }

  // Natural centering force
  car.lateralOffset *= 0.995;

  // Distance score
  if (frameCount % 6 === 0) score += 1;

  // Update position
  const pt = getTrackPoint(car.trackPos);
  const angle = getTrackAngle(car.trackPos);
  const perpX = Math.cos(angle + Math.PI / 2);
  const perpY = Math.sin(angle + Math.PI / 2);
  car.x = pt.x + perpX * car.lateralOffset;
  car.y = pt.y + perpY * car.lateralOffset;
  car.angle = angle + car.drift * 0.1;

  // Trail
  car.trail.push({
    x: car.x, y: car.y,
    life: 1,
    drifting: isDrifting && Math.abs(car.drift) > 0.3
  });
  if (car.trail.length > 150) car.trail.shift();

  // Drift particles
  if (isDrifting && Math.abs(car.drift) > 0.5) {
    spawnParticle(car.x, car.y, '#ff006e', 1);
  }
  if (boost) {
    spawnParticle(car.x - Math.cos(car.angle) * 10, car.y - Math.sin(car.angle) * 10, carColor, 1);
  }

  // Update particles
  car.particles = car.particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= p.decay;
    return p.life > 0;
  });

  // Update trail
  car.trail.forEach(t => t.life -= 0.007);
  car.trail = car.trail.filter(t => t.life > 0);

  // UI
  scoreEl.textContent = score;
  driftEl.textContent = driftCombo > 0 ? `${driftCombo}x` : '0x';
}

function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#05050a';
  ctx.fillRect(0, 0, w, h);

  // Camera follows car
  const camX = car.x - w / 2;
  const camY = car.y - h / 2;

  ctx.save();
  ctx.translate(-camX, -camY);

  // Draw grid background
  ctx.strokeStyle = '#0a0a1a';
  ctx.lineWidth = 1;
  const gridSize = 40;
  const startX = Math.floor(camX / gridSize) * gridSize;
  const startY = Math.floor(camY / gridSize) * gridSize;
  for (let gx = startX; gx < camX + w; gx += gridSize) {
    ctx.beginPath(); ctx.moveTo(gx, camY); ctx.lineTo(gx, camY + h); ctx.stroke();
  }
  for (let gy = startY; gy < camY + h; gy += gridSize) {
    ctx.beginPath(); ctx.moveTo(camX, gy); ctx.lineTo(camX + w, gy); ctx.stroke();
  }

  // Draw track
  const visStart = Math.max(0, Math.floor(car.trackPos) - 30);
  const visEnd = Math.min(track.length - 1, Math.floor(car.trackPos) + 50);

  // Track glow
  ctx.lineWidth = TRACK_WIDTH + 10;
  ctx.strokeStyle = 'rgba(0,212,255,0.03)';
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = visStart; i <= visEnd; i++) {
    const p = track[i];
    if (i === visStart) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  // Track surface
  ctx.lineWidth = TRACK_WIDTH;
  ctx.strokeStyle = '#0d0d18';
  ctx.beginPath();
  for (let i = visStart; i <= visEnd; i++) {
    const p = track[i];
    if (i === visStart) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  // Track edges (neon lines)
  for (let side = -1; side <= 1; side += 2) {
    ctx.lineWidth = 2;
    ctx.strokeStyle = side === -1 ? 'rgba(0,212,255,0.5)' : 'rgba(255,0,110,0.5)';
    ctx.beginPath();
    for (let i = visStart; i <= visEnd; i++) {
      const p = track[i];
      let angle;
      if (i < track.length - 1) angle = Math.atan2(track[i + 1].y - p.y, track[i + 1].x - p.x);
      else angle = Math.atan2(p.y - track[i - 1].y, p.x - track[i - 1].x);
      const perpX = Math.cos(angle + Math.PI / 2) * (TRACK_WIDTH / 2) * side;
      const perpY = Math.sin(angle + Math.PI / 2) * (TRACK_WIDTH / 2) * side;
      if (i === visStart) ctx.moveTo(p.x + perpX, p.y + perpY);
      else ctx.lineTo(p.x + perpX, p.y + perpY);
    }
    ctx.stroke();

    // Edge glow
    ctx.lineWidth = 6;
    ctx.strokeStyle = side === -1 ? 'rgba(0,212,255,0.08)' : 'rgba(255,0,110,0.08)';
    ctx.stroke();
  }

  // Draw trail
  for (let i = 1; i < car.trail.length; i++) {
    const t = car.trail[i];
    const prev = car.trail[i - 1];
    const alpha = t.life * 0.6;
    ctx.lineWidth = t.drifting ? 4 : 2;
    ctx.strokeStyle = t.drifting
      ? `rgba(255,0,110,${alpha})`
      : `rgba(0,212,255,${alpha * 0.5})`;
    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(t.x, t.y);
    ctx.stroke();

    // Trail glow
    if (t.drifting) {
      ctx.lineWidth = 10;
      ctx.strokeStyle = `rgba(255,0,110,${alpha * 0.15})`;
      ctx.stroke();
    }
  }

  // Draw particles
  car.particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Draw car
  if (car.alive) {
    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);

    // Car glow
    ctx.shadowColor = carColor;
    ctx.shadowBlur = 20;

    // Car body
    ctx.fillStyle = carColor;
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-6, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fill();

    // Inner glow
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-3, -3);
    ctx.lineTo(-1, 0);
    ctx.lineTo(-3, 3);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  ctx.restore();

  // Speed lines effect when boosting
  if ((keys['ArrowUp'] || keys['KeyW']) && car.alive) {
    ctx.strokeStyle = 'rgba(0,212,255,0.1)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const sx = Math.random() * w;
      const sy = Math.random() * h;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx - 20, sy + 30);
      ctx.stroke();
    }
  }

  // Vignette
  const vignette = ctx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.7);
  vignette.addColorStop(0, 'rgba(5,5,10,0)');
  vignette.addColorStop(1, 'rgba(5,5,10,0.6)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, w, h);
}

function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', startGame);
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && !running) startGame();
});

// Initial draw
draw();
</script>
</body>
</html>
