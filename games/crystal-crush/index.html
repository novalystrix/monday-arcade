<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crystal Crush — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #a855f7;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }
h1 {
  font-size: 28px;
  margin: 18px 0 4px;
  background: linear-gradient(135deg, #a855f7, #06b6d4, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  letter-spacing: 2px;
}
#hud {
  display: flex;
  gap: 32px;
  font-size: 15px;
  margin: 6px 0 10px;
  color: #c4b5fd;
}
#hud span { font-weight: bold; }
canvas {
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(168,85,247,0.3), 0 0 80px rgba(6,182,212,0.15);
  cursor: pointer;
  touch-action: none;
}
#overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,10,26,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
#overlay.hidden { display: none; }
#overlay h2 {
  font-size: 36px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #a855f7, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#overlay p { color: #c4b5fd; margin: 6px 0; font-size: 16px; }
#overlay button {
  margin-top: 20px;
  padding: 12px 36px;
  font-size: 18px;
  font-family: 'Courier New', monospace;
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
#overlay button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(168,85,247,0.5);
}
#combo-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 48px;
  font-weight: bold;
  pointer-events: none;
  z-index: 60;
  opacity: 0;
  transition: none;
  background: linear-gradient(135deg, #fbbf24, #f472b6, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  filter: drop-shadow(0 0 12px rgba(251,191,36,0.6));
}
</style>
</head>
<body>
<a class="back-link" href="/">← Arcade</a>
<h1>💎 Crystal Crush</h1>
<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Moves: <span id="moves">30</span></div>
  <div>Combo: <span id="combo">x1</span></div>
</div>
<canvas id="game"></canvas>
<div id="combo-popup"></div>
<div id="overlay">
  <h2>💎 Crystal Crush</h2>
  <p>Swap adjacent crystals to match 3+ in a row</p>
  <p>Chain combos for massive points!</p>
  <button id="start-btn">✨ Play</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const movesEl = document.getElementById('moves');
const comboEl = document.getElementById('combo');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const comboPopup = document.getElementById('combo-popup');

const COLS = 8, ROWS = 8;
let CELL, PAD;
let grid = [];
let score = 0, moves = 30, combo = 0;
let selected = null;
let animating = false;
let particles = [];
let shineParticles = [];
let gameStarted = false;

// Crystal types with gorgeous colors
const CRYSTALS = [
  { name: 'ruby',     colors: ['#ef4444','#dc2626','#fca5a5'], glow: 'rgba(239,68,68,0.5)' },
  { name: 'sapphire', colors: ['#3b82f6','#2563eb','#93c5fd'], glow: 'rgba(59,130,246,0.5)' },
  { name: 'emerald',  colors: ['#10b981','#059669','#6ee7b7'], glow: 'rgba(16,185,129,0.5)' },
  { name: 'amethyst', colors: ['#a855f7','#7c3aed','#d8b4fe'], glow: 'rgba(168,85,247,0.5)' },
  { name: 'topaz',    colors: ['#f59e0b','#d97706','#fcd34d'], glow: 'rgba(245,158,11,0.5)' },
  { name: 'diamond',  colors: ['#06b6d4','#0891b2','#67e8f9'], glow: 'rgba(6,182,212,0.5)' },
];

function resize() {
  const maxW = Math.min(window.innerWidth - 24, 480);
  const maxH = window.innerHeight - 160;
  CELL = Math.floor(Math.min(maxW, maxH) / ROWS);
  PAD = Math.floor(CELL * 0.08);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
}

function init() {
  resize();
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = { type: randType(r, c), offsetY: 0, scale: 1, alpha: 1 };
    }
  }
  score = 0; moves = 30; combo = 0;
  selected = null;
  animating = false;
  particles = [];
  updateHUD();
}

function randType(r, c) {
  let t;
  do {
    t = Math.floor(Math.random() * CRYSTALS.length);
  } while (
    (c >= 2 && grid[r][c-1]?.type === t && grid[r][c-2]?.type === t) ||
    (r >= 2 && grid[r-1]?.[c]?.type === t && grid[r-2]?.[c]?.type === t)
  );
  return t;
}

function updateHUD() {
  scoreEl.textContent = score.toLocaleString();
  movesEl.textContent = moves;
  comboEl.textContent = combo > 1 ? `x${combo}` : 'x1';
}

// --- Drawing ---
function drawCrystal(x, y, size, type, scale, alpha, isSelected) {
  const cr = CRYSTALS[type];
  const s = size * scale;
  const cx = x + size/2;
  const cy = y + size/2;
  
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  
  // Glow
  const glowR = s * 0.45;
  const grd = ctx.createRadialGradient(0, 0, glowR*0.2, 0, 0, glowR);
  grd.addColorStop(0, cr.glow);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(-s/2, -s/2, s, s);
  
  // Crystal body — hexagonal gem shape
  const r = s * 0.38;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 6 + i * Math.PI / 3;
    const px = Math.cos(a) * r;
    const py = Math.sin(a) * r;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  
  const bodyGrd = ctx.createLinearGradient(-r, -r, r, r);
  bodyGrd.addColorStop(0, cr.colors[2]);
  bodyGrd.addColorStop(0.4, cr.colors[0]);
  bodyGrd.addColorStop(1, cr.colors[1]);
  ctx.fillStyle = bodyGrd;
  ctx.fill();
  
  // Inner shine
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 6 + i * Math.PI / 3;
    const px = Math.cos(a) * r * 0.55;
    const py = Math.sin(a) * r * 0.55 - r * 0.1;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  const shineGrd = ctx.createLinearGradient(0, -r*0.5, 0, r*0.3);
  shineGrd.addColorStop(0, 'rgba(255,255,255,0.4)');
  shineGrd.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrd;
  ctx.fill();
  
  // Sparkle dot
  const t = Date.now() / 1000;
  const sparkle = (Math.sin(t * 3 + type * 1.5 + x * 0.1) + 1) / 2;
  ctx.beginPath();
  ctx.arc(-r*0.2, -r*0.25, r*0.08 + sparkle * r * 0.06, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${0.5 + sparkle * 0.5})`;
  ctx.fill();
  
  // Selection ring
  if (isSelected) {
    ctx.beginPath();
    ctx.arc(0, 0, r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 12;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  }
}

function spawnParticles(cx, cy, type, count) {
  const cr = CRYSTALS[type];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 4,
      alpha: 1,
      color: cr.colors[Math.floor(Math.random()*3)],
      life: 0.6 + Math.random() * 0.5
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt;
    p.alpha = Math.max(0, p.life / 1);
    p.size *= 0.98;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// --- Background ambient particles ---
function spawnShineParticle() {
  shineParticles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 1 + Math.random() * 2,
    alpha: 0,
    maxAlpha: 0.3 + Math.random() * 0.4,
    phase: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 1,
    life: 2 + Math.random() * 3
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Subtle grid glow
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * CELL;
      const y = r * CELL;
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.008)';
      ctx.fillRect(x, y, CELL, CELL);
    }
  }
  
  // Crystals
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (cell.type < 0) continue;
      const x = c * CELL + PAD;
      const y = r * CELL + PAD + cell.offsetY;
      const size = CELL - PAD * 2;
      const isSel = selected && selected.r === r && selected.c === c;
      drawCrystal(x, y, size, cell.type, cell.scale, cell.alpha, isSel);
    }
  }
  
  // Ambient sparkles
  const t = Date.now() / 1000;
  for (const sp of shineParticles) {
    sp.alpha = sp.maxAlpha * Math.abs(Math.sin(t * sp.speed + sp.phase));
    ctx.save();
    ctx.globalAlpha = sp.alpha;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, sp.size, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.restore();
  }
  
  drawParticles();
}

// --- Game Logic ---
function findMatches() {
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const t = grid[r][c].type;
      if (t < 0) continue;
      if (grid[r][c+1].type === t && grid[r][c+2].type === t) {
        let end = c + 2;
        while (end + 1 < COLS && grid[r][end+1].type === t) end++;
        for (let i = c; i <= end; i++) matched.add(`${r},${i}`);
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const t = grid[r][c].type;
      if (t < 0) continue;
      if (grid[r+1][c].type === t && grid[r+2][c].type === t) {
        let end = r + 2;
        while (end + 1 < ROWS && grid[end+1][c].type === t) end++;
        for (let i = r; i <= end; i++) matched.add(`${i},${c}`);
      }
    }
  }
  return matched;
}

function clearMatches(matched) {
  const pts = matched.size * 10 * combo;
  score += pts;
  for (const key of matched) {
    const [r, c] = key.split(',').map(Number);
    const cx = c * CELL + CELL/2;
    const cy = r * CELL + CELL/2;
    spawnParticles(cx, cy, grid[r][c].type, 12);
    grid[r][c].type = -1;
  }
  updateHUD();
}

function showComboPopup() {
  if (combo < 2) return;
  comboPopup.textContent = `${combo}x COMBO!`;
  comboPopup.style.transition = 'none';
  comboPopup.style.transform = 'translate(-50%, -50%) scale(0)';
  comboPopup.style.opacity = '0';
  requestAnimationFrame(() => {
    comboPopup.style.transition = 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s';
    comboPopup.style.transform = 'translate(-50%, -50%) scale(1)';
    comboPopup.style.opacity = '1';
    setTimeout(() => {
      comboPopup.style.transition = 'transform 0.3s, opacity 0.3s';
      comboPopup.style.transform = 'translate(-50%, -50%) scale(1.3)';
      comboPopup.style.opacity = '0';
    }, 600);
  });
}

async function collapse() {
  // Drop existing crystals down
  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c].type >= 0) {
        if (r !== empty) {
          grid[empty][c].type = grid[r][c].type;
          grid[r][c].type = -1;
          grid[empty][c].offsetY = (r - empty) * CELL;
        }
        empty--;
      }
    }
    // Fill empty top rows
    for (let r = empty; r >= 0; r--) {
      grid[r][c].type = Math.floor(Math.random() * CRYSTALS.length);
      grid[r][c].offsetY = (r - empty - 1) * CELL;
    }
  }
  // Animate drop
  await animate(300, (progress) => {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c].offsetY !== 0) {
          grid[r][c].offsetY *= (1 - progress);
          if (Math.abs(grid[r][c].offsetY) < 0.5) grid[r][c].offsetY = 0;
        }
      }
    }
  });
  // Reset offsets
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      grid[r][c].offsetY = 0;
}

async function processMatches() {
  combo = 0;
  let matched = findMatches();
  while (matched.size > 0) {
    combo++;
    comboEl.textContent = combo > 1 ? `x${combo}` : 'x1';
    showComboPopup();
    clearMatches(matched);
    await sleep(200);
    await collapse();
    await sleep(150);
    matched = findMatches();
  }
  combo = 0;
  updateHUD();
}

function swap(r1, c1, r2, c2) {
  const tmp = grid[r1][c1].type;
  grid[r1][c1].type = grid[r2][c2].type;
  grid[r2][c2].type = tmp;
}

async function trySwap(r1, c1, r2, c2) {
  if (animating) return;
  animating = true;
  
  swap(r1, c1, r2, c2);
  const matched = findMatches();
  
  if (matched.size === 0) {
    // Swap back
    swap(r1, c1, r2, c2);
    // Shake animation
    await animate(200, (p) => {
      const shake = Math.sin(p * Math.PI * 4) * 4 * (1 - p);
      grid[r1][c1].offsetY = 0;
      grid[r2][c2].offsetY = 0;
      if (r1 === r2) {
        grid[r1][c1].offsetY = shake;
        grid[r2][c2].offsetY = -shake;
      }
    });
    animating = false;
    return;
  }
  
  moves--;
  updateHUD();
  await processMatches();
  
  if (moves <= 0) {
    await sleep(400);
    gameOver();
  }
  animating = false;
}

function gameOver() {
  overlay.classList.remove('hidden');
  overlay.querySelector('h2').textContent = '✨ Game Over!';
  overlay.querySelector('p').textContent = `Final Score: ${score.toLocaleString()}`;
  overlay.querySelectorAll('p')[1].textContent = 'Can you beat it?';
  startBtn.textContent = '🔄 Play Again';
  gameStarted = false;
}

// --- Input ---
let touchStart = null;

function getCellFromPos(px, py) {
  const rect = canvas.getBoundingClientRect();
  const x = px - rect.left;
  const y = py - rect.top;
  const c = Math.floor(x / CELL);
  const r = Math.floor(y / CELL);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return { r, c };
}

canvas.addEventListener('pointerdown', (e) => {
  if (animating || !gameStarted) return;
  e.preventDefault();
  const cell = getCellFromPos(e.clientX, e.clientY);
  if (!cell) return;
  
  if (selected) {
    const dr = Math.abs(cell.r - selected.r);
    const dc = Math.abs(cell.c - selected.c);
    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
      trySwap(selected.r, selected.c, cell.r, cell.c);
      selected = null;
    } else if (cell.r === selected.r && cell.c === selected.c) {
      selected = null;
    } else {
      selected = cell;
    }
  } else {
    selected = cell;
    touchStart = { x: e.clientX, y: e.clientY, r: cell.r, c: cell.c };
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!touchStart || animating || !gameStarted) return;
  const dx = e.clientX - touchStart.x;
  const dy = e.clientY - touchStart.y;
  const threshold = CELL * 0.3;
  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    let tr = touchStart.r, tc = touchStart.c;
    if (Math.abs(dx) > Math.abs(dy)) {
      tc += dx > 0 ? 1 : -1;
    } else {
      tr += dy > 0 ? 1 : -1;
    }
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      selected = null;
      trySwap(touchStart.r, touchStart.c, tr, tc);
    }
    touchStart = null;
  }
});

canvas.addEventListener('pointerup', () => { touchStart = null; });

// --- Utilities ---
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function animate(duration, fn) {
  return new Promise(resolve => {
    const start = performance.now();
    function step(now) {
      const p = Math.min(1, (now - start) / duration);
      fn(p);
      if (p < 1) requestAnimationFrame(step);
      else resolve();
    }
    requestAnimationFrame(step);
  });
}

// --- Init ambient sparkles ---
for (let i = 0; i < 30; i++) spawnShineParticle();

// --- Game Loop ---
let lastTime = performance.now();
function loop(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  updateParticles(dt);
  draw();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  if (!gameStarted) {
    init();
    gameStarted = true;
    // Clear initial matches silently
    (async () => {
      animating = true;
      let m = findMatches();
      while (m.size > 0) {
        for (const key of m) {
          const [r, c] = key.split(',').map(Number);
          grid[r][c].type = Math.floor(Math.random() * CRYSTALS.length);
        }
        m = findMatches();
      }
      animating = false;
    })();
  }
});

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
