<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mirror Lake — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050510;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #7ec8e3;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
  opacity: 0.7;
}
.back-link:hover { opacity: 1; }
canvas { display: block; }
#ui {
  position: fixed;
  top: 12px;
  right: 16px;
  text-align: right;
  z-index: 100;
  font-size: 14px;
  line-height: 1.6;
  text-shadow: 0 0 8px rgba(126,200,227,0.5);
}
#ui .score { font-size: 22px; color: #7ec8e3; }
#ui .combo { font-size: 16px; color: #ffda6b; }
#ui .timer { color: #c3a6ff; }
#ui .chain { font-size: 12px; color: #ff9ecd; }

#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(5,5,16,0.92);
  z-index: 200;
  text-align: center;
  padding: 20px;
}
#overlay h1 {
  font-size: 42px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #7ec8e3, #c3a6ff, #ff9ecd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
}
#overlay .sub {
  font-size: 15px;
  color: #8899aa;
  margin-bottom: 30px;
  max-width: 380px;
  line-height: 1.5;
}
#overlay .final-score {
  font-size: 28px;
  color: #ffda6b;
  margin-bottom: 10px;
}
#overlay .stats {
  font-size: 13px;
  color: #8899aa;
  margin-bottom: 24px;
  line-height: 1.8;
}
#overlay button {
  background: linear-gradient(135deg, #7ec8e3, #c3a6ff);
  border: none;
  color: #050510;
  font-family: inherit;
  font-size: 16px;
  padding: 12px 36px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  transition: transform 0.15s, box-shadow 0.15s;
}
#overlay button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(126,200,227,0.5);
}
</style>
</head>
<body>
<a href="/" class="back-link">← Arcade</a>
<div id="ui">
  <div class="score" id="score">0</div>
  <div class="combo" id="combo"></div>
  <div class="chain" id="chain"></div>
  <div class="timer" id="timer">60s</div>
</div>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>🪞 Mirror Lake</h1>
  <div class="sub">Drop glowing orbs into the lake. When ripples collide, new orbs are born. Create cascading chain reactions for massive scores.</div>
  <button id="startBtn">Drop In</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const chainEl = document.getElementById('chain');
const timerEl = document.getElementById('timer');

let W, H, midY;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  midY = H * 0.45; // water line
}
resize();
window.addEventListener('resize', resize);

// Color palettes for orbs
const PALETTES = [
  ['#7ec8e3', '#4fa8c9'],
  ['#c3a6ff', '#9b7fe6'],
  ['#ff9ecd', '#e670a8'],
  ['#ffda6b', '#e6b84d'],
  ['#6bffb8', '#4de69a'],
  ['#ff8f6b', '#e6704d'],
  ['#8be9fd', '#5cc6e0'],
  ['#f1fa8c', '#d4dd6f'],
];

let orbs = [];
let ripples = [];
let sparkles = [];
let floatingTexts = [];
let score = 0;
let bestChain = 0;
let totalChains = 0;
let totalOrbs = 0;
let timeLeft = 60;
let running = false;
let gameTimer = null;
let comboCount = 0;
let comboTimer = 0;
let lastTime = 0;

class Orb {
  constructor(x, y, palette, generation = 0) {
    this.x = x;
    this.y = y;
    this.palette = palette || PALETTES[Math.floor(Math.random() * PALETTES.length)];
    this.radius = 8 + Math.random() * 4;
    this.generation = generation;
    this.birth = performance.now();
    this.alive = true;
    this.glow = 1;
    this.pulsePhase = Math.random() * Math.PI * 2;
    // Drop animation
    this.vy = 0;
    this.targetY = y;
    this.settled = false;
    if (generation === 0) {
      this.y = y - 40;
      this.vy = 2;
    } else {
      this.settled = true;
    }
  }

  update(dt) {
    if (!this.settled) {
      this.vy += 6 * dt;
      this.y += this.vy;
      if (this.y >= this.targetY) {
        this.y = this.targetY;
        this.settled = true;
        // Spawn ripple on landing
        ripples.push(new Ripple(this.x, this.y, this.palette, this));
      }
    }
    this.pulsePhase += dt * 2;
    const age = (performance.now() - this.birth) / 1000;
    if (age > 4 + this.generation * 0.5) {
      this.glow -= dt * 1.5;
      if (this.glow <= 0) this.alive = false;
    }
  }

  draw() {
    const pulse = 1 + Math.sin(this.pulsePhase) * 0.15;
    const r = this.radius * pulse * Math.min(this.glow, 1);
    const alpha = Math.min(this.glow, 1);

    // Glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
    grad.addColorStop(0, hexAlpha(this.palette[0], 0.3 * alpha));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(this.x - r * 4, this.y - r * 4, r * 8, r * 8);

    // Core
    const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    coreGrad.addColorStop(0, hexAlpha('#ffffff', 0.9 * alpha));
    coreGrad.addColorStop(0.3, hexAlpha(this.palette[0], 0.8 * alpha));
    coreGrad.addColorStop(1, hexAlpha(this.palette[1], 0.2 * alpha));
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = coreGrad;
    ctx.fill();

    // Reflection (below water line)
    if (this.y < midY + 40) {
      const refY = midY + (midY - this.y) * 0.6;
      const refAlpha = alpha * 0.25;
      const refGrad = ctx.createRadialGradient(this.x, refY, 0, this.x, refY, r * 0.8);
      refGrad.addColorStop(0, hexAlpha(this.palette[0], refAlpha));
      refGrad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(this.x, refY, r * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = refGrad;
      ctx.fill();
    }
  }
}

class Ripple {
  constructor(x, y, palette, sourceOrb) {
    this.x = x;
    this.y = y;
    this.palette = palette;
    this.sourceOrb = sourceOrb;
    this.radius = 0;
    this.maxRadius = 80 + Math.random() * 60;
    this.speed = 60 + Math.random() * 30;
    this.alpha = 0.7;
    this.alive = true;
    this.hasCollided = new Set();
  }

  update(dt) {
    this.radius += this.speed * dt;
    this.alpha = 0.7 * (1 - this.radius / this.maxRadius);
    if (this.radius >= this.maxRadius) {
      this.alive = false;
    }

    // Check collision with other ripples
    for (const other of ripples) {
      if (other === this || !other.alive || this.hasCollided.has(other) || other.hasCollided.has(this)) continue;
      const dx = this.x - other.x;
      const dy = this.y - other.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Ripples intersect
      if (dist < this.radius + other.radius && dist > Math.abs(this.radius - other.radius)) {
        this.hasCollided.add(other);
        other.hasCollided.add(this);

        // Spawn new orb at intersection midpoint
        const angle = Math.atan2(dy, dx);
        const mx = (this.x + other.x) / 2;
        const my = (this.y + other.y) / 2;
        // Offset slightly
        const ox = mx + (Math.random() - 0.5) * 20;
        const oy = Math.min(Math.max(my + (Math.random() - 0.5) * 20, 60), H - 60);

        const gen = Math.max(
          this.sourceOrb ? this.sourceOrb.generation : 0,
          other.sourceOrb ? other.sourceOrb.generation : 0
        ) + 1;

        if (gen <= 5) { // Max chain depth
          const newPalette = PALETTES[Math.floor(Math.random() * PALETTES.length)];
          const newOrb = new Orb(ox, oy, newPalette, gen);
          orbs.push(newOrb);
          totalOrbs++;

          // Score
          const chainBonus = gen * gen * 10;
          const comboBonus = comboCount * 5;
          const points = 10 + chainBonus + comboBonus;
          score += points;
          comboCount++;
          comboTimer = 2;
          if (gen > bestChain) bestChain = gen;
          if (gen >= 2) totalChains++;

          // Sparkles at intersection
          for (let i = 0; i < 8; i++) {
            sparkles.push(new Sparkle(ox, oy, newPalette));
          }

          // Floating text
          const label = gen >= 3 ? `+${points} ×${gen} CHAIN!` : `+${points}`;
          floatingTexts.push(new FloatingText(ox, oy - 20, label, gen >= 3 ? '#ffda6b' : newPalette[0]));
        }
      }
    }
  }

  draw() {
    if (this.alpha <= 0) return;

    // Main ripple ring
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = hexAlpha(this.palette[0], this.alpha);
    ctx.lineWidth = 2;
    ctx.stroke();

    // Inner shimmer
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.95, 0, Math.PI * 2);
    ctx.strokeStyle = hexAlpha(this.palette[1], this.alpha * 0.4);
    ctx.lineWidth = 1;
    ctx.stroke();

    // Reflection ripple
    if (this.y < midY + 40) {
      const refY = midY + (midY - this.y) * 0.6;
      ctx.beginPath();
      ctx.arc(this.x, refY, this.radius * 0.7, 0, Math.PI * 2);
      ctx.strokeStyle = hexAlpha(this.palette[0], this.alpha * 0.15);
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

class Sparkle {
  constructor(x, y, palette) {
    this.x = x;
    this.y = y;
    this.palette = palette;
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 80;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 0.5 + Math.random() * 0.5;
    this.maxLife = this.life;
    this.size = 1.5 + Math.random() * 2.5;
    this.alive = true;
  }

  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 20 * dt; // gentle gravity
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }

  draw() {
    const alpha = this.life / this.maxLife;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(this.palette[0], alpha);
    ctx.fill();
  }
}

class FloatingText {
  constructor(x, y, text, color) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.color = color;
    this.life = 1.2;
    this.maxLife = 1.2;
    this.alive = true;
  }

  update(dt) {
    this.y -= 30 * dt;
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }

  draw() {
    const alpha = this.life / this.maxLife;
    ctx.font = 'bold 14px Courier New';
    ctx.fillStyle = hexAlpha(this.color, alpha);
    ctx.textAlign = 'center';
    ctx.fillText(this.text, this.x, this.y);
  }
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Water surface rendering
function drawWater(time) {
  // Gradient water
  const waterGrad = ctx.createLinearGradient(0, midY - 10, 0, H);
  waterGrad.addColorStop(0, 'rgba(10,20,45,0.0)');
  waterGrad.addColorStop(0.05, 'rgba(10,20,45,0.3)');
  waterGrad.addColorStop(0.3, 'rgba(8,15,35,0.5)');
  waterGrad.addColorStop(1, 'rgba(5,5,16,0.8)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, midY, W, H - midY);

  // Subtle wave line
  ctx.beginPath();
  ctx.moveTo(0, midY);
  for (let x = 0; x <= W; x += 4) {
    const wave = Math.sin(x * 0.008 + time * 0.8) * 2 + Math.sin(x * 0.015 + time * 1.2) * 1;
    ctx.lineTo(x, midY + wave);
  }
  ctx.strokeStyle = 'rgba(126,200,227,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// Stars background
const stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random() * 0.5,
    size: 0.5 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 2
  });
}

function drawStars(time) {
  for (const s of stars) {
    const alpha = 0.3 + 0.4 * Math.sin(s.twinkle + time * s.speed);
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${alpha})`;
    ctx.fill();
  }
}

// Moon
function drawMoon(time) {
  const mx = W * 0.82, my = H * 0.12, mr = 25;
  const moonGrad = ctx.createRadialGradient(mx - 5, my - 5, 0, mx, my, mr);
  moonGrad.addColorStop(0, 'rgba(255,252,240,0.95)');
  moonGrad.addColorStop(0.7, 'rgba(230,220,200,0.6)');
  moonGrad.addColorStop(1, 'rgba(200,200,220,0.0)');
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fillStyle = moonGrad;
  ctx.fill();

  // Moon glow
  const glowGrad = ctx.createRadialGradient(mx, my, mr, mx, my, mr * 4);
  glowGrad.addColorStop(0, 'rgba(200,210,255,0.08)');
  glowGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(mx, my, mr * 4, 0, Math.PI * 2);
  ctx.fillStyle = glowGrad;
  ctx.fill();

  // Moon reflection in water
  const refMy = midY + (midY - my) * 0.15 + Math.sin(time) * 3;
  const refGrad = ctx.createRadialGradient(mx, refMy, 0, mx, refMy, mr * 0.6);
  refGrad.addColorStop(0, 'rgba(255,252,240,0.08)');
  refGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(mx, refMy, mr * 2, 0, Math.PI * 2);
  ctx.fillStyle = refGrad;
  ctx.fill();
}

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Clear
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  const time = timestamp / 1000;

  // Background
  drawStars(time);
  drawMoon(time);

  // Draw water behind orbs
  drawWater(time);

  // Update & draw ripples
  ripples = ripples.filter(r => r.alive);
  for (const r of ripples) { r.update(dt); r.draw(); }

  // Update & draw orbs
  orbs = orbs.filter(o => o.alive);
  for (const o of orbs) { o.update(dt); o.draw(); }

  // Update & draw sparkles
  sparkles = sparkles.filter(s => s.alive);
  for (const s of sparkles) { s.update(dt); s.draw(); }

  // Floating texts
  floatingTexts = floatingTexts.filter(f => f.alive);
  for (const f of floatingTexts) { f.update(dt); f.draw(); }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  // UI
  scoreEl.textContent = score;
  comboEl.textContent = comboCount > 1 ? `${comboCount}× combo` : '';
  chainEl.textContent = bestChain > 0 ? `Best chain: ${bestChain}` : '';

  if (running) {
    requestAnimationFrame(gameLoop);
  }
}

function startGame() {
  orbs = [];
  ripples = [];
  sparkles = [];
  floatingTexts = [];
  score = 0;
  bestChain = 0;
  totalChains = 0;
  totalOrbs = 0;
  comboCount = 0;
  comboTimer = 0;
  timeLeft = 60;
  lastTime = 0;
  running = true;
  overlay.style.display = 'none';
  timerEl.textContent = '60s';
  scoreEl.textContent = '0';
  comboEl.textContent = '';
  chainEl.textContent = '';

  gameTimer = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft + 's';
    if (timeLeft <= 10) timerEl.style.color = '#ff6b6b';
    if (timeLeft <= 0) endGame();
  }, 1000);

  requestAnimationFrame(gameLoop);
}

function endGame() {
  running = false;
  clearInterval(gameTimer);
  timerEl.style.color = '#c3a6ff';

  overlay.innerHTML = `
    <h1>🪞 Mirror Lake</h1>
    <div class="final-score">${score} points</div>
    <div class="stats">
      Orbs dropped: ${totalOrbs}<br>
      Chain reactions: ${totalChains}<br>
      Best chain depth: ${bestChain}<br>
      Peak combo: ${comboCount}×
    </div>
    <button id="restartBtn">Play Again</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('restartBtn').addEventListener('click', startGame);

  // Keep background animation
  running = true;
  requestAnimationFrame(gameLoop);
  setTimeout(() => { running = true; }, 100);
}

// Click/tap to drop orb
canvas.addEventListener('click', (e) => {
  if (!running || timeLeft <= 0) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const orb = new Orb(x, y);
  orbs.push(orb);
  totalOrbs++;
  score += 5;

  // Immediate sparkle burst
  for (let i = 0; i < 4; i++) {
    sparkles.push(new Sparkle(x, y, orb.palette));
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!running || timeLeft <= 0) return;
  for (const touch of e.changedTouches) {
    const x = touch.clientX;
    const y = touch.clientY;
    const orb = new Orb(x, y);
    orbs.push(orb);
    totalOrbs++;
    score += 5;
    for (let i = 0; i < 4; i++) {
      sparkles.push(new Sparkle(x, y, orb.palette));
    }
  }
}, { passive: false });

startBtn.addEventListener('click', startGame);

// Ambient background loop before game starts
running = true;
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
