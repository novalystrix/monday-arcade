<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Void Runner — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050510;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #6040cc;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
}
.back-link:hover { color: #a070ff; }
canvas { display: block; border-radius: 8px; }
#ui-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
}
#score-display {
  position: fixed;
  top: 16px;
  right: 20px;
  font-size: 20px;
  color: #d0c0ff;
  text-shadow: 0 0 12px #7040dd;
  z-index: 10;
}
#combo-display {
  position: fixed;
  top: 44px;
  right: 20px;
  font-size: 14px;
  color: #ff6090;
  text-shadow: 0 0 8px #ff2060;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.2s;
}
#start-screen, #game-over-screen {
  pointer-events: auto;
  text-align: center;
}
#game-over-screen { display: none; }
.title {
  font-size: 42px;
  font-weight: bold;
  background: linear-gradient(135deg, #a060ff, #ff60a0, #60d0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 14px;
  color: #8080a0;
  margin-bottom: 30px;
}
.btn {
  display: inline-block;
  padding: 14px 40px;
  font-size: 16px;
  font-family: 'Courier New', monospace;
  color: #fff;
  background: linear-gradient(135deg, #6030bb, #a040cc);
  border: none;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 0 20px #6030bb88, 0 0 60px #6030bb33;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px #8050ddaa, 0 0 80px #8050dd55;
}
.final-score {
  font-size: 28px;
  color: #ff60a0;
  margin: 16px 0;
  text-shadow: 0 0 16px #ff2060;
}
.high-score {
  font-size: 13px;
  color: #8080a0;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<a class="back-link" href="/">← Arcade</a>
<canvas id="game"></canvas>
<div id="score-display">0</div>
<div id="combo-display"></div>
<div id="ui-overlay">
  <div id="start-screen">
    <div class="title">VOID RUNNER</div>
    <div class="subtitle">Jump through the neon void • Collect orbs • Chain combos</div>
    <button class="btn" id="start-btn">▶ START</button>
    <div style="margin-top:16px;font-size:11px;color:#606080">Space / Tap to jump • Double jump in air</div>
  </div>
  <div id="game-over-screen">
    <div class="title" style="font-size:32px">VOID COLLAPSE</div>
    <div class="final-score" id="final-score">0</div>
    <div class="high-score" id="high-score"></div>
    <button class="btn" id="restart-btn">↻ RETRY</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Sizing
function resize() {
  const w = Math.min(window.innerWidth, 800);
  const h = Math.min(window.innerHeight, 600);
  canvas.width = w;
  canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

// State
let state = 'menu'; // menu, playing, dead
let score = 0;
let combo = 0;
let comboTimer = 0;
let highScore = parseInt(localStorage.getItem('voidrunner-hi') || '0');
let speed = 3;
let frame = 0;
let shakeX = 0, shakeY = 0;
let flashAlpha = 0;

// Player
const player = { x: 150, y: 300, vy: 0, w: 22, h: 28, onGround: false, jumps: 0, maxJumps: 2, trail: [] };

// Platforms
let platforms = [];
let orbs = [];
let particles = [];
let bgStars = [];

// Init background stars
for (let i = 0; i < 120; i++) {
  bgStars.push({
    x: Math.random() * 800,
    y: Math.random() * 600,
    size: Math.random() * 2 + 0.5,
    speed: Math.random() * 0.5 + 0.2,
    hue: Math.random() * 60 + 240
  });
}

function spawnPlatform(x) {
  const w = 60 + Math.random() * 100;
  const y = 200 + Math.random() * 280;
  platforms.push({ x, y, w, h: 6, glow: Math.random() * 0.5 + 0.5 });
  // Sometimes spawn orb above platform
  if (Math.random() < 0.5) {
    orbs.push({ x: x + w/2, y: y - 35, r: 8, pulse: Math.random() * Math.PI * 2, collected: false });
  }
}

function initGame() {
  platforms = [];
  orbs = [];
  particles = [];
  player.y = 250;
  player.vy = 0;
  player.onGround = false;
  player.jumps = 0;
  player.trail = [];
  score = 0;
  combo = 0;
  comboTimer = 0;
  speed = 3;
  frame = 0;
  shakeX = 0; shakeY = 0;
  flashAlpha = 0;

  // Starting platforms
  for (let i = 0; i < 8; i++) {
    spawnPlatform(100 + i * 130);
  }
  // Make sure player starts on first platform
  platforms[0].x = 120;
  platforms[0].y = 320;
  platforms[0].w = 120;
  player.y = platforms[0].y - player.h;
  player.onGround = true;
}

function jump() {
  if (state !== 'playing') return;
  if (player.jumps < player.maxJumps) {
    player.vy = -9.5;
    player.jumps++;
    player.onGround = false;
    // Jump particles
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: player.x + player.w/2,
        y: player.y + player.h,
        vx: (Math.random() - 0.5) * 4,
        vy: Math.random() * 2 + 1,
        life: 1,
        decay: 0.03 + Math.random() * 0.02,
        size: Math.random() * 3 + 2,
        hue: player.jumps === 2 ? 320 : 260
      });
    }
    if (player.jumps === 2) {
      flashAlpha = 0.15;
    }
  }
}

function collectOrb(orb) {
  orb.collected = true;
  combo++;
  comboTimer = 120;
  const mult = Math.min(combo, 10);
  score += 10 * mult;
  // Explosion particles
  for (let i = 0; i < 16; i++) {
    const angle = (Math.PI * 2 / 16) * i;
    particles.push({
      x: orb.x, y: orb.y,
      vx: Math.cos(angle) * (2 + Math.random() * 3),
      vy: Math.sin(angle) * (2 + Math.random() * 3),
      life: 1,
      decay: 0.02 + Math.random() * 0.015,
      size: Math.random() * 4 + 2,
      hue: 40 + Math.random() * 30
    });
  }
  shakeX = (Math.random() - 0.5) * 6;
  shakeY = (Math.random() - 0.5) * 6;
}

function die() {
  state = 'dead';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('voidrunner-hi', highScore);
  }
  // Death explosion
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 5 + 1;
    particles.push({
      x: player.x + player.w/2, y: player.y + player.h/2,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.01 + Math.random() * 0.01,
      size: Math.random() * 5 + 2,
      hue: 0
    });
  }
  flashAlpha = 0.4;
  document.getElementById('final-score').textContent = score;
  document.getElementById('high-score').textContent = highScore > 0 ? `Best: ${highScore}` : '';
  document.getElementById('game-over-screen').style.display = 'block';
  document.getElementById('start-screen').style.display = 'none';
}

function update() {
  if (state !== 'playing') return;
  frame++;

  // Increase speed over time
  speed = 3 + frame * 0.001;

  // Move platforms & orbs
  for (const p of platforms) p.x -= speed;
  for (const o of orbs) o.x -= speed;

  // Remove off-screen platforms, spawn new
  platforms = platforms.filter(p => p.x + p.w > -20);
  orbs = orbs.filter(o => !o.collected && o.x > -20);

  const rightmost = platforms.reduce((mx, p) => Math.max(mx, p.x + p.w), 0);
  if (rightmost < canvas.width + 200) {
    spawnPlatform(rightmost + 80 + Math.random() * 80);
  }

  // Gravity
  player.vy += 0.45;
  player.y += player.vy;

  // Platform collision
  player.onGround = false;
  for (const p of platforms) {
    if (player.x + player.w > p.x && player.x < p.x + p.w &&
        player.y + player.h >= p.y && player.y + player.h <= p.y + 14 &&
        player.vy >= 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumps = 0;
    }
  }

  // Orb collection
  for (const o of orbs) {
    if (o.collected) continue;
    const dx = (player.x + player.w/2) - o.x;
    const dy = (player.y + player.h/2) - o.y;
    if (Math.sqrt(dx*dx + dy*dy) < 24) {
      collectOrb(o);
    }
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 0;
  }

  // Trail
  player.trail.push({ x: player.x + player.w/2, y: player.y + player.h/2, life: 1 });
  if (player.trail.length > 20) player.trail.shift();
  for (const t of player.trail) t.life -= 0.05;

  // Score ticks
  if (frame % 10 === 0) score++;

  // Shake decay
  shakeX *= 0.8;
  shakeY *= 0.8;
  flashAlpha *= 0.9;

  // Particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  // Stars
  for (const s of bgStars) {
    s.x -= s.speed * (speed / 3);
    if (s.x < 0) { s.x = canvas.width; s.y = Math.random() * canvas.height; }
  }

  // Fall death
  if (player.y > canvas.height + 50) die();

  // Update UI
  document.getElementById('score-display').textContent = score;
  const comboEl = document.getElementById('combo-display');
  if (combo > 1) {
    comboEl.textContent = `${combo}x COMBO`;
    comboEl.style.opacity = 1;
    comboEl.style.fontSize = Math.min(14 + combo * 2, 28) + 'px';
  } else {
    comboEl.style.opacity = 0;
  }
}

function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#050510');
  grad.addColorStop(0.5, '#0a0820');
  grad.addColorStop(1, '#120830');
  ctx.fillStyle = grad;
  ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

  // Grid floor (perspective effect)
  ctx.strokeStyle = 'rgba(80, 40, 160, 0.08)';
  ctx.lineWidth = 1;
  const gridY = canvas.height * 0.85;
  for (let i = 0; i < 20; i++) {
    const y = gridY + i * 15;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
  const gridOffset = (frame * speed) % 60;
  for (let i = -1; i < 20; i++) {
    const x = i * 60 - gridOffset;
    ctx.beginPath();
    ctx.moveTo(x, gridY);
    ctx.lineTo(x + (canvas.width/2 - x) * 0.3, canvas.height);
    ctx.stroke();
  }

  // Stars
  for (const s of bgStars) {
    ctx.fillStyle = `hsla(${s.hue}, 60%, 70%, ${0.3 + Math.sin(frame * 0.02 + s.x) * 0.2})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Platforms
  for (const p of platforms) {
    // Glow
    const pg = ctx.createLinearGradient(p.x, p.y - 10, p.x, p.y + 10);
    pg.addColorStop(0, `rgba(100, 60, 200, ${0.3 * p.glow})`);
    pg.addColorStop(1, 'transparent');
    ctx.fillStyle = pg;
    ctx.fillRect(p.x - 4, p.y - 10, p.w + 8, 20);

    // Platform surface
    const sg = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
    sg.addColorStop(0, '#6030bb');
    sg.addColorStop(0.5, '#a060ff');
    sg.addColorStop(1, '#6030bb');
    ctx.fillStyle = sg;
    ctx.shadowColor = '#8050dd';
    ctx.shadowBlur = 12;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.shadowBlur = 0;

    // Edge highlights
    ctx.fillStyle = 'rgba(200, 160, 255, 0.6)';
    ctx.fillRect(p.x, p.y, 2, p.h);
    ctx.fillRect(p.x + p.w - 2, p.y, 2, p.h);
  }

  // Orbs
  for (const o of orbs) {
    if (o.collected) continue;
    o.pulse += 0.06;
    const r = o.r + Math.sin(o.pulse) * 2;

    // Outer glow
    const og = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r * 3);
    og.addColorStop(0, 'rgba(255, 200, 60, 0.3)');
    og.addColorStop(1, 'transparent');
    ctx.fillStyle = og;
    ctx.beginPath();
    ctx.arc(o.x, o.y, r * 3, 0, Math.PI * 2);
    ctx.fill();

    // Core
    const cg = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
    cg.addColorStop(0, '#fff');
    cg.addColorStop(0.4, '#ffd040');
    cg.addColorStop(1, '#ff8020');
    ctx.fillStyle = cg;
    ctx.shadowColor = '#ffa030';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Player trail
  for (const t of player.trail) {
    if (t.life <= 0) continue;
    ctx.fillStyle = `hsla(270, 80%, 60%, ${t.life * 0.4})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4 * t.life, 0, Math.PI * 2);
    ctx.fill();
  }

  // Player
  if (state !== 'dead') {
    // Body glow
    ctx.shadowColor = '#a060ff';
    ctx.shadowBlur = 20;
    const bodyGrad = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.h);
    bodyGrad.addColorStop(0, '#c080ff');
    bodyGrad.addColorStop(1, '#6030bb');
    ctx.fillStyle = bodyGrad;

    // Rounded rect player
    const r = 5;
    ctx.beginPath();
    ctx.moveTo(player.x + r, player.y);
    ctx.lineTo(player.x + player.w - r, player.y);
    ctx.quadraticCurveTo(player.x + player.w, player.y, player.x + player.w, player.y + r);
    ctx.lineTo(player.x + player.w, player.y + player.h - r);
    ctx.quadraticCurveTo(player.x + player.w, player.y + player.h, player.x + player.w - r, player.y + player.h);
    ctx.lineTo(player.x + r, player.y + player.h);
    ctx.quadraticCurveTo(player.x, player.y + player.h, player.x, player.y + player.h - r);
    ctx.lineTo(player.x, player.y + r);
    ctx.quadraticCurveTo(player.x, player.y, player.x + r, player.y);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(player.x + 12, player.y + 10, 3, 0, Math.PI * 2);
    ctx.arc(player.x + 19, player.y + 10, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2a1060';
    ctx.beginPath();
    ctx.arc(player.x + 13, player.y + 10, 1.5, 0, Math.PI * 2);
    ctx.arc(player.x + 20, player.y + 10, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Particles
  for (const p of particles) {
    ctx.fillStyle = `hsla(${p.hue}, 90%, 60%, ${p.life})`;
    ctx.shadowColor = `hsla(${p.hue}, 90%, 60%, ${p.life * 0.5})`;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Flash overlay (on orb collect / death)
  if (flashAlpha > 0.01) {
    ctx.fillStyle = `rgba(200, 150, 255, ${flashAlpha})`;
    ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Controls
function handleInput(e) {
  if (e) e.preventDefault();
  if (state === 'playing') jump();
}
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') handleInput(e);
});
canvas.addEventListener('touchstart', handleInput);
canvas.addEventListener('mousedown', handleInput);

document.getElementById('start-btn').addEventListener('click', () => {
  initGame();
  state = 'playing';
  document.getElementById('start-screen').style.display = 'none';
});
document.getElementById('restart-btn').addEventListener('click', () => {
  initGame();
  state = 'playing';
  document.getElementById('game-over-screen').style.display = 'none';
});

loop();
</script>
</body>
</html>
