<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Skybloom — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020010;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
.back-link {
  position: fixed; top: 12px; left: 16px;
  color: #ffaa44; text-decoration: none; font-size: 13px;
  z-index: 100; opacity: 0.7; transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }
canvas { display: block; }
#hud {
  position: fixed; top: 12px; right: 16px;
  text-align: right; z-index: 100;
  font-size: 14px; line-height: 1.6;
  text-shadow: 0 0 8px rgba(255,170,68,0.5);
}
#hud .score { font-size: 28px; font-weight: bold; color: #ffd700; }
#hud .chain { color: #ff6ec7; font-size: 16px; }
#hud .seeds { font-size: 16px; color: #88ccff; }
#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(2,0,16,0.93); z-index: 200; transition: opacity 0.4s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
#overlay h1 {
  font-size: 48px;
  background: linear-gradient(135deg, #ffd700, #ff6ec7, #00ccff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
#overlay .sub { color: #aaa; font-size: 14px; margin-bottom: 24px; text-align: center; line-height: 1.6; }
#overlay .final-score { font-size: 32px; color: #ffd700; margin-bottom: 12px; }
#overlay button {
  background: linear-gradient(135deg, #ff8800, #ff6ec7);
  border: none; color: #fff; font-family: inherit; font-size: 18px;
  padding: 14px 40px; border-radius: 30px; cursor: pointer; margin-top: 12px;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 0 20px rgba(255,140,0,0.4);
}
#overlay button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(255,110,199,0.6);
}
</style>
</head>
<body>
<a class="back-link" href="/">← Arcade</a>
<div id="hud">
  <div class="score" id="scoreEl">0</div>
  <div class="chain" id="chainEl"></div>
  <div class="seeds" id="seedsEl">🌱 5</div>
</div>
<div id="overlay">
  <h1>🎆 Skybloom</h1>
  <div class="sub">Tap to launch seeds upward.<br>Tap a rising seed to bloom it.<br>Catch lanterns in the blast for bonus points.<br>Chain blooms for cascading fireworks!</div>
  <button id="startBtn">LAUNCH</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Palette
const BLOOM_PALETTES = [
  ['#ff6ec7','#ff99dd','#ffccee','#ffffff'],
  ['#ffd700','#ffee66','#fff5aa','#ffffff'],
  ['#00ccff','#66ddff','#aaeeff','#ffffff'],
  ['#7cff6b','#aaff99','#ccffcc','#ffffff'],
  ['#ff4444','#ff8866','#ffbbaa','#ffffff'],
  ['#c77dff','#ddaaff','#eeccff','#ffffff'],
  ['#ff9d00','#ffbb44','#ffdd88','#ffffff'],
  ['#00ffcc','#66ffd8','#aaffee','#ffffff'],
];

// State
let score = 0, chain = 0, maxChain = 0, seeds = [], blooms = [], particles = [];
let lanterns = [], floatingTexts = [], bgStars = [];
let seedsLeft = 0, totalLaunched = 0, gameRunning = false, elapsed = 0, lastTime = 0;
let lanternTimer = 0, seedRegenTimer = 0, difficultyTimer = 0;
let screenGlow = { r: 0, g: 0, b: 0, alpha: 0 };
let perfectZoneMin = 0.25, perfectZoneMax = 0.55; // % of screen height from top
let chainDecayTimer = 0;

const scoreEl = document.getElementById('scoreEl');
const chainEl = document.getElementById('chainEl');
const seedsEl = document.getElementById('seedsEl');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

function updateHUD() {
  scoreEl.textContent = score;
  chainEl.textContent = chain > 1 ? `✨ chain x${chain}` : '';
  seedsEl.textContent = '🌱 ' + seedsLeft;
}

// Stars
function initStars() {
  bgStars = [];
  for (let i = 0; i < 120; i++) {
    bgStars.push({
      x: Math.random() * 2000, y: Math.random() * 2000,
      s: 0.3 + Math.random() * 1.8, phase: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 2
    });
  }
}

// Seed (rising firework)
class Seed {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.startY = y;
    this.targetY = H * (0.1 + Math.random() * 0.3);
    this.vy = -(350 + Math.random() * 200);
    this.vx = (Math.random() - 0.5) * 40;
    this.trail = [];
    this.palette = BLOOM_PALETTES[Math.floor(Math.random() * BLOOM_PALETTES.length)];
    this.color = this.palette[0];
    this.alive = true;
    this.bloomed = false;
    this.age = 0;
    this.sparkTimer = 0;
    this.size = 4;
    // auto-expire if not tapped
    this.maxLife = 3.0;
  }
  update(dt) {
    this.age += dt;
    this.vy += 30 * dt; // slight drag
    this.y += this.vy * dt;
    this.x += this.vx * dt;
    this.sparkTimer -= dt;
    if (this.sparkTimer <= 0) {
      this.trail.push({
        x: this.x + (Math.random()-0.5)*4,
        y: this.y,
        life: 1, color: this.color, s: 1.5 + Math.random()*2
      });
      this.sparkTimer = 0.02;
    }
    // update trail
    for (const t of this.trail) t.life -= dt * 2.5;
    this.trail = this.trail.filter(t => t.life > 0);
    // auto-fizzle
    if (this.age > this.maxLife || this.y < -50) {
      this.alive = false;
      spawnFizzle(this.x, this.y, this.color);
    }
  }
  draw() {
    // trail
    for (const t of this.trail) {
      ctx.save();
      ctx.globalAlpha = t.life * 0.7;
      ctx.fillStyle = t.color;
      ctx.shadowColor = t.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.s * t.life, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    // seed head
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    // glow ring (pulse when in good zone)
    const screenPct = this.y / H;
    const inZone = screenPct > perfectZoneMin && screenPct < perfectZoneMax;
    if (inZone) {
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(this.age * 12);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size + 8 + Math.sin(this.age*8)*3, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// Bloom (explosion)
class Bloom {
  constructor(x, y, palette, size) {
    this.x = x; this.y = y;
    this.palette = palette;
    this.particles = [];
    this.age = 0;
    this.maxAge = 2.0;
    const count = size === 'perfect' ? 120 : size === 'good' ? 80 : 50;
    const speed = size === 'perfect' ? 350 : size === 'good' ? 250 : 160;
    const ringCount = size === 'perfect' ? 3 : size === 'good' ? 2 : 1;
    
    for (let ring = 0; ring < ringCount; ring++) {
      const ringSpeed = speed * (0.5 + ring * 0.35);
      const ringCount2 = Math.floor(count / ringCount);
      for (let i = 0; i < ringCount2; i++) {
        const angle = (Math.PI*2 / ringCount2) * i + ring * 0.3;
        const sp = ringSpeed * (0.7 + Math.random() * 0.6);
        const col = palette[Math.floor(Math.random() * palette.length)];
        this.particles.push({
          x, y,
          vx: Math.cos(angle) * sp + (Math.random()-0.5)*40,
          vy: Math.sin(angle) * sp + (Math.random()-0.5)*40,
          color: col, life: 1,
          decay: 0.3 + Math.random() * 0.5,
          size: 2 + Math.random() * 3,
          gravity: 60 + Math.random()*40,
          sparkle: Math.random() > 0.6,
          sparkPhase: Math.random() * Math.PI * 2
        });
      }
    }
    // center flash
    for (let i = 0; i < 15; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = Math.random() * 80;
      this.particles.push({
        x, y,
        vx: Math.cos(angle)*sp, vy: Math.sin(angle)*sp,
        color: '#ffffff', life: 1, decay: 2,
        size: 3 + Math.random()*3, gravity: 20,
        sparkle: true, sparkPhase: Math.random()*Math.PI*2
      });
    }
  }
  update(dt) {
    this.age += dt;
    for (const p of this.particles) {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.99;
      p.life -= p.decay * dt;
      if (p.sparkle) p.sparkPhase += dt * 10;
    }
    this.particles = this.particles.filter(p => p.life > 0);
  }
  draw() {
    for (const p of this.particles) {
      ctx.save();
      let alpha = p.life;
      if (p.sparkle) alpha *= 0.5 + 0.5 * Math.abs(Math.sin(p.sparkPhase));
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * Math.max(0.2, p.life), 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }
  get done() { return this.particles.length === 0; }
}

// Lantern
class Lantern {
  constructor() {
    this.x = 40 + Math.random() * (W - 80);
    this.y = H * (0.08 + Math.random() * 0.5);
    this.vy = -8 - Math.random() * 12;
    this.vx = (Math.random() - 0.5) * 15;
    this.size = 14 + Math.random() * 8;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 1 + Math.random() * 2;
    this.alive = true;
    this.glow = Math.random() * Math.PI * 2;
    this.type = Math.random() < 0.15 ? 'golden' : 'normal';
    this.points = this.type === 'golden' ? 50 : 10;
    this.color = this.type === 'golden' ? '#ffd700' : '#ff9944';
  }
  update(dt) {
    this.y += this.vy * dt;
    this.wobble += this.wobbleSpeed * dt;
    this.x += this.vx * dt + Math.sin(this.wobble) * 0.5;
    this.glow += dt * 3;
    if (this.y < -60) this.alive = false;
  }
  draw() {
    ctx.save();
    const g = 0.6 + 0.4 * Math.sin(this.glow);
    ctx.globalAlpha = 0.9;
    // outer glow
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 25 * g;
    // lantern body
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, this.size * 0.6, this.size * 0.8, 0, 0, Math.PI*2);
    ctx.fill();
    // inner light
    ctx.globalAlpha = 0.4 + 0.3 * g;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(this.x, this.y - this.size*0.1, this.size*0.25, this.size*0.35, 0, 0, Math.PI*2);
    ctx.fill();
    // top cap
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = this.type === 'golden' ? '#cc8800' : '#cc6633';
    ctx.fillRect(this.x - this.size*0.3, this.y - this.size*0.85, this.size*0.6, this.size*0.15);
    ctx.restore();
    // points indicator
    if (this.type === 'golden') {
      ctx.save();
      ctx.globalAlpha = 0.5 + 0.3*g;
      ctx.fillStyle = '#ffd700';
      ctx.font = '10px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('★', this.x, this.y + this.size + 10);
      ctx.restore();
    }
  }
  hitTest(x, y, radius) {
    const dx = this.x - x, dy = this.y - y;
    return Math.sqrt(dx*dx+dy*dy) < this.size + radius;
  }
}

// Effects
function spawnFizzle(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*60, vy: (Math.random()-0.5)*60,
      color, life: 0.6, decay: 1.5, size: 1.5, gravity: 30
    });
  }
}

function showFloating(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1, vy: -100 });
}

// Bloom a seed
function bloomSeed(seed) {
  seed.bloomed = true;
  seed.alive = false;
  const screenPct = seed.y / H;
  const inPerfect = screenPct > perfectZoneMin && screenPct < perfectZoneMax;
  const inGood = screenPct > 0.1 && screenPct < 0.7;
  let size, basePoints;
  if (inPerfect) { size = 'perfect'; basePoints = 25; }
  else if (inGood) { size = 'good'; basePoints = 10; }
  else { size = 'small'; basePoints = 3; }
  
  chain++;
  if (chain > maxChain) maxChain = chain;
  chainDecayTimer = 2.5;
  const mult = Math.min(chain, 15);
  const pts = basePoints * mult;
  
  const bloom = new Bloom(seed.x, seed.y, seed.palette, size);
  blooms.push(bloom);
  
  // Check lantern catches
  const blastRadius = size === 'perfect' ? 160 : size === 'good' ? 110 : 60;
  let lanternBonus = 0;
  for (const l of lanterns) {
    if (!l.alive) continue;
    if (l.hitTest(seed.x, seed.y, blastRadius)) {
      l.alive = false;
      lanternBonus += l.points * mult;
      showFloating(l.x, l.y, `🏮+${l.points * mult}`, l.color);
      // lantern catch particles
      for (let i = 0; i < 15; i++) {
        particles.push({
          x: l.x, y: l.y,
          vx: (Math.random()-0.5)*120, vy: (Math.random()-0.5)*120,
          color: l.color, life: 1, decay: 1.2, size: 2+Math.random()*2, gravity: 40
        });
      }
    }
  }
  
  score += pts + lanternBonus;
  
  // screen glow
  const c = seed.palette[0];
  const rgb = hexToRgb(c);
  screenGlow = { r: rgb.r, g: rgb.g, b: rgb.b, alpha: size === 'perfect' ? 0.25 : 0.12 };
  
  const label = size === 'perfect' ? '✦ PERFECT' : size === 'good' ? '● GOOD' : '· ok';
  showFloating(seed.x, seed.y - 30, `${label} +${pts}`, seed.palette[0]);
  
  updateHUD();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

// Input
function handleTap(x, y) {
  if (!gameRunning) return;
  // Check if tapping an existing seed
  let tappedSeed = null;
  for (const s of seeds) {
    if (!s.alive || s.bloomed) continue;
    const dx = s.x - x, dy = s.y - y;
    if (Math.sqrt(dx*dx+dy*dy) < 50) {
      tappedSeed = s;
      break;
    }
  }
  if (tappedSeed) {
    bloomSeed(tappedSeed);
  } else if (seedsLeft > 0 && y > H * 0.5) {
    // launch new seed from bottom
    seedsLeft--;
    totalLaunched++;
    seeds.push(new Seed(x, H - 20));
    updateHUD();
  }
}

canvas.addEventListener('mousedown', e => handleTap(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleTap(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

// Drawing
function drawBg(dt) {
  ctx.fillStyle = '#020010';
  ctx.fillRect(0, 0, W, H);
  // sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(5,0,30,1)');
  grad.addColorStop(0.4, 'rgba(10,5,40,1)');
  grad.addColorStop(0.8, 'rgba(20,10,50,0.8)');
  grad.addColorStop(1, 'rgba(40,15,60,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // horizon glow
  const hGrad = ctx.createRadialGradient(W/2, H, 0, W/2, H, W*0.6);
  hGrad.addColorStop(0, 'rgba(80,30,60,0.3)');
  hGrad.addColorStop(1, 'rgba(2,0,16,0)');
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, 0, W, H);
  // stars
  for (const s of bgStars) {
    s.phase += s.speed * dt;
    const alpha = 0.2 + 0.6 * Math.abs(Math.sin(s.phase));
    ctx.save();
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = '#c8c0ff';
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.s, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  // perfect zone hint (subtle)
  if (seeds.some(s => s.alive && !s.bloomed)) {
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(0, H * perfectZoneMin, W, H * (perfectZoneMax - perfectZoneMin));
    ctx.restore();
  }
}

function drawScreenGlow(dt) {
  if (screenGlow.alpha > 0) {
    ctx.save();
    ctx.globalAlpha = screenGlow.alpha;
    ctx.fillStyle = `rgb(${screenGlow.r},${screenGlow.g},${screenGlow.b})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    screenGlow.alpha -= dt * 0.8;
  }
}

function drawParticles(dt) {
  for (const p of particles) {
    p.vy += (p.gravity || 40) * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= (p.decay || 1) * dt;
    if (p.life <= 0) continue;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, (p.size||2) * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  particles = particles.filter(p => p.life > 0);
}

function drawFloating(dt) {
  for (const t of floatingTexts) {
    t.y += t.vy * dt;
    t.life -= dt * 0.8;
  }
  floatingTexts = floatingTexts.filter(t => t.life > 0);
  for (const t of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 10;
    ctx.font = 'bold 20px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  }
}

// Silhouette cityscape
function drawCityscape() {
  ctx.save();
  ctx.fillStyle = '#0a0518';
  const bH = H * 0.08;
  const bW = 15 + Math.random() * 0; // static
  // draw pre-generated buildings
  for (let i = 0; i < cityBuildings.length; i++) {
    const b = cityBuildings[i];
    ctx.fillRect(b.x, H - b.h, b.w, b.h);
    // windows
    ctx.fillStyle = 'rgba(255,200,100,0.15)';
    for (const win of b.windows) {
      ctx.fillRect(b.x + win.ox, H - b.h + win.oy, win.w, win.h);
    }
    ctx.fillStyle = '#0a0518';
  }
  ctx.restore();
}

let cityBuildings = [];
function generateCity() {
  cityBuildings = [];
  let x = -10;
  while (x < W + 30) {
    const w = 18 + Math.random() * 35;
    const h = 20 + Math.random() * 80;
    const windows = [];
    for (let wy = 8; wy < h - 8; wy += 12) {
      for (let wx = 4; wx < w - 4; wx += 8) {
        if (Math.random() > 0.5) {
          windows.push({ ox: wx, oy: wy, w: 3, h: 5 });
        }
      }
    }
    cityBuildings.push({ x, w, h, windows });
    x += w + 2 + Math.random() * 8;
  }
}

// Game loop
function gameLoop(time) {
  if (!gameRunning) return;
  const dt = Math.min((time - lastTime)/1000, 0.05);
  lastTime = time;
  elapsed += dt;

  // Chain decay
  if (chain > 0) {
    chainDecayTimer -= dt;
    if (chainDecayTimer <= 0) { chain = 0; updateHUD(); }
  }

  // Spawn lanterns
  lanternTimer -= dt;
  if (lanternTimer <= 0) {
    lanterns.push(new Lantern());
    lanternTimer = 2.5 - Math.min(elapsed * 0.01, 1.5);
  }

  // Seed regen
  seedRegenTimer -= dt;
  if (seedRegenTimer <= 0 && seedsLeft < 8) {
    seedsLeft++;
    updateHUD();
    seedRegenTimer = 3.5 - Math.min(elapsed * 0.005, 1.5);
  }

  // Update
  for (const s of seeds) s.update(dt);
  seeds = seeds.filter(s => s.alive);
  for (const b of blooms) b.update(dt);
  blooms = blooms.filter(b => !b.done);
  for (const l of lanterns) l.update(dt);
  lanterns = lanterns.filter(l => l.alive);

  // Game over: no seeds left, no active seeds, and have launched at least a few
  if (seedsLeft <= 0 && seeds.length === 0 && totalLaunched >= 5 && blooms.length === 0) {
    endGame();
    return;
  }

  // Draw
  drawBg(dt);
  drawCityscape();
  for (const l of lanterns) l.draw();
  for (const s of seeds) s.draw();
  for (const b of blooms) b.draw();
  drawParticles(dt);
  drawScreenGlow(dt);
  drawFloating(dt);

  // Launch hint
  if (seeds.length === 0 && seedsLeft > 0 && elapsed < 5) {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.2 * Math.sin(elapsed * 3);
    ctx.fillStyle = '#888';
    ctx.font = '14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('tap below to launch ↑', W/2, H - 40);
    ctx.restore();
  }

  requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0; chain = 0; maxChain = 0; elapsed = 0;
  seeds = []; blooms = []; particles = []; lanterns = []; floatingTexts = [];
  seedsLeft = 5; totalLaunched = 0;
  lanternTimer = 1.5; seedRegenTimer = 3.5; chainDecayTimer = 0;
  screenGlow = { r:0, g:0, b:0, alpha:0 };
  initStars();
  generateCity();
  updateHUD();
  overlay.classList.add('hidden');
  gameRunning = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>🎆 Show's Over</h1>
    <div class="final-score">Score: ${score}</div>
    <div class="sub">Best chain: x${maxChain}<br>Seeds launched: ${totalLaunched}</div>
    <button onclick="startGame()">ENCORE</button>
  `;
}

startBtn.addEventListener('click', startGame);
initStars();
generateCity();
</script>
</body>
</html>
