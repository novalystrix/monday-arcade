<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fireworks Maestro — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050510;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #ff6090;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }
canvas { display: block; touch-action: none; }
#ui {
  position: fixed;
  top: 12px;
  right: 16px;
  text-align: right;
  z-index: 100;
  font-size: 14px;
  line-height: 1.6;
}
#score { color: #ffdd57; font-size: 20px; font-weight: bold; text-shadow: 0 0 12px #ffdd5788; }
#combo { color: #ff6090; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
#combo.active { opacity: 1; }
#level { color: #60ddff; font-size: 12px; }
#start-screen, #game-over {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  background: radial-gradient(ellipse at center, #0a0a2060 0%, #050510ee 70%);
}
#game-over { display: none; }
h1 {
  font-size: 36px;
  background: linear-gradient(135deg, #ff6090, #ffdd57, #60ddff, #a060ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle { color: #888; font-size: 13px; margin-bottom: 32px; text-align: center; }
.btn {
  background: linear-gradient(135deg, #ff6090, #a060ff);
  border: none;
  color: white;
  font-family: inherit;
  font-size: 16px;
  padding: 12px 36px;
  border-radius: 30px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 0 20px #ff609044;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #ff609088; }
.instructions {
  color: #666;
  font-size: 11px;
  margin-top: 24px;
  text-align: center;
  line-height: 1.8;
}
#final-score {
  font-size: 48px;
  color: #ffdd57;
  text-shadow: 0 0 30px #ffdd5788;
  margin: 16px 0;
}
#perfect-count { color: #60ddff; font-size: 14px; margin-bottom: 24px; }
.zone-label {
  position: fixed;
  right: 16px;
  font-size: 10px;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.5s;
}
.zone-label.visible { opacity: 0.4; }
</style>
</head>
<body>
<a class="back-link" href="/">← Arcade</a>
<div id="ui">
  <div id="score">0</div>
  <div id="combo">COMBO x1</div>
  <div id="level">LEVEL 1</div>
</div>

<div id="start-screen">
  <h1>🎆 Fireworks Maestro</h1>
  <div class="subtitle">Timing is everything</div>
  <button class="btn" onclick="startGame()">Launch Show</button>
  <div class="instructions">
    Tap/click to launch a rocket<br>
    Tap again to detonate at the perfect height<br>
    🟡 Gold zone = PERFECT (3x points)<br>
    🔵 Blue zone = GREAT (2x points)<br>
    Chain perfects for massive combos!
  </div>
</div>

<div id="game-over">
  <h1>Show's Over!</h1>
  <div id="final-score">0</div>
  <div id="perfect-count">0 perfects</div>
  <button class="btn" onclick="startGame()">Encore!</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let rockets = [];
let particles = [];
let sparks = [];
let stars = [];
let trailParticles = [];
let score = 0;
let combo = 0;
let maxCombo = 0;
let perfects = 0;
let level = 1;
let rocketsLaunched = 0;
let maxRockets = 15;
let gameActive = false;
let canLaunch = true;
let launchCooldown = 0;
let shakeAmount = 0;
let flashAlpha = 0;
let goldZoneY, blueZoneTop, blueZoneBottom;
let autoLaunchTimer = 0;
let gameOverShown = false;

// Colors
const PALETTE = [
  ['#ff6090', '#ff90b0', '#ffb0c8'],
  ['#ffdd57', '#ffe888', '#fff4bb'],
  ['#60ddff', '#90eeff', '#c0f4ff'],
  ['#a060ff', '#c090ff', '#ddc0ff'],
  ['#60ff90', '#90ffb0', '#c0ffd8'],
  ['#ff9060', '#ffb090', '#ffd0b8'],
  ['#ff60dd', '#ff90ee', '#ffc0f4'],
  ['#ddff60', '#eeff90', '#f4ffc0'],
];

function randomPalette() {
  return PALETTE[Math.floor(Math.random() * PALETTE.length)];
}

// Init stars
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005,
    });
  }
}
initStars();

function calcZones() {
  goldZoneY = H * 0.25;
  blueZoneTop = H * 0.15;
  blueZoneBottom = H * 0.38;
}
calcZones();

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  score = 0;
  combo = 0;
  maxCombo = 0;
  perfects = 0;
  level = 1;
  rocketsLaunched = 0;
  maxRockets = 15;
  rockets = [];
  particles = [];
  sparks = [];
  trailParticles = [];
  gameActive = true;
  canLaunch = true;
  launchCooldown = 0;
  gameOverShown = false;
  autoLaunchTimer = 0;
  updateUI();
}

function launchRocket(x) {
  if (!canLaunch || rocketsLaunched >= maxRockets) return;
  const colors = randomPalette();
  const rocket = {
    x: x || W * (0.2 + Math.random() * 0.6),
    y: H + 10,
    vy: -(6 + Math.random() * 2 + level * 0.3),
    vx: (Math.random() - 0.5) * 1.5,
    colors,
    alive: true,
    detonated: false,
    trail: [],
    age: 0,
    size: 3,
  };
  rockets.push(rocket);
  rocketsLaunched++;
  canLaunch = false;
  launchCooldown = 18 - Math.min(level, 8);
}

function detonateRocket(rocket) {
  if (rocket.detonated) return;
  rocket.detonated = true;
  rocket.alive = false;

  const y = rocket.y;
  let points = 50;
  let label = '';
  let labelColor = '#fff';

  const distFromGold = Math.abs(y - goldZoneY);
  const inBlue = y >= blueZoneTop && y <= blueZoneBottom;

  if (distFromGold < H * 0.04) {
    points = 300;
    label = 'PERFECT!';
    labelColor = '#ffdd57';
    combo++;
    perfects++;
    shakeAmount = 8;
    flashAlpha = 0.15;
  } else if (inBlue) {
    points = 150;
    label = 'GREAT!';
    labelColor = '#60ddff';
    combo++;
    shakeAmount = 4;
    flashAlpha = 0.08;
  } else {
    label = y < blueZoneTop ? 'TOO HIGH' : 'TOO LOW';
    labelColor = '#ff6060';
    combo = 0;
  }

  const multiplier = 1 + Math.floor(combo / 3);
  points *= multiplier;
  points *= level;
  score += points;

  if (combo > maxCombo) maxCombo = combo;

  // Spawn explosion particles
  const count = distFromGold < H * 0.04 ? 120 : (inBlue ? 80 : 40);
  const colors = rocket.colors;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
    const speed = 2 + Math.random() * 5;
    const colorIdx = Math.floor(Math.random() * colors.length);
    particles.push({
      x: rocket.x,
      y: rocket.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: colors[colorIdx],
      life: 1,
      decay: 0.008 + Math.random() * 0.012,
      size: 2 + Math.random() * 3,
      gravity: 0.03 + Math.random() * 0.02,
      type: Math.random() < 0.3 ? 'sparkle' : 'normal',
    });
  }

  // Secondary burst for perfects
  if (distFromGold < H * 0.04) {
    for (let i = 0; i < 60; i++) {
      const angle = (Math.PI * 2 * i) / 60;
      const speed = 1 + Math.random() * 2;
      sparks.push({
        x: rocket.x,
        y: rocket.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: '#ffdd57',
        life: 1,
        decay: 0.015 + Math.random() * 0.01,
        size: 1.5,
      });
    }
  }

  // Score popup
  sparks.push({
    x: rocket.x,
    y: rocket.y - 20,
    vx: 0,
    vy: -1.5,
    color: labelColor,
    life: 1,
    decay: 0.012,
    size: 0,
    text: label + ' +' + points,
    isText: true,
  });

  updateUI();
  canLaunch = true;
  launchCooldown = 0;
}

function updateUI() {
  document.getElementById('score').textContent = score.toLocaleString();
  const comboEl = document.getElementById('combo');
  if (combo >= 2) {
    comboEl.textContent = 'COMBO x' + (1 + Math.floor(combo / 3));
    comboEl.classList.add('active');
  } else {
    comboEl.classList.remove('active');
  }
  document.getElementById('level').textContent = 'LEVEL ' + level + '  •  ' + (maxRockets - rocketsLaunched) + ' left';
}

function checkLevelUp() {
  if (rocketsLaunched >= maxRockets && rockets.every(r => !r.alive) && particles.length < 5) {
    if (!gameOverShown) {
      // Level progression
      if (perfects >= 3 || score > level * 1000) {
        level++;
        maxRockets += 3;
        rocketsLaunched = 0;
        calcZones();
        updateUI();
      } else {
        endGame();
      }
    }
  }
}

function endGame() {
  gameOverShown = true;
  gameActive = false;
  document.getElementById('game-over').style.display = 'flex';
  document.getElementById('final-score').textContent = score.toLocaleString();
  document.getElementById('perfect-count').textContent = perfects + ' perfects • max combo x' + (1 + Math.floor(maxCombo / 3));
}

// Input
function handleInput(e) {
  if (!gameActive) return;
  e.preventDefault();

  const activeRocket = rockets.find(r => r.alive && !r.detonated);
  if (activeRocket) {
    detonateRocket(activeRocket);
  } else if (canLaunch && rocketsLaunched < maxRockets) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    launchRocket(x);
  }
}

canvas.addEventListener('pointerdown', handleInput);

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && gameActive) {
    e.preventDefault();
    const activeRocket = rockets.find(r => r.alive && !r.detonated);
    if (activeRocket) {
      detonateRocket(activeRocket);
    } else if (canLaunch && rocketsLaunched < maxRockets) {
      launchRocket();
    }
  }
});

// Main loop
function update() {
  // Cooldown
  if (launchCooldown > 0) {
    launchCooldown--;
    if (launchCooldown <= 0) canLaunch = true;
  }

  // Auto-detonate if rocket goes too high
  rockets.forEach(r => {
    if (r.alive && !r.detonated) {
      r.age++;
      r.y += r.vy;
      r.x += r.vx;
      r.vy *= 0.995;

      // Trail
      if (r.age % 2 === 0) {
        trailParticles.push({
          x: r.x + (Math.random() - 0.5) * 4,
          y: r.y,
          life: 1,
          decay: 0.03,
          color: r.colors[0],
          size: 2 + Math.random(),
        });
      }

      // Auto-detonate at ceiling
      if (r.y < H * 0.05) {
        detonateRocket(r);
      }
    }
  });

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  // Sparks
  sparks.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    if (!s.isText) s.vy += 0.02;
    s.life -= s.decay;
  });
  sparks = sparks.filter(s => s.life > 0);

  // Trail particles
  trailParticles.forEach(t => {
    t.life -= t.decay;
    t.y += 0.3;
  });
  trailParticles = trailParticles.filter(t => t.life > 0);

  // Shake decay
  shakeAmount *= 0.9;
  if (shakeAmount < 0.1) shakeAmount = 0;
  flashAlpha *= 0.92;

  // Stars twinkle
  stars.forEach(s => s.twinkle += s.speed);

  // Clean dead rockets
  rockets = rockets.filter(r => r.alive || particles.length > 0);

  checkLevelUp();
}

function draw() {
  ctx.save();

  // Screen shake
  if (shakeAmount > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmount,
      (Math.random() - 0.5) * shakeAmount
    );
  }

  // Background with slight gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(0.6, '#080820');
  bg.addColorStop(1, '#0a0a15');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  // Zone indicators (subtle)
  if (gameActive && rockets.some(r => r.alive && !r.detonated)) {
    // Gold zone
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#ffdd57';
    ctx.fillRect(0, goldZoneY - H * 0.04, W, H * 0.08);
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#ffdd57';
    ctx.setLineDash([8, 12]);
    ctx.beginPath();
    ctx.moveTo(0, goldZoneY);
    ctx.lineTo(W, goldZoneY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Blue zone edges
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#60ddff';
    ctx.fillRect(0, blueZoneTop, W, blueZoneBottom - blueZoneTop);
    ctx.restore();
  }

  // Trail particles
  trailParticles.forEach(t => {
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.size * t.life, 0, Math.PI * 2);
    ctx.fillStyle = t.color + Math.floor(t.life * 60).toString(16).padStart(2, '0');
    ctx.fill();
  });

  // Rockets
  rockets.forEach(r => {
    if (!r.alive) return;
    // Glow
    const glow = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, 15);
    glow.addColorStop(0, r.colors[0] + '80');
    glow.addColorStop(1, r.colors[0] + '00');
    ctx.fillStyle = glow;
    ctx.fillRect(r.x - 15, r.y - 15, 30, 30);

    // Rocket body
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.size, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.size + 1, 0, Math.PI * 2);
    ctx.strokeStyle = r.colors[0];
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Explosion particles
  particles.forEach(p => {
    const alpha = p.life;
    if (p.type === 'sparkle') {
      // Sparkle: cross shape
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1;
      const s = p.size * alpha;
      ctx.beginPath();
      ctx.moveTo(p.x - s, p.y);
      ctx.lineTo(p.x + s, p.y);
      ctx.moveTo(p.x, p.y - s);
      ctx.lineTo(p.x, p.y + s);
      ctx.stroke();
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.fill();

      // Glow
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha * 0.15;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // Sparks
  sparks.forEach(s => {
    if (s.isText) {
      ctx.save();
      ctx.globalAlpha = s.life;
      ctx.fillStyle = s.color;
      ctx.font = 'bold 16px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 10;
      ctx.fillText(s.text, s.x, s.y);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = s.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  });

  // Flash overlay
  if (flashAlpha > 0.01) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // City silhouette at bottom
  ctx.fillStyle = '#0a0a18';
  const bw = 30 + Math.random() * 0;
  for (let x = 0; x < W; x += 28) {
    const h = 20 + Math.sin(x * 0.05) * 15 + Math.sin(x * 0.13) * 10;
    ctx.fillRect(x, H - h, 26, h);
    // Tiny windows
    if (Math.sin(x * 7.3) > 0) {
      ctx.fillStyle = '#ffdd5715';
      for (let wy = H - h + 4; wy < H - 4; wy += 8) {
        if (Math.random() > 0.5) {
          ctx.fillRect(x + 4, wy, 3, 3);
        }
        if (Math.random() > 0.5) {
          ctx.fillRect(x + 14, wy, 3, 3);
        }
      }
      ctx.fillStyle = '#0a0a18';
    }
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

window.addEventListener('resize', () => {
  resize();
  initStars();
  calcZones();
});
</script>
</body>
</html>
