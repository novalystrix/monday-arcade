<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diamond Rush — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #00d4ff;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

canvas {
  display: block;
  cursor: pointer;
}

#hud {
  position: fixed;
  top: 12px;
  right: 16px;
  text-align: right;
  z-index: 100;
  font-size: 14px;
  line-height: 1.6;
  text-shadow: 0 0 8px rgba(0,200,255,0.5);
}

#start-screen, #game-over {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  background: rgba(10,10,26,0.95);
  transition: opacity 0.3s;
}

#start-screen h1, #game-over h1 {
  font-size: 42px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ff6ec7, #00d4ff, #ffe066, #ff6ec7);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3s ease infinite;
}

@keyframes shimmer {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

#start-screen p, #game-over p {
  font-size: 16px;
  color: #8888aa;
  margin-bottom: 24px;
}

.btn {
  padding: 14px 36px;
  font-size: 18px;
  font-family: inherit;
  background: linear-gradient(135deg, #6040cc, #00d4ff);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(0,212,255,0.4);
}

#final-score {
  font-size: 64px;
  color: #ffe066;
  text-shadow: 0 0 30px rgba(255,224,100,0.6);
  margin: 12px 0;
}

#combo-display {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  font-weight: bold;
  pointer-events: none;
  z-index: 150;
  opacity: 0;
  transition: none;
  text-shadow: 0 0 30px currentColor;
}
</style>
</head>
<body>
<a href="/" class="back-link">← Arcade</a>

<div id="hud">
  <div>💎 <span id="score">0</span></div>
  <div>❤️ <span id="lives">5</span></div>
  <div>🔥 <span id="combo">0</span>x</div>
</div>

<div id="combo-display"></div>

<div id="start-screen">
  <h1>💎 Diamond Rush</h1>
  <p>Click gems to shatter them — don't let them hit the ground!</p>
  <button class="btn" id="start-btn">Play</button>
</div>

<div id="game-over" style="display:none;">
  <h1>Game Over</h1>
  <div id="final-score">0</div>
  <p id="final-msg">Nice try!</p>
  <button class="btn" id="retry-btn">Try Again</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const comboEl = document.getElementById('combo');
const comboDisplay = document.getElementById('combo-display');
const startScreen = document.getElementById('start-screen');
const gameOver = document.getElementById('game-over');
const finalScore = document.getElementById('final-score');
const finalMsg = document.getElementById('final-msg');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Gem types
const GEM_TYPES = [
  { name: 'diamond', color: '#b8f0ff', glow: '#00d4ff', points: 10, sides: 4, shardColors: ['#00d4ff','#b8f0ff','#fff','#80e0ff','#4df0ff'] },
  { name: 'ruby', color: '#ff4466', glow: '#ff0033', points: 15, sides: 6, shardColors: ['#ff0033','#ff6644','#ffaa00','#ff2244','#ff8866'] },
  { name: 'emerald', color: '#44ff88', glow: '#00ff66', points: 12, sides: 5, shardColors: ['#00ff66','#44ff88','#88ffaa','#22ff44','#aaffcc'] },
  { name: 'sapphire', color: '#4466ff', glow: '#2244ff', points: 12, sides: 5, shardColors: ['#2244ff','#6688ff','#aabbff','#4466ff','#88aaff'] },
  { name: 'amethyst', color: '#bb66ff', glow: '#9933ff', points: 14, sides: 7, shardColors: ['#9933ff','#bb66ff','#dd99ff','#aa44ff','#cc88ff'] },
  { name: 'topaz', color: '#ffe066', glow: '#ffcc00', points: 11, sides: 4, shardColors: ['#ffcc00','#ffe066','#fff4aa','#ffdd33','#ffee88'] },
];

let gems = [];
let particles = [];
let rays = [];
let bgStars = [];
let score = 0;
let lives = 5;
let combo = 0;
let comboTimer = 0;
let running = false;
let spawnTimer = 0;
let spawnInterval = 1.8;
let difficulty = 1;
let elapsed = 0;
let screenShake = 0;
let screenShakeX = 0;
let screenShakeY = 0;

// Background stars
function initStars() {
  bgStars = [];
  for (let i = 0; i < 120; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.3 + 0.1,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}
initStars();

class Gem {
  constructor() {
    this.type = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
    this.size = 22 + Math.random() * 16;
    this.x = this.size + Math.random() * (W - this.size * 2);
    this.y = -this.size * 2;
    this.vy = 1.0 + difficulty * 0.3 + Math.random() * 0.8;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.04;
    this.shimmerPhase = Math.random() * Math.PI * 2;
    this.alive = true;
    this.pulsePhase = Math.random() * Math.PI * 2;
  }

  update(dt) {
    this.y += this.vy * 60 * dt;
    this.x += this.vx * 60 * dt;
    this.rotation += this.rotSpeed;
    this.shimmerPhase += dt * 3;
    this.pulsePhase += dt * 4;
    if (this.x < this.size) this.vx = Math.abs(this.vx);
    if (this.x > W - this.size) this.vx = -Math.abs(this.vx);
    if (this.y > H + this.size) {
      this.alive = false;
      return true; // missed
    }
    return false;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    const pulse = 1 + Math.sin(this.pulsePhase) * 0.06;
    const s = this.size * pulse;

    // Outer glow
    const grad = ctx.createRadialGradient(0, 0, s * 0.3, 0, 0, s * 2);
    grad.addColorStop(0, this.type.glow + '40');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, s * 2, 0, Math.PI * 2);
    ctx.fill();

    // Draw gem shape
    const sides = this.type.sides;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
      const r = i % 2 === 0 ? s : s * 0.6;
      ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
    }
    ctx.closePath();

    // Gradient fill
    const gfill = ctx.createLinearGradient(-s, -s, s, s);
    gfill.addColorStop(0, this.type.color);
    gfill.addColorStop(0.5, '#fff');
    gfill.addColorStop(1, this.type.color);
    ctx.fillStyle = gfill;
    ctx.fill();

    // Inner highlight
    ctx.strokeStyle = '#ffffff80';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Shimmer sparkle
    const shimX = Math.cos(this.shimmerPhase) * s * 0.3;
    const shimY = Math.sin(this.shimmerPhase * 1.3) * s * 0.3;
    const shimGrad = ctx.createRadialGradient(shimX, shimY, 0, shimX, shimY, s * 0.4);
    shimGrad.addColorStop(0, '#ffffff90');
    shimGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = shimGrad;
    ctx.beginPath();
    ctx.arc(shimX, shimY, s * 0.4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  hitTest(mx, my) {
    const dx = mx - this.x;
    const dy = my - this.y;
    return Math.sqrt(dx * dx + dy * dy) < this.size * 1.4;
  }
}

class Particle {
  constructor(x, y, color, speed, size, life) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.vx = (Math.random() - 0.5) * speed;
    this.vy = (Math.random() - 0.5) * speed - 2;
    this.size = size || (2 + Math.random() * 4);
    this.life = life || (0.5 + Math.random() * 0.8);
    this.maxLife = this.life;
    this.gravity = 2 + Math.random() * 2;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.3;
    this.shape = Math.random() > 0.5 ? 'diamond' : 'circle';
  }

  update(dt) {
    this.x += this.vx * 60 * dt;
    this.vy += this.gravity * dt;
    this.y += this.vy * 60 * dt;
    this.rotation += this.rotSpeed;
    this.life -= dt;
    return this.life <= 0;
  }

  draw() {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = alpha;

    if (this.shape === 'diamond') {
      const s = this.size;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.6, 0);
      ctx.lineTo(0, s);
      ctx.lineTo(-s * 0.6, 0);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0, 0, this.size, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

class Ray {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    this.dx = Math.cos(angle);
    this.dy = Math.sin(angle);
    this.length = 60 + Math.random() * 120;
    this.width = 1.5 + Math.random() * 2.5;
    this.life = 0.3 + Math.random() * 0.4;
    this.maxLife = this.life;
  }

  update(dt) {
    this.life -= dt;
    return this.life <= 0;
  }

  draw() {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.width;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x + this.dx * this.length, this.y + this.dy * this.length);
    ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

function shatterGem(gem) {
  const { x, y, type, size } = gem;
  
  // Prismatic rays
  const rayCount = 8 + Math.floor(Math.random() * 8);
  for (let i = 0; i < rayCount; i++) {
    rays.push(new Ray(x, y, type.shardColors[i % type.shardColors.length]));
  }

  // Shard particles
  const count = 25 + Math.floor(Math.random() * 20);
  for (let i = 0; i < count; i++) {
    const color = type.shardColors[Math.floor(Math.random() * type.shardColors.length)];
    const speed = 6 + Math.random() * 8;
    const pSize = 2 + Math.random() * (size * 0.2);
    particles.push(new Particle(x, y, color, speed, pSize, 0.6 + Math.random() * 0.8));
  }

  // White flash particles
  for (let i = 0; i < 8; i++) {
    particles.push(new Particle(x, y, '#ffffff', 4, 3 + Math.random() * 3, 0.3));
  }

  // Sparkle ring
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const p = new Particle(x, y, type.shardColors[i % type.shardColors.length], 0.5, 2, 0.5);
    p.vx = Math.cos(angle) * 5;
    p.vy = Math.sin(angle) * 5;
    p.gravity = 0;
    particles.push(p);
  }

  screenShake = 0.15;
}

function showCombo(val) {
  const cd = comboDisplay;
  const colors = ['#ffe066','#ff6ec7','#00d4ff','#44ff88','#ff4466','#bb66ff'];
  cd.style.color = colors[val % colors.length];
  cd.textContent = val >= 3 ? `${val}x COMBO!` : val >= 5 ? `${val}x MEGA!` : `${val}x`;
  cd.style.opacity = 1;
  cd.style.transform = 'translate(-50%, -50%) scale(1.3)';
  setTimeout(() => {
    cd.style.transition = 'opacity 0.5s, transform 0.5s';
    cd.style.opacity = 0;
    cd.style.transform = 'translate(-50%, -50%) scale(0.8)';
    setTimeout(() => { cd.style.transition = 'none'; }, 500);
  }, 300);
}

function handleClick(mx, my) {
  if (!running) return;
  let hit = false;
  for (let i = gems.length - 1; i >= 0; i--) {
    if (gems[i].hitTest(mx, my)) {
      const gem = gems[i];
      gem.alive = false;

      combo++;
      comboTimer = 1.5;
      const multiplier = Math.min(combo, 10);
      const points = gem.type.points * multiplier;
      score += points;

      shatterGem(gem);
      if (combo >= 3) showCombo(combo);

      scoreEl.textContent = score;
      comboEl.textContent = combo;
      gems.splice(i, 1);
      hit = true;
      break;
    }
  }
  if (!hit) {
    // Miss penalty — small screen flash
    combo = 0;
    comboTimer = 0;
    comboEl.textContent = 0;
  }
}

canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) handleClick(t.clientX, t.clientY);
}, { passive: false });

function drawStars(dt) {
  for (const s of bgStars) {
    s.twinkle += s.speed * dt * 2;
    const a = s.a * (0.5 + 0.5 * Math.sin(s.twinkle));
    ctx.fillStyle = `rgba(180,200,255,${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

let lastTime = 0;
function gameLoop(time) {
  if (!running) return;
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  elapsed += dt;
  difficulty = 1 + elapsed / 30; // Gets harder over time
  spawnInterval = Math.max(0.35, 1.8 - difficulty * 0.12);

  // Screen shake
  if (screenShake > 0) {
    screenShake -= dt;
    screenShakeX = (Math.random() - 0.5) * 8;
    screenShakeY = (Math.random() - 0.5) * 8;
  } else {
    screenShakeX = 0;
    screenShakeY = 0;
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      combo = 0;
      comboEl.textContent = 0;
    }
  }

  // Spawn gems
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = spawnInterval + Math.random() * 0.5;
    gems.push(new Gem());
    // Occasional double spawn at higher difficulty
    if (difficulty > 3 && Math.random() < 0.3) {
      gems.push(new Gem());
    }
  }

  // Update
  for (let i = gems.length - 1; i >= 0; i--) {
    const missed = gems[i].update(dt);
    if (missed) {
      lives--;
      livesEl.textContent = lives;
      gems.splice(i, 1);
      if (lives <= 0) endGame();
    }
  }

  particles = particles.filter(p => !p.update(dt));
  rays = rays.filter(r => !r.update(dt));

  // Draw
  ctx.save();
  ctx.translate(screenShakeX, screenShakeY);

  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  drawStars(dt);

  // Ground glow
  const groundGrad = ctx.createLinearGradient(0, H - 60, 0, H);
  groundGrad.addColorStop(0, 'transparent');
  groundGrad.addColorStop(1, 'rgba(255,50,50,0.08)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H - 60, W, 60);

  // Danger line
  ctx.strokeStyle = 'rgba(255,50,50,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(0, H - 2);
  ctx.lineTo(W, H - 2);
  ctx.stroke();
  ctx.setLineDash([]);

  rays.forEach(r => r.draw());
  gems.forEach(g => g.draw());
  particles.forEach(p => p.draw());

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0;
  lives = 5;
  combo = 0;
  comboTimer = 0;
  difficulty = 1;
  elapsed = 0;
  spawnTimer = 1;
  gems = [];
  particles = [];
  rays = [];
  screenShake = 0;
  scoreEl.textContent = 0;
  livesEl.textContent = 5;
  comboEl.textContent = 0;
  startScreen.style.display = 'none';
  gameOver.style.display = 'none';
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function endGame() {
  running = false;
  finalScore.textContent = score;
  if (score > 500) finalMsg.textContent = '✨ Legendary!';
  else if (score > 300) finalMsg.textContent = '🔥 Amazing!';
  else if (score > 150) finalMsg.textContent = '💎 Great job!';
  else finalMsg.textContent = 'Keep shining!';
  gameOver.style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
</script>
</body>
</html>
