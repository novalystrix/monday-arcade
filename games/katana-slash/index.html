<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Katana Slash — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060612;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.back-link {
  position: fixed;
  top: 12px;
  left: 16px;
  color: #6040cc;
  text-decoration: none;
  font-size: 13px;
  z-index: 100;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

canvas {
  display: block;
  cursor: crosshair;
}

#hud {
  position: fixed;
  top: 12px;
  right: 16px;
  text-align: right;
  z-index: 100;
  font-size: 14px;
  line-height: 1.6;
  text-shadow: 0 0 8px rgba(150,100,255,0.5);
}
#hud .score { font-size: 28px; font-weight: bold; color: #ff6ec7; }
#hud .combo { color: #ffd700; font-size: 16px; }
#hud .lives { font-size: 18px; }

#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(6,6,18,0.92);
  z-index: 200;
  transition: opacity 0.4s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }

#overlay h1 {
  font-size: 48px;
  background: linear-gradient(135deg, #ff6ec7, #6040cc, #00e5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  text-shadow: none;
}
#overlay .sub {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 24px;
}
#overlay .final-score {
  font-size: 32px;
  color: #ffd700;
  margin-bottom: 12px;
}
#overlay button {
  background: linear-gradient(135deg, #6040cc, #ff6ec7);
  border: none;
  color: #fff;
  font-family: inherit;
  font-size: 18px;
  padding: 14px 40px;
  border-radius: 30px;
  cursor: pointer;
  margin-top: 12px;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 0 20px rgba(150,100,255,0.4);
}
#overlay button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(255,110,199,0.6);
}
</style>
</head>
<body>
<a class="back-link" href="/">← Arcade</a>

<div id="hud">
  <div class="score" id="scoreEl">0</div>
  <div class="combo" id="comboEl"></div>
  <div class="lives" id="livesEl">❤️❤️❤️</div>
</div>

<div id="overlay">
  <h1>⚔️ Katana Slash</h1>
  <div class="sub">Slash the shapes. Dodge the bombs.</div>
  <button id="startBtn">START</button>
</div>

<canvas id="c"></canvas>

<script>
// ── CANVAS SETUP ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── STATE ──
let score = 0, combo = 0, maxCombo = 0, lives = 3, gameRunning = false, gameOver = false;
let fruits = [], particles = [], slashTrail = [], bombs = [];
let spawnTimer = 0, spawnInterval = 1.0, elapsed = 0;
let lastTime = 0;
let isSlashing = false;

const COLORS = ['#ff6ec7','#00e5ff','#ffd700','#7cff6b','#ff4444','#c77dff','#ff9d00'];
const SHAPES = ['circle','hexagon','diamond','star','triangle'];
const BOMB_COLOR = '#ff2222';

// ── HUD ──
const scoreEl = document.getElementById('scoreEl');
const comboEl = document.getElementById('comboEl');
const livesEl = document.getElementById('livesEl');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

function updateHUD() {
  scoreEl.textContent = score;
  comboEl.textContent = combo > 1 ? `🔥 x${combo}` : '';
  livesEl.textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
}

// ── FRUIT CLASS ──
class Fruit {
  constructor() {
    this.r = 28 + Math.random() * 18;
    this.x = 60 + Math.random() * (W - 120);
    this.y = H + this.r;
    const angle = -Math.PI/2 + (Math.random() - 0.5) * 0.8;
    const speed = 500 + Math.random() * 250 + elapsed * 3;
    this.vx = Math.cos(angle) * speed * 0.3;
    this.vy = -speed * (0.6 + Math.random() * 0.2);
    this.gravity = 450 + Math.random() * 100;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 4;
    this.slashed = false;
    this.missed = false;
    this.glowPhase = Math.random() * Math.PI * 2;
    this.points = this.shape === 'star' ? 3 : this.shape === 'diamond' ? 2 : 1;
  }
  update(dt) {
    this.vy += this.gravity * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rotation += this.rotSpeed * dt;
    this.glowPhase += dt * 3;
    if (this.y > H + 80 && !this.slashed && !this.missed) {
      this.missed = true;
      combo = 0;
      lives--;
      updateHUD();
      if (lives <= 0) endGame();
    }
  }
  draw() {
    if (this.slashed) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const glow = 0.6 + 0.4 * Math.sin(this.glowPhase);
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15 + 10 * glow;
    ctx.fillStyle = this.color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    drawShape(ctx, this.shape, this.r);
    ctx.fill();
    ctx.stroke();
    // inner glow
    ctx.globalAlpha = 0.3 + 0.2 * glow;
    ctx.fillStyle = '#fff';
    drawShape(ctx, this.shape, this.r * 0.4);
    ctx.fill();
    ctx.restore();
  }
}

// ── BOMB CLASS ──
class Bomb {
  constructor() {
    this.r = 26;
    this.x = 80 + Math.random() * (W - 160);
    this.y = H + this.r;
    const speed = 520 + Math.random() * 200 + elapsed * 2;
    this.vx = (Math.random() - 0.5) * 200;
    this.vy = -speed * (0.6 + Math.random() * 0.15);
    this.gravity = 460;
    this.rotation = 0;
    this.rotSpeed = (Math.random() - 0.5) * 3;
    this.slashed = false;
  }
  update(dt) {
    this.vy += this.gravity * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rotation += this.rotSpeed * dt;
  }
  draw() {
    if (this.slashed) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.shadowColor = BOMB_COLOR;
    ctx.shadowBlur = 20;
    // bomb body
    ctx.fillStyle = '#1a1a2e';
    ctx.strokeStyle = BOMB_COLOR;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // skull face
    ctx.fillStyle = BOMB_COLOR;
    ctx.font = `${this.r}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💣', 0, 2);
    // fuse sparks
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(0, -this.r - 4, 4 + Math.random() * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── DRAW SHAPES ──
function drawShape(c, shape, r) {
  c.beginPath();
  switch (shape) {
    case 'circle':
      c.arc(0, 0, r, 0, Math.PI * 2);
      break;
    case 'hexagon':
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        i === 0 ? c.moveTo(Math.cos(a)*r, Math.sin(a)*r) : c.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      c.closePath();
      break;
    case 'diamond':
      c.moveTo(0, -r); c.lineTo(r*0.7, 0); c.lineTo(0, r); c.lineTo(-r*0.7, 0);
      c.closePath();
      break;
    case 'star':
      for (let i = 0; i < 10; i++) {
        const a = (Math.PI / 5) * i - Math.PI / 2;
        const rad = i % 2 === 0 ? r : r * 0.45;
        i === 0 ? c.moveTo(Math.cos(a)*rad, Math.sin(a)*rad) : c.lineTo(Math.cos(a)*rad, Math.sin(a)*rad);
      }
      c.closePath();
      break;
    case 'triangle':
      c.moveTo(0, -r); c.lineTo(r*0.87, r*0.5); c.lineTo(-r*0.87, r*0.5);
      c.closePath();
      break;
  }
}

// ── PARTICLES ──
class Particle {
  constructor(x, y, color, size) {
    this.x = x; this.y = y;
    this.color = color;
    this.size = size || (2 + Math.random() * 4);
    const angle = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 300;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 0.8 + Math.random() * 1.5;
    this.gravity = 200;
  }
  update(dt) {
    this.vy += this.gravity * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= this.decay * dt;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── SLASH TRAIL ──
function addSlashPoint(x, y) {
  slashTrail.push({ x, y, life: 1 });
  if (slashTrail.length > 40) slashTrail.shift();
}

function drawSlashTrail() {
  if (slashTrail.length < 2) return;
  for (let i = 1; i < slashTrail.length; i++) {
    const p = slashTrail[i-1], q = slashTrail[i];
    if (p.life <= 0 || q.life <= 0) continue;
    const alpha = q.life * 0.8;
    const width = q.life * 6;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#fff';
    ctx.shadowColor = '#c77dff';
    ctx.shadowBlur = 15;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(q.x, q.y);
    ctx.stroke();
    // bright core
    ctx.strokeStyle = '#e0c0ff';
    ctx.lineWidth = width * 0.4;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(q.x, q.y);
    ctx.stroke();
    ctx.restore();
  }
}

function updateSlashTrail(dt) {
  for (const p of slashTrail) p.life -= dt * 3;
  while (slashTrail.length > 0 && slashTrail[0].life <= 0) slashTrail.shift();
}

// ── SLASH HIT TEST ──
function checkSlash(x, y) {
  // fruits
  for (const f of fruits) {
    if (f.slashed || f.missed) continue;
    const dx = f.x - x, dy = f.y - y;
    if (Math.sqrt(dx*dx + dy*dy) < f.r + 15) {
      f.slashed = true;
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      const comboMult = Math.min(combo, 10);
      score += f.points * comboMult;
      updateHUD();
      spawnSlashEffect(f.x, f.y, f.color);
      showFloatingText(f.x, f.y, `+${f.points * comboMult}`, f.color);
    }
  }
  // bombs
  for (const b of bombs) {
    if (b.slashed) continue;
    const dx = b.x - x, dy = b.y - y;
    if (Math.sqrt(dx*dx + dy*dy) < b.r + 15) {
      b.slashed = true;
      combo = 0;
      lives--;
      updateHUD();
      spawnBombEffect(b.x, b.y);
      if (lives <= 0) endGame();
    }
  }
}

function spawnSlashEffect(x, y, color) {
  for (let i = 0; i < 25; i++) {
    particles.push(new Particle(x, y, color));
  }
  // white sparkle burst
  for (let i = 0; i < 8; i++) {
    particles.push(new Particle(x, y, '#ffffff', 1.5));
  }
}

function spawnBombEffect(x, y) {
  for (let i = 0; i < 40; i++) {
    particles.push(new Particle(x, y, i % 2 ? BOMB_COLOR : '#ff8800', 3 + Math.random() * 3));
  }
  // screen flash
  screenFlash = 0.5;
}

let screenFlash = 0;

// ── FLOATING TEXT ──
let floatingTexts = [];
function showFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1, vy: -120 });
}

function updateFloatingTexts(dt) {
  for (const t of floatingTexts) {
    t.y += t.vy * dt;
    t.life -= dt * 1.2;
  }
  floatingTexts = floatingTexts.filter(t => t.life > 0);
}

function drawFloatingTexts() {
  for (const t of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 10;
    ctx.font = 'bold 22px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  }
}

// ── BACKGROUND STARS ──
const stars = Array.from({length: 60}, () => ({
  x: Math.random() * 2000,
  y: Math.random() * 2000,
  s: 0.5 + Math.random() * 1.5,
  twinkle: Math.random() * Math.PI * 2
}));

function drawBackground(dt) {
  ctx.fillStyle = '#060612';
  ctx.fillRect(0, 0, W, H);
  // subtle gradient
  const grad = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.7);
  grad.addColorStop(0, 'rgba(60,20,100,0.15)');
  grad.addColorStop(1, 'rgba(6,6,18,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // stars
  for (const s of stars) {
    s.twinkle += dt * (1 + Math.random());
    const alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkle));
    ctx.save();
    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle = '#c0b0ff';
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── SPAWN ──
function spawnFruit() {
  fruits.push(new Fruit());
  // sometimes spawn extras
  if (Math.random() < 0.3 + elapsed * 0.002) fruits.push(new Fruit());
  if (elapsed > 20 && Math.random() < 0.15) fruits.push(new Fruit());
}

function spawnBomb() {
  if (elapsed > 5 && Math.random() < 0.2 + elapsed * 0.003) {
    bombs.push(new Bomb());
  }
}

// ── GAME LOOP ──
function gameLoop(time) {
  if (!gameRunning) return;
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  elapsed += dt;

  // spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnFruit();
    spawnBomb();
    spawnInterval = Math.max(0.4, 1.0 - elapsed * 0.005);
    spawnTimer = spawnInterval;
  }

  // update
  for (const f of fruits) f.update(dt);
  for (const b of bombs) b.update(dt);
  for (const p of particles) p.update(dt);
  updateSlashTrail(dt);
  updateFloatingTexts(dt);
  if (screenFlash > 0) screenFlash -= dt * 3;

  // cleanup
  fruits = fruits.filter(f => f.y < H + 200 || (!f.slashed && !f.missed));
  bombs = bombs.filter(b => b.y < H + 200);
  particles = particles.filter(p => p.life > 0);

  // draw
  drawBackground(dt);
  drawSlashTrail();
  for (const f of fruits) f.draw();
  for (const b of bombs) b.draw();
  for (const p of particles) p.draw();
  drawFloatingTexts();

  // screen flash
  if (screenFlash > 0) {
    ctx.save();
    ctx.globalAlpha = screenFlash * 0.4;
    ctx.fillStyle = BOMB_COLOR;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  requestAnimationFrame(gameLoop);
}

// ── INPUT ──
function getXY(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

canvas.addEventListener('mousedown', e => { isSlashing = true; const p = getXY(e); addSlashPoint(p.x, p.y); checkSlash(p.x, p.y); });
canvas.addEventListener('mousemove', e => { if (!isSlashing) return; const p = getXY(e); addSlashPoint(p.x, p.y); checkSlash(p.x, p.y); });
canvas.addEventListener('mouseup', () => { isSlashing = false; });
canvas.addEventListener('mouseleave', () => { isSlashing = false; });

canvas.addEventListener('touchstart', e => { e.preventDefault(); isSlashing = true; const p = getXY(e); addSlashPoint(p.x, p.y); checkSlash(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!isSlashing) return; const p = getXY(e); addSlashPoint(p.x, p.y); checkSlash(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchend', () => { isSlashing = false; });

// ── GAME FLOW ──
function startGame() {
  score = 0; combo = 0; maxCombo = 0; lives = 3; elapsed = 0;
  fruits = []; bombs = []; particles = []; slashTrail = []; floatingTexts = [];
  spawnTimer = 0.5; spawnInterval = 1.0; gameOver = false;
  screenFlash = 0;
  updateHUD();
  overlay.classList.add('hidden');
  gameRunning = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  gameOver = true;
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>⚔️ Game Over</h1>
    <div class="final-score">Score: ${score}</div>
    <div class="sub">Best combo: x${maxCombo}</div>
    <button onclick="startGame()">PLAY AGAIN</button>
  `;
}

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
