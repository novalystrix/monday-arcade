<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Luminos</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: none; }
canvas { display: block; }

#ui-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}

#score-display {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 28px; font-weight: 300; letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(255,255,255,0.5);
  opacity: 0; transition: opacity 0.5s;
}
#score-display.visible { opacity: 1; }

#combo-display {
  position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
  color: #ffdd57; font-size: 16px; font-weight: 600; letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(255,221,87,0.6);
  opacity: 0; transition: opacity 0.3s;
}
#combo-display.visible { opacity: 1; }

#start-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; pointer-events: all;
  background: radial-gradient(ellipse at center, rgba(20,10,40,0.95) 0%, rgba(0,0,0,0.98) 100%);
}

#start-screen h1 {
  font-size: 72px; font-weight: 100; letter-spacing: 20px;
  background: linear-gradient(135deg, #ff6fd8, #3813c2, #00d2ff, #ff6fd8);
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s ease infinite;
  margin-bottom: 20px;
}

#start-screen .subtitle {
  color: rgba(255,255,255,0.4); font-size: 14px; letter-spacing: 6px;
  text-transform: uppercase; margin-bottom: 50px;
}

#start-screen .tap-hint {
  color: rgba(255,255,255,0.25); font-size: 16px; letter-spacing: 3px;
  animation: pulse 2s ease-in-out infinite;
}

#game-over {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; pointer-events: all;
  background: radial-gradient(ellipse at center, rgba(10,5,20,0.92) 0%, rgba(0,0,0,0.96) 100%);
}

#game-over h2 {
  font-size: 48px; font-weight: 100; letter-spacing: 12px;
  color: rgba(255,255,255,0.8); margin-bottom: 30px;
}

#game-over .final-score {
  font-size: 64px; font-weight: 200;
  background: linear-gradient(135deg, #ff6fd8, #00d2ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 15px;
}

#game-over .best-score {
  color: rgba(255,255,255,0.3); font-size: 14px; letter-spacing: 3px;
  margin-bottom: 40px;
}

#game-over .tap-hint {
  color: rgba(255,255,255,0.2); font-size: 16px; letter-spacing: 3px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes pulse {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.6; }
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui-overlay">
  <div id="score-display">0</div>
  <div id="combo-display"></div>
</div>

<div id="start-screen">
  <h1>LUMINOS</h1>
  <div class="subtitle">guide the light</div>
  <div class="tap-hint">tap or click to begin</div>
</div>

<div id="game-over">
  <h2>FADED</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="best-score" id="best-score"></div>
  <div class="tap-hint">tap to rekindle</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// State
let state = 'start'; // start, playing, over
let score = 0;
let combo = 0;
let bestScore = parseInt(localStorage.getItem('luminos-best') || '0');
let gameTime = 0;

// Player orb
const player = { x: 0, y: 0, targetX: 0, targetY: 0, radius: 12, hue: 0, energy: 1 };

// Trail system
const trail = [];
const MAX_TRAIL = 200;

// Gates
let gates = [];
let gateSpeed = 1.5;
let gateInterval = 120; // frames
let gateTimer = 0;

// Shadow orbs (enemies)
let shadows = [];
let shadowTimer = 0;
let shadowInterval = 200;

// Particles
let particles = [];

// Radiance pickups
let radiances = [];
let radianceTimer = 0;

// Background stars
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    size: Math.random() * 1.5 + 0.5,
    speed: Math.random() * 0.3 + 0.1,
    alpha: Math.random() * 0.4 + 0.1
  });
}

// Color palette — cycles smoothly
function getColor(hue, sat = 80, light = 60, alpha = 1) {
  return `hsla(${hue % 360}, ${sat}%, ${light}%, ${alpha})`;
}

// Input
let inputX = W / 2, inputY = H / 2;
let inputActive = false;

function handleInput(x, y) {
  inputX = x;
  inputY = y;
  inputActive = true;
}

canvas.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  handleInput(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  handleInput(e.touches[0].clientX, e.touches[0].clientY);
  inputActive = true;
}, { passive: false });

// Click/tap handlers
function handleTap() {
  if (state === 'start') startGame();
  else if (state === 'over') startGame();
}
canvas.addEventListener('click', handleTap);
document.getElementById('start-screen').addEventListener('click', handleTap);
document.getElementById('game-over').addEventListener('click', handleTap);

function startGame() {
  state = 'playing';
  score = 0;
  combo = 0;
  gameTime = 0;
  player.x = W / 2;
  player.y = H * 0.7;
  player.targetX = player.x;
  player.targetY = player.y;
  player.hue = 0;
  player.energy = 1;
  inputX = player.x;
  inputY = player.y;
  trail.length = 0;
  gates.length = 0;
  shadows.length = 0;
  particles.length = 0;
  radiances.length = 0;
  gateTimer = 0;
  shadowTimer = 0;
  radianceTimer = 0;
  gateSpeed = 1.5;
  gateInterval = 120;
  shadowInterval = 200;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('score-display').classList.add('visible');
}

function endGame() {
  state = 'over';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('luminos-best', bestScore);
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score').textContent = bestScore > 0 ? `BEST  ${bestScore}` : '';
  document.getElementById('game-over').style.display = 'flex';
  document.getElementById('score-display').classList.remove('visible');
  document.getElementById('combo-display').classList.remove('visible');
}

function spawnGate() {
  const gapWidth = Math.max(80, 160 - gameTime * 0.3);
  const gapCenter = Math.random() * (W - gapWidth - 80) + 40 + gapWidth / 2;
  const hue = (player.hue + 60 + Math.random() * 60) % 360;
  gates.push({
    y: -20,
    gapCenter,
    gapWidth,
    hue,
    scored: false,
    glow: 1
  });
}

function spawnShadow() {
  const side = Math.random() < 0.5 ? -30 : W + 30;
  const targetX = W / 2 + (Math.random() - 0.5) * W * 0.6;
  const targetY = H * 0.3 + Math.random() * H * 0.5;
  shadows.push({
    x: side,
    y: Math.random() * H * 0.5,
    targetX,
    targetY,
    radius: 10 + Math.random() * 8,
    speed: 0.8 + Math.random() * 0.6,
    phase: Math.random() * Math.PI * 2,
    life: 400 + Math.random() * 200
  });
}

function spawnRadiance() {
  radiances.push({
    x: Math.random() * (W - 60) + 30,
    y: -20,
    radius: 8,
    hue: Math.random() * 360,
    pulse: Math.random() * Math.PI * 2
  });
}

function spawnBurst(x, y, hue, count = 15) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      size: 2 + Math.random() * 4,
      hue: hue + Math.random() * 30 - 15
    });
  }
}

function update() {
  if (state !== 'playing') return;
  gameTime++;
  player.hue = (player.hue + 0.5) % 360;

  // Smooth follow
  const dx = inputX - player.x;
  const dy = inputY - player.y;
  player.x += dx * 0.08;
  player.y += dy * 0.08;

  // Trail
  trail.unshift({ x: player.x, y: player.y, hue: player.hue, alpha: 1 });
  if (trail.length > MAX_TRAIL) trail.pop();
  for (let i = 0; i < trail.length; i++) {
    trail[i].alpha = 1 - (i / trail.length);
  }

  // Difficulty ramp
  if (gameTime % 300 === 0) {
    gateSpeed = Math.min(4, gateSpeed + 0.15);
    gateInterval = Math.max(50, gateInterval - 5);
    shadowInterval = Math.max(80, shadowInterval - 10);
  }

  // Spawn gates
  gateTimer++;
  if (gateTimer >= gateInterval) {
    spawnGate();
    gateTimer = 0;
  }

  // Spawn shadows
  shadowTimer++;
  if (shadowTimer >= shadowInterval && gameTime > 180) {
    spawnShadow();
    shadowTimer = 0;
  }

  // Spawn radiance
  radianceTimer++;
  if (radianceTimer >= 90) {
    spawnRadiance();
    radianceTimer = 0;
  }

  // Update gates
  for (let i = gates.length - 1; i >= 0; i--) {
    const g = gates[i];
    g.y += gateSpeed;

    // Score check
    if (!g.scored && g.y > player.y - 5 && g.y < player.y + 15) {
      const leftEdge = g.gapCenter - g.gapWidth / 2;
      const rightEdge = g.gapCenter + g.gapWidth / 2;
      if (player.x > leftEdge + player.radius && player.x < rightEdge - player.radius) {
        g.scored = true;
        combo++;
        const points = combo >= 10 ? 5 : combo >= 5 ? 3 : 1;
        score += points;
        document.getElementById('score-display').textContent = score;
        if (combo >= 3) {
          document.getElementById('combo-display').textContent = `×${combo}`;
          document.getElementById('combo-display').classList.add('visible');
        }
        g.glow = 2;
        spawnBurst(player.x, g.y, g.hue, 8);
      } else if (g.y > player.y) {
        // Missed or hit wall
        combo = 0;
        document.getElementById('combo-display').classList.remove('visible');
      }
    }

    // Collision — did player cross gate line while outside gap?
    if (!g.scored && g.y >= player.y - player.radius && g.y <= player.y + player.radius) {
      const leftEdge = g.gapCenter - g.gapWidth / 2;
      const rightEdge = g.gapCenter + g.gapWidth / 2;
      if (player.x - player.radius < leftEdge || player.x + player.radius > rightEdge) {
        spawnBurst(player.x, player.y, player.hue, 30);
        endGame();
        return;
      }
    }

    if (g.y > H + 30) gates.splice(i, 1);
    g.glow = Math.max(1, g.glow - 0.03);
  }

  // Update shadows
  for (let i = shadows.length - 1; i >= 0; i--) {
    const s = shadows[i];
    s.phase += 0.03;
    s.x += (s.targetX - s.x) * 0.01 + Math.sin(s.phase) * 1.5;
    s.y += (s.targetY - s.y) * 0.01 + Math.cos(s.phase * 0.7) * 1;
    s.life--;

    // Collision with player
    const sdx = player.x - s.x;
    const sdy = player.y - s.y;
    const dist = Math.sqrt(sdx * sdx + sdy * sdy);
    if (dist < player.radius + s.radius) {
      spawnBurst(player.x, player.y, 0, 25);
      endGame();
      return;
    }

    if (s.life <= 0) {
      shadows.splice(i, 1);
    }
  }

  // Update radiances
  for (let i = radiances.length - 1; i >= 0; i--) {
    const r = radiances[i];
    r.y += gateSpeed * 0.8;
    r.pulse += 0.06;

    const rdx = player.x - r.x;
    const rdy = player.y - r.y;
    const rdist = Math.sqrt(rdx * rdx + rdy * rdy);
    if (rdist < player.radius + r.radius + 5) {
      score += 2;
      combo++;
      document.getElementById('score-display').textContent = score;
      spawnBurst(r.x, r.y, r.hue, 12);
      radiances.splice(i, 1);
      continue;
    }

    if (r.y > H + 30) radiances.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  // Clear with slight fade for motion blur
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
    ctx.beginPath();
    ctx.arc(s.x % W, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }

  if (state === 'start') return;

  // Draw trail
  for (let i = 1; i < trail.length; i++) {
    const t = trail[i];
    const prev = trail[i - 1];
    const width = (1 - i / trail.length) * 8 + 1;
    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = getColor(t.hue, 80, 60, t.alpha * 0.6);
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Glow layer
    ctx.strokeStyle = getColor(t.hue, 90, 70, t.alpha * 0.15);
    ctx.lineWidth = width * 3;
    ctx.stroke();
  }

  // Draw gates
  for (const g of gates) {
    const leftEnd = g.gapCenter - g.gapWidth / 2;
    const rightStart = g.gapCenter + g.gapWidth / 2;
    const alpha = 0.7 * g.glow;

    // Left bar
    ctx.beginPath();
    ctx.moveTo(0, g.y);
    ctx.lineTo(leftEnd, g.y);
    ctx.strokeStyle = getColor(g.hue, 70, 50, alpha);
    ctx.lineWidth = 3 * g.glow;
    ctx.stroke();

    // Right bar
    ctx.beginPath();
    ctx.moveTo(rightStart, g.y);
    ctx.lineTo(W, g.y);
    ctx.strokeStyle = getColor(g.hue, 70, 50, alpha);
    ctx.lineWidth = 3 * g.glow;
    ctx.stroke();

    // Gate endpoints glow
    for (const ex of [leftEnd, rightStart]) {
      ctx.beginPath();
      ctx.arc(ex, g.y, 4 * g.glow, 0, Math.PI * 2);
      ctx.fillStyle = getColor(g.hue, 90, 70, alpha);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(ex, g.y, 10 * g.glow, 0, Math.PI * 2);
      ctx.fillStyle = getColor(g.hue, 90, 70, alpha * 0.2);
      ctx.fill();
    }

    // Scored flash
    if (g.scored && g.glow > 1) {
      ctx.beginPath();
      ctx.moveTo(leftEnd, g.y);
      ctx.lineTo(rightStart, g.y);
      ctx.strokeStyle = getColor(g.hue, 100, 80, (g.glow - 1) * 0.5);
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // Draw shadows
  for (const s of shadows) {
    const fadeIn = Math.min(1, (400 - s.life + 400) / 60);
    const fadeOut = Math.min(1, s.life / 60);
    const alpha = Math.min(fadeIn, fadeOut);

    // Dark core
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    const sg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius);
    sg.addColorStop(0, `rgba(40, 0, 60, ${alpha * 0.9})`);
    sg.addColorStop(0.6, `rgba(20, 0, 40, ${alpha * 0.5})`);
    sg.addColorStop(1, `rgba(10, 0, 20, 0)`);
    ctx.fillStyle = sg;
    ctx.fill();

    // Purple rim
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(140, 40, 200, ${alpha * 0.4})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Danger ring
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius + 4 + Math.sin(s.phase * 2) * 2, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200, 50, 100, ${alpha * 0.15})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw radiances
  for (const r of radiances) {
    const pulseR = r.radius + Math.sin(r.pulse) * 3;

    // Outer glow
    ctx.beginPath();
    ctx.arc(r.x, r.y, pulseR * 3, 0, Math.PI * 2);
    ctx.fillStyle = getColor(r.hue, 80, 60, 0.08);
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(r.x, r.y, pulseR, 0, Math.PI * 2);
    const rg = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, pulseR);
    rg.addColorStop(0, getColor(r.hue, 90, 90, 0.9));
    rg.addColorStop(1, getColor(r.hue, 80, 60, 0));
    ctx.fillStyle = rg;
    ctx.fill();

    // Sparkle
    ctx.beginPath();
    ctx.arc(r.x, r.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  // Draw particles
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = getColor(p.hue, 90, 70, p.life * 0.8);
    ctx.fill();
  }

  // Draw player orb
  if (state === 'playing') {
    // Outer glow
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius * 4, 0, Math.PI * 2);
    const og = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.radius * 4);
    og.addColorStop(0, getColor(player.hue, 80, 70, 0.15));
    og.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = og;
    ctx.fill();

    // Mid glow
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius * 2, 0, Math.PI * 2);
    const mg = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.radius * 2);
    mg.addColorStop(0, getColor(player.hue, 90, 80, 0.4));
    mg.addColorStop(1, getColor(player.hue, 80, 60, 0));
    ctx.fillStyle = mg;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    const cg = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.radius);
    cg.addColorStop(0, '#fff');
    cg.addColorStop(0.3, getColor(player.hue, 90, 85, 0.9));
    cg.addColorStop(1, getColor(player.hue, 80, 60, 0.3));
    ctx.fillStyle = cg;
    ctx.fill();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
