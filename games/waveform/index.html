<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Waveform — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #05050f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff; overflow: hidden;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
.back-link {
  position: fixed; top: 12px; left: 16px;
  color: #4040aa; text-decoration: none; font-size: 13px; z-index: 100;
}
.back-link:hover { color: #6c5ce7; }
#header {
  text-align: center; margin-bottom: 6px;
  font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #444466;
}
#header h1 {
  font-size: 2.2rem; letter-spacing: 0.25em;
  background: linear-gradient(90deg, #00d4ff, #0099ff, #7b2fef, #ff006e);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  animation: titlePulse 3s ease-in-out infinite alternate;
}
@keyframes titlePulse {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.4); }
}
canvas { display: block; border-radius: 8px; }
#ui-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 50;
}
#start-screen, #game-over-screen {
  text-align: center; pointer-events: auto;
}
#start-screen h2 {
  font-size: 1.5rem; color: #00d4ff; margin-bottom: 16px;
  text-shadow: 0 0 20px #00d4ff66;
}
#start-screen p, #game-over-screen p {
  color: #667; font-size: 0.85rem; margin-bottom: 12px;
}
.btn {
  background: linear-gradient(135deg, #00d4ff, #7b2fef);
  border: none; color: #fff; padding: 12px 32px; border-radius: 24px;
  font-family: inherit; font-size: 1rem; cursor: pointer;
  letter-spacing: 0.1em; text-transform: uppercase;
  box-shadow: 0 0 30px #00d4ff44, 0 0 60px #7b2fef22;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:hover { transform: scale(1.06); box-shadow: 0 0 40px #00d4ff88, 0 0 80px #7b2fef44; }
#game-over-screen h2 { font-size: 1.8rem; color: #ff006e; margin-bottom: 8px; }
#final-score { font-size: 2.5rem; color: #ffbe0b; margin: 12px 0; }
#hud {
  position: fixed; top: 14px; right: 20px; z-index: 60;
  font-size: 0.85rem; color: #00d4ff; text-align: right;
  text-shadow: 0 0 8px #00d4ff44;
}
#hud .score-val { font-size: 1.6rem; font-weight: bold; }
#hud .combo { color: #ffbe0b; font-size: 0.75rem; }
.hidden { display: none !important; }
</style>
</head>
<body>
<a class="back-link" href="/">← arcade</a>
<div id="header"><h1>WAVEFORM</h1></div>
<canvas id="c"></canvas>

<div id="ui-overlay">
  <div id="start-screen">
    <h2>🌊 Ride the Wave</h2>
    <p>Move up/down to dodge barriers &amp; collect orbs</p>
    <p style="color:#556; font-size:0.7rem;">Arrow keys / WASD / Tap top-bottom halves</p>
    <button class="btn" id="startBtn">SURF</button>
  </div>
  <div id="game-over-screen" class="hidden">
    <h2>WIPEOUT</h2>
    <div id="final-score">0</div>
    <p style="color:#888;">Best: <span id="best-score">0</span></p>
    <button class="btn" id="restartBtn">RIDE AGAIN</button>
  </div>
</div>

<div id="hud" class="hidden">
  <div class="score-val" id="scoreDisplay">0</div>
  <div class="combo" id="comboDisplay"></div>
  <div style="font-size:0.65rem; color:#556; margin-top:4px;">LEVEL <span id="levelDisplay">1</span></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Sizing ---
function resize() {
  const w = Math.min(window.innerWidth - 20, 800);
  const h = Math.min(window.innerHeight - 120, 600);
  canvas.width = w; canvas.height = h;
}
resize();
window.addEventListener('resize', resize);

// --- State ---
let state = 'menu'; // menu | playing | dead
let score = 0, bestScore = +(localStorage.getItem('wf_best') || 0);
let combo = 0, level = 1;
let time = 0, speed = 2.5;
let playerY = 0, playerVY = 0;
let barriers = [], orbs = [], particles = [];
let wavePhase = 0;
let screenShake = 0;
let inputUp = false, inputDown = false;

// --- Wave math ---
function waveY(x, t) {
  const a1 = 40 + level * 3;
  const f1 = 0.008 + level * 0.0005;
  const a2 = 20 + level * 2;
  const f2 = 0.015;
  return Math.sin(x * f1 + t) * a1 + Math.sin(x * f2 + t * 1.7) * a2;
}

// --- Player ---
const PLAYER_X_RATIO = 0.18;
function playerX() { return canvas.width * PLAYER_X_RATIO; }
function playerWaveBase() { return canvas.height / 2 + waveY(playerX(), wavePhase); }

// --- Colors ---
const COLORS = {
  wave: '#00d4ff',
  waveFill: 'rgba(0,212,255,0.06)',
  player: '#00ffcc',
  playerGlow: '#00ffcc',
  barrier: '#ff006e',
  barrierGlow: '#ff006e',
  orb: '#ffbe0b',
  orbGlow: '#ffbe0b',
  comboText: '#ffbe0b',
};

// --- Spawn ---
function spawnBarrier() {
  const gap = 110 - level * 3;
  const gapMin = Math.max(gap, 55);
  const gapCenter = (Math.random() - 0.5) * (canvas.height * 0.5);
  barriers.push({
    x: canvas.width + 60,
    gapCenter,
    gapSize: gapMin + Math.random() * 30,
    width: 18 + Math.random() * 12,
    passed: false,
  });
}

function spawnOrb() {
  orbs.push({
    x: canvas.width + 40 + Math.random() * 200,
    yOffset: (Math.random() - 0.5) * canvas.height * 0.55,
    radius: 8,
    pulse: Math.random() * Math.PI * 2,
    collected: false,
  });
}

// --- Particles ---
function emitParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, decay: 0.015 + Math.random() * 0.025,
      radius: 2 + Math.random() * 3, color,
    });
  }
}

// --- Input ---
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') inputUp = true;
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') inputDown = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') inputUp = false;
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') inputDown = false;
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const ry = (t.clientY - rect.top) / rect.height;
  if (ry < 0.5) inputUp = true; else inputDown = true;
}, { passive: false });
canvas.addEventListener('touchend', e => { inputUp = false; inputDown = false; });

// --- Game flow ---
function startGame() {
  state = 'playing';
  score = 0; combo = 0; level = 1; time = 0; speed = 2.5;
  playerY = 0; playerVY = 0; wavePhase = 0; screenShake = 0;
  barriers = []; orbs = []; particles = [];
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  updateHUD();
}

function die() {
  state = 'dead';
  screenShake = 15;
  if (score > bestScore) { bestScore = score; localStorage.setItem('wf_best', bestScore); }
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score').textContent = bestScore;
  document.getElementById('game-over-screen').classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');
  emitParticles(playerX(), canvas.height / 2 + playerY, '#ff006e', 40);
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  const cd = document.getElementById('comboDisplay');
  cd.textContent = combo > 1 ? `x${combo} COMBO` : '';
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('restartBtn').onclick = startGame;

// --- Main loop ---
let lastSpawnBarrier = 0, lastSpawnOrb = 0;
let bgStars = [];
for (let i = 0; i < 80; i++) bgStars.push({ x: Math.random(), y: Math.random(), s: 0.5 + Math.random() * 1.5, b: Math.random() });

function loop() {
  requestAnimationFrame(loop);
  const W = canvas.width, H = canvas.height;

  // -- Shake offset --
  let sx = 0, sy = 0;
  if (screenShake > 0) {
    sx = (Math.random() - 0.5) * screenShake;
    sy = (Math.random() - 0.5) * screenShake;
    screenShake *= 0.9;
    if (screenShake < 0.5) screenShake = 0;
  }

  ctx.save();
  ctx.translate(sx, sy);

  // -- Background --
  ctx.fillStyle = '#05050f';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Stars
  for (const s of bgStars) {
    const blink = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * 0.02 + s.b * 10));
    ctx.globalAlpha = blink * 0.5;
    ctx.fillStyle = '#334';
    ctx.fillRect(s.x * W, s.y * H, s.s, s.s);
  }
  ctx.globalAlpha = 1;

  // -- Always draw wave (even in menu) --
  wavePhase += 0.02 + (state === 'playing' ? speed * 0.003 : 0.005);

  // Draw wave surface
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 3) {
    ctx.lineTo(x, H / 2 + waveY(x, wavePhase));
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, H * 0.3, 0, H);
  grad.addColorStop(0, 'rgba(0,212,255,0.08)');
  grad.addColorStop(0.5, 'rgba(123,47,239,0.04)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Wave line
  ctx.beginPath();
  for (let x = 0; x <= W; x += 2) {
    const y = H / 2 + waveY(x, wavePhase);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = COLORS.wave;
  ctx.lineWidth = 2;
  ctx.shadowColor = COLORS.wave;
  ctx.shadowBlur = 18;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Second harmonic wave (subtle)
  ctx.beginPath();
  for (let x = 0; x <= W; x += 3) {
    const y = H / 2 + waveY(x, wavePhase) + Math.sin(x * 0.025 + wavePhase * 2.3) * 15;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(123,47,239,0.3)';
  ctx.lineWidth = 1;
  ctx.shadowColor = '#7b2fef';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;

  if (state === 'playing') {
    time++;
    speed = 2.5 + level * 0.4;
    if (time % 600 === 0 && level < 20) level++;

    // -- Player physics --
    const thrust = 0.45;
    if (inputUp) playerVY -= thrust;
    if (inputDown) playerVY += thrust;
    playerVY *= 0.92; // damping
    // Gravity toward wave
    const wBase = waveY(playerX(), wavePhase);
    const gravPull = (wBase - playerY) * 0.015;
    playerVY += gravPull;
    playerY += playerVY;
    // Clamp
    playerY = Math.max(-H / 2 + 20, Math.min(H / 2 - 20, playerY));

    const px = playerX();
    const py = H / 2 + playerY;

    // -- Spawn --
    lastSpawnBarrier += speed;
    if (lastSpawnBarrier > 220 - level * 5) { spawnBarrier(); lastSpawnBarrier = 0; }
    lastSpawnOrb += speed;
    if (lastSpawnOrb > 140) { spawnOrb(); lastSpawnOrb = 0; }

    // -- Update barriers --
    for (const b of barriers) {
      b.x -= speed;
      // Collision
      if (!b.passed && px + 8 > b.x && px - 8 < b.x + b.width) {
        const bCenterY = H / 2 + b.gapCenter + waveY(b.x, wavePhase) * 0.3;
        if (Math.abs(py - bCenterY) > b.gapSize / 2) {
          emitParticles(px, py, '#ff006e', 25);
          die();
        }
      }
      // Score
      if (!b.passed && b.x + b.width < px) {
        b.passed = true;
        score += 1 + Math.floor(combo / 3);
        combo++;
        updateHUD();
      }
    }
    barriers = barriers.filter(b => b.x > -80);

    // -- Update orbs --
    for (const o of orbs) {
      o.x -= speed;
      o.pulse += 0.08;
      if (!o.collected) {
        const oy = H / 2 + o.yOffset + Math.sin(o.pulse) * 8;
        const dx = px - o.x, dy = py - oy;
        if (Math.sqrt(dx * dx + dy * dy) < 18) {
          o.collected = true;
          score += 3;
          combo += 2;
          emitParticles(o.x, oy, '#ffbe0b', 15);
          screenShake = 4;
          updateHUD();
        }
      }
    }
    orbs = orbs.filter(o => o.x > -40);

    // -- Draw barriers --
    for (const b of barriers) {
      const bCenterY = H / 2 + b.gapCenter + waveY(b.x, wavePhase) * 0.3;
      ctx.shadowColor = COLORS.barrierGlow;
      ctx.shadowBlur = 14;
      ctx.fillStyle = COLORS.barrier;
      // Top part
      ctx.fillRect(b.x, 0, b.width, bCenterY - b.gapSize / 2);
      // Bottom part
      ctx.fillRect(b.x, bCenterY + b.gapSize / 2, b.width, H - (bCenterY + b.gapSize / 2));
      // Gap glow edges
      ctx.shadowBlur = 20;
      ctx.strokeStyle = 'rgba(255,0,110,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x, bCenterY - b.gapSize / 2);
      ctx.lineTo(b.x + b.width, bCenterY - b.gapSize / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(b.x, bCenterY + b.gapSize / 2);
      ctx.lineTo(b.x + b.width, bCenterY + b.gapSize / 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // -- Draw orbs --
    for (const o of orbs) {
      if (o.collected) continue;
      const oy = H / 2 + o.yOffset + Math.sin(o.pulse) * 8;
      const r = o.radius + Math.sin(o.pulse * 2) * 2;
      ctx.beginPath();
      ctx.arc(o.x, oy, r, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.orb;
      ctx.shadowColor = COLORS.orbGlow;
      ctx.shadowBlur = 22;
      ctx.fill();
      // Inner glow
      ctx.beginPath();
      ctx.arc(o.x, oy, r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.6;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    // -- Draw player --
    // Trail
    for (let i = 1; i <= 6; i++) {
      const tx = px - i * 6;
      const ty = H / 2 + playerY - playerVY * i * 0.3 + waveY(tx, wavePhase) * 0.05 * i;
      ctx.beginPath();
      ctx.arc(tx, ty, 7 - i * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,255,204,${0.3 - i * 0.04})`;
      ctx.fill();
    }
    // Main body
    ctx.beginPath();
    ctx.arc(px, py, 9, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.player;
    ctx.shadowColor = COLORS.playerGlow;
    ctx.shadowBlur = 28;
    ctx.fill();
    ctx.shadowBlur = 0;
    // Core
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Surf particles
    if (time % 3 === 0) {
      emitParticles(px - 4, py + 4, 'rgba(0,212,255,0.7)', 1);
    }
  }

  // -- Particles --
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vx *= 0.98;
    p.vy *= 0.98;
    if (p.life <= 0) continue;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
  particles = particles.filter(p => p.life > 0);

  ctx.restore();
}

loop();
</script>
</body>
</html>
