<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match — Monday Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0e17;
    --surface: #1a1932;
    --accent: #ff8906;
    --accent2: #e53170;
    --accent3: #7f5af0;
    --text: #fffffe;
    --text-dim: #94a1b2;
    --card-back: linear-gradient(135deg, #7f5af0, #e53170);
    --card-matched: linear-gradient(135deg, #2cb67d, #3da9fc);
    --success: #2cb67d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 16px;
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    font-size: 1rem;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-label { color: var(--text-dim); }
  .stat-value { font-weight: 700; color: var(--accent); font-size: 1.2rem; }

  .difficulty-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .diff-btn {
    padding: 6px 16px;
    border: 2px solid var(--accent3);
    background: transparent;
    color: var(--text);
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .diff-btn:hover { background: rgba(127,90,240,0.2); }
  .diff-btn.active {
    background: var(--accent3);
    border-color: var(--accent3);
    color: white;
  }

  .board {
    display: grid;
    gap: 10px;
    perspective: 1000px;
    max-width: 600px;
    width: 100%;
  }

  .board.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .board.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .board.cols-6 { grid-template-columns: repeat(6, 1fr); }

  .card {
    aspect-ratio: 1;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card.matched {
    transform: rotateY(180deg);
    animation: matchPop 0.4s ease;
  }

  .card.matched .card-front {
    background: var(--card-matched);
    box-shadow: 0 0 20px rgba(44,182,125,0.4);
  }

  @keyframes matchPop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }

  .card-back {
    background: var(--card-back);
    box-shadow: 0 4px 15px rgba(127,90,240,0.3);
    position: relative;
    overflow: hidden;
  }

  .card-back::after {
    content: '?';
    font-size: 1.8rem;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
  }

  .card-back::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
    animation: shimmer 3s infinite linear;
  }

  @keyframes shimmer {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .card-front {
    background: var(--surface);
    border: 2px solid rgba(127,90,240,0.3);
    transform: rotateY(180deg);
    font-size: 2.5rem;
  }

  .card:hover:not(.flipped):not(.matched) {
    transform: scale(1.04);
  }

  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,23,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .win-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .win-title {
    font-size: 3rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--success));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .win-stats {
    color: var(--text-dim);
    font-size: 1.1rem;
    margin-bottom: 8px;
  }

  .win-stars {
    font-size: 2rem;
    margin-bottom: 20px;
  }

  .play-again {
    padding: 12px 32px;
    background: var(--accent3);
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .play-again:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(127,90,240,0.5);
  }

  .timer { color: var(--accent2); }

  .credits {
    margin-top: 24px;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.75rem;
    line-height: 1.6;
  }

  .credits a { color: var(--accent3); text-decoration: none; }

  /* Particle burst on match */
  .particles {
    position: fixed;
    pointer-events: none;
    z-index: 50;
  }

  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: particleFly 0.8s ease-out forwards;
  }

  @keyframes particleFly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    .board { gap: 6px; }
    .card-front { font-size: 1.8rem; }
    .card-back::after { font-size: 1.2rem; }
    .stats { gap: 14px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<h1>🧠 Memory Match</h1>
<p class="subtitle">Find all matching pairs — fewest moves wins!</p>

<div class="difficulty-bar">
  <button class="diff-btn active" data-level="easy">Easy (4×3)</button>
  <button class="diff-btn" data-level="medium">Medium (4×4)</button>
  <button class="diff-btn" data-level="hard">Hard (5×4)</button>
</div>

<div class="stats">
  <div class="stat">
    <span class="stat-label">Moves:</span>
    <span class="stat-value" id="moves">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Pairs:</span>
    <span class="stat-value" id="pairs">0 / 6</span>
  </div>
  <div class="stat">
    <span class="stat-label timer">⏱</span>
    <span class="stat-value timer" id="timer">0:00</span>
  </div>
</div>

<div class="board cols-4" id="board"></div>

<div class="win-overlay" id="winOverlay">
  <div class="win-title">🎉 You Win!</div>
  <div class="win-stats" id="winStats"></div>
  <div class="win-stars" id="winStars"></div>
  <button class="play-again" onclick="startGame()">Play Again</button>
</div>

<div class="credits">
  Built by <strong>Novalystrix</strong> with the Monday Arcade team<br>
  🎨 Elanor — UI & Layout · 🌟 Míriel — Visual Theme & Animations · 🔧 Narvi — Logic Review
</div>

<div class="particles" id="particles"></div>

<script>
const LEVELS = {
  easy:   { cols: 4, pairs: 6  },
  medium: { cols: 4, pairs: 8  },
  hard:   { cols: 5, pairs: 10 }
};

const EMOJIS = [
  '🚀','🎯','💎','🔥','⚡','🌈','🎪','🦊','🐙','🎸',
  '🌺','🧊','🎭','🪐','🦋','🍕','🎲','🔮','🐉','🌙'
];

let level = 'easy';
let cards = [];
let flipped = [];
let matched = new Set();
let moves = 0;
let totalPairs = 0;
let locked = false;
let timerInterval = null;
let startTime = null;

const board = document.getElementById('board');
const movesEl = document.getElementById('moves');
const pairsEl = document.getElementById('pairs');
const timerEl = document.getElementById('timer');
const winOverlay = document.getElementById('winOverlay');
const winStats = document.getElementById('winStats');
const winStars = document.getElementById('winStars');

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    level = btn.dataset.level;
    startGame();
  });
});

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  const { cols, pairs } = LEVELS[level];
  totalPairs = pairs;
  const totalCards = pairs * 2;
  const rows = totalCards / cols;

  // Reset state
  cards = [];
  flipped = [];
  matched = new Set();
  moves = 0;
  locked = false;
  movesEl.textContent = '0';
  pairsEl.textContent = `0 / ${totalPairs}`;
  timerEl.textContent = '0:00';
  winOverlay.classList.remove('show');
  if (timerInterval) clearInterval(timerInterval);
  startTime = null;

  // Update board grid
  board.className = `board cols-${cols}`;

  // Pick random emojis
  const selected = shuffle([...EMOJIS]).slice(0, pairs);
  const deck = shuffle([...selected, ...selected]);

  // Build cards
  board.innerHTML = '';
  deck.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.dataset.emoji = emoji;
    card.innerHTML = `
      <div class="card-face card-back"></div>
      <div class="card-face card-front">${emoji}</div>
    `;
    card.addEventListener('click', () => flipCard(card));
    board.appendChild(card);
    cards.push(card);
  });
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = String(elapsed % 60).padStart(2, '0');
    timerEl.textContent = `${m}:${s}`;
  }, 200);
}

function flipCard(card) {
  if (locked) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  if (!startTime) startTimer();

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.dataset.emoji === b.dataset.emoji) {
    // Match!
    a.classList.add('matched');
    b.classList.add('matched');
    matched.add(a.dataset.emoji);
    pairsEl.textContent = `${matched.size} / ${totalPairs}`;

    // Particle burst
    spawnParticles(a);
    spawnParticles(b);

    flipped = [];

    if (matched.size === totalPairs) {
      setTimeout(showWin, 600);
    }
  } else {
    // No match — flip back
    locked = true;
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      flipped = [];
      locked = false;
    }, 800);
  }
}

function spawnParticles(card) {
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const container = document.getElementById('particles');
  const colors = ['#ff8906','#e53170','#7f5af0','#2cb67d','#3da9fc'];

  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 10;
    const dist = 40 + Math.random() * 50;
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    container.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function showWin() {
  clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = String(elapsed % 60).padStart(2, '0');
  const perfect = totalPairs; // minimum possible moves
  const ratio = moves / perfect;

  let stars;
  if (ratio <= 1.3) stars = '⭐⭐⭐';
  else if (ratio <= 1.8) stars = '⭐⭐';
  else stars = '⭐';

  winStats.textContent = `${moves} moves in ${m}:${s}`;
  winStars.textContent = stars;
  winOverlay.classList.add('show');
}

// Start!
startGame();
</script>
</body>
</html>
