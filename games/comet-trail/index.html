<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Comet Trail — monday Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #05051a;
  font-family: 'Courier New', monospace;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; overflow: hidden; color: #fff;
  touch-action: none;
}
.back-link {
  position: fixed; top: 12px; left: 16px;
  color: #4040aa; text-decoration: none; font-size: 13px; z-index: 100;
}
.back-link:hover { color: #6c5ce7; }

#game-wrapper {
  position: relative;
  width: 480px; height: 700px;
  max-width: 95vw; max-height: 95vh;
}
canvas {
  width: 100%; height: 100%;
  border-radius: 16px;
  box-shadow: 0 0 60px rgba(0,180,255,0.15), 0 0 120px rgba(150,50,255,0.08);
}

.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: rgba(5,5,26,0.94); border-radius: 16px; z-index: 10;
  transition: opacity 0.4s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay h1 {
  font-size: 2.8rem; letter-spacing: 0.12em;
  background: linear-gradient(90deg, #00d4ff, #a855f7, #ff6b9d, #ffb300);
  background-size: 300% 100%;
  animation: shimmer 3s ease-in-out infinite;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.overlay .subtitle { font-size: 0.8rem; color: #445; margin-bottom: 32px; letter-spacing: 0.12em; }
.overlay .score-display {
  font-size: 4rem; color: #ffb300;
  text-shadow: 0 0 30px #ffb30066, 0 0 60px #ffb30022;
  margin: 8px 0;
}
.overlay .high-score { font-size: 0.8rem; color: #a855f7; margin-bottom: 6px; letter-spacing: 0.08em; }
.overlay .stats { font-size: 0.7rem; color: #556; margin-bottom: 24px; letter-spacing: 0.06em; }
.btn {
  font-family: 'Courier New', monospace; font-size: 0.9rem;
  padding: 14px 40px; border: 2px solid #a855f7; border-radius: 6px;
  cursor: pointer; background: transparent; color: #a855f7;
  letter-spacing: 0.15em; text-transform: uppercase;
  transition: all 0.2s;
}
.btn:hover { background: #a855f720; box-shadow: 0 0 20px #a855f733; }
#hud {
  position: absolute; top: 16px; left: 0; right: 0;
  display: flex; justify-content: space-between;
  padding: 0 20px; z-index: 5; pointer-events: none;
}
#hud span {
  font-size: 0.85rem; letter-spacing: 0.1em;
  text-shadow: 0 0 10px rgba(0,180,255,0.5);
}
#combo-popup {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2rem; color: #ffb300; z-index: 6;
  pointer-events: none; opacity: 0;
  text-shadow: 0 0 20px #ffb30088;
  transition: opacity 0.3s, transform 0.3s;
}
</style>
</head>
<body>
<a href="/" class="back-link">← arcade</a>

<div id="game-wrapper">
  <canvas id="c"></canvas>

  <div id="hud" class="hidden">
    <span id="hud-score">0</span>
    <span id="hud-combo"></span>
    <span id="hud-best">BEST: 0</span>
  </div>

  <div id="combo-popup"></div>

  <div id="start-screen" class="overlay">
    <h1>COMET TRAIL</h1>
    <div class="subtitle">☄️ RIDE THE STARS</div>
    <button class="btn" id="start-btn">LAUNCH</button>
  </div>

  <div id="end-screen" class="overlay hidden">
    <div class="subtitle">TRAIL FADED</div>
    <div class="score-display" id="final-score">0</div>
    <div class="high-score" id="final-best">BEST: 0</div>
    <div class="stats" id="final-stats"></div>
    <button class="btn" id="retry-btn">RELAUNCH</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 700;
canvas.width = W; canvas.height = H;

// State
let comet, trail, stardust, asteroids, particles, bgStars;
let score, combo, maxCombo, collected, gameOver, gameStarted, frameCount;
let highScore = parseInt(localStorage.getItem('cometTrail_best') || '0');
let targetX, targetY;
let shieldActive = 0;
let magnetActive = 0;

// Colors
const COLORS = ['#00d4ff','#a855f7','#ff6b9d','#39ff14','#ffb300','#ff4444','#00ffcc'];
function hslColor(h, s, l) { return `hsl(${h},${s}%,${l}%)`; }

// Background stars
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 200; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.3 + 0.1,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.03 + 0.01
    });
  }
}

function drawBg() {
  // Deep space gradient
  const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W);
  g.addColorStop(0, '#0a0a2e');
  g.addColorStop(0.5, '#070720');
  g.addColorStop(1, '#030312');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Nebula glow
  const t = frameCount * 0.005;
  ctx.globalAlpha = 0.04;
  const ng = ctx.createRadialGradient(W/2 + Math.sin(t)*80, H/3 + Math.cos(t*0.7)*40, 0,
    W/2, H/3, 250);
  ng.addColorStop(0, '#a855f7');
  ng.addColorStop(1, 'transparent');
  ctx.fillStyle = ng;
  ctx.fillRect(0, 0, W, H);

  const ng2 = ctx.createRadialGradient(W*0.7 + Math.cos(t*0.5)*60, H*0.6, 0,
    W*0.7, H*0.6, 200);
  ng2.addColorStop(0, '#00d4ff');
  ng2.addColorStop(1, 'transparent');
  ctx.fillStyle = ng2;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Stars
  for (const s of bgStars) {
    s.y += s.speed;
    s.twinkle += s.twinkleSpeed;
    if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    const a = 0.3 + Math.sin(s.twinkle) * 0.3;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function initGame() {
  comet = { x: W/2, y: H * 0.7, vx: 0, vy: 0, r: 10, hue: 200 };
  trail = [];
  stardust = [];
  asteroids = [];
  particles = [];
  score = 0; combo = 0; maxCombo = 0; collected = 0;
  gameOver = false; frameCount = 0;
  shieldActive = 0; magnetActive = 0;
  targetX = comet.x; targetY = comet.y;
  spawnWave();
}

function spawnStardust() {
  const type = Math.random();
  let kind = 'normal', color = COLORS[Math.floor(Math.random()*5)], points = 10, r = 6;
  if (type > 0.92) { kind = 'shield'; color = '#00ffcc'; points = 0; r = 9; }
  else if (type > 0.85) { kind = 'magnet'; color = '#ff6b9d'; points = 0; r = 9; }
  else if (type > 0.75) { kind = 'big'; color = '#ffb300'; points = 25; r = 8; }

  stardust.push({
    x: Math.random() * (W - 40) + 20,
    y: -20 - Math.random() * 200,
    r, color, points, kind,
    speed: 0.8 + Math.random() * 0.6,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.04 + 0.02,
    glow: 0
  });
}

function spawnAsteroid() {
  const r = 12 + Math.random() * 18;
  const side = Math.random();
  let x, y, vx, vy;
  if (side < 0.7) {
    x = Math.random() * W;
    y = -r - Math.random() * 100;
    vx = (Math.random() - 0.5) * 1.5;
    vy = 1 + Math.random() * 1.5;
  } else if (side < 0.85) {
    x = -r; y = Math.random() * H * 0.5;
    vx = 1 + Math.random(); vy = 0.5 + Math.random();
  } else {
    x = W + r; y = Math.random() * H * 0.5;
    vx = -(1 + Math.random()); vy = 0.5 + Math.random();
  }
  asteroids.push({
    x, y, r, vx, vy,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    vertices: generateAsteroidShape(r)
  });
}

function generateAsteroidShape(r) {
  const pts = 8 + Math.floor(Math.random() * 5);
  const verts = [];
  for (let i = 0; i < pts; i++) {
    const angle = (i / pts) * Math.PI * 2;
    const dist = r * (0.7 + Math.random() * 0.6);
    verts.push({ angle, dist });
  }
  return verts;
}

function spawnWave() {
  const diff = Math.min(frameCount / 3000, 1);
  for (let i = 0; i < 4 + Math.floor(diff * 3); i++) spawnStardust();
  for (let i = 0; i < 1 + Math.floor(diff * 2); i++) spawnAsteroid();
}

function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + speed * 0.3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: Math.random() * 3 + 1,
      color,
      life: 1,
      decay: 0.015 + Math.random() * 0.02
    });
  }
}

function showCombo(text) {
  const el = document.getElementById('combo-popup');
  el.textContent = text;
  el.style.opacity = 1;
  el.style.transform = 'translate(-50%, -50%) scale(1.3)';
  setTimeout(() => {
    el.style.opacity = 0;
    el.style.transform = 'translate(-50%, -50%) scale(0.8)';
  }, 600);
}

// Input
let pointerDown = false;
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - rect.left) * scaleX, y: (t.clientY - rect.top) * scaleY };
}

canvas.addEventListener('mousedown', e => { pointerDown = true; const p = getPos(e); targetX = p.x; targetY = p.y; });
canvas.addEventListener('mousemove', e => { if (pointerDown) { const p = getPos(e); targetX = p.x; targetY = p.y; } });
canvas.addEventListener('mouseup', () => pointerDown = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown = true; const p = getPos(e); targetX = p.x; targetY = p.y; }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const p = getPos(e); targetX = p.x; targetY = p.y; }, { passive: false });
canvas.addEventListener('touchend', () => pointerDown = false);

function updateComet() {
  const dx = targetX - comet.x;
  const dy = targetY - comet.y;
  const ease = 0.08;
  comet.vx += dx * ease;
  comet.vy += dy * ease;
  comet.vx *= 0.88;
  comet.vy *= 0.88;
  comet.x += comet.vx;
  comet.y += comet.vy;
  comet.x = Math.max(comet.r, Math.min(W - comet.r, comet.x));
  comet.y = Math.max(comet.r, Math.min(H - comet.r, comet.y));

  // Hue shifts based on movement
  comet.hue = (comet.hue + 0.5) % 360;

  // Trail
  trail.unshift({ x: comet.x, y: comet.y, hue: comet.hue, life: 1 });
  const maxTrail = 80 + Math.min(collected * 2, 200);
  if (trail.length > maxTrail) trail.length = maxTrail;
  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].life -= 1 / maxTrail;
    if (trail[i].life <= 0) { trail.splice(i, 1); }
  }
}

function drawTrail() {
  if (trail.length < 2) return;
  for (let i = 1; i < trail.length; i++) {
    const t = trail[i];
    const prev = trail[i - 1];
    const a = t.life * 0.7;
    const w = t.life * (6 + Math.min(collected * 0.1, 8));

    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = hslColor(t.hue, 80, 60);
    ctx.globalAlpha = a;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Outer glow
    if (i % 3 === 0) {
      ctx.beginPath();
      ctx.arc(t.x, t.y, w * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = hslColor(t.hue, 70, 50);
      ctx.globalAlpha = a * 0.15;
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawComet() {
  const { x, y, r, hue } = comet;

  // Outer glow
  const glow = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
  glow.addColorStop(0, hslColor(hue, 80, 70) + '66');
  glow.addColorStop(0.5, hslColor(hue, 60, 50) + '22');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, r * 4, 0, Math.PI * 2);
  ctx.fill();

  // Shield indicator
  if (shieldActive > 0) {
    ctx.beginPath();
    ctx.arc(x, y, r + 8, 0, Math.PI * 2);
    ctx.strokeStyle = '#00ffcc';
    ctx.globalAlpha = 0.4 + Math.sin(frameCount * 0.1) * 0.2;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Magnet indicator
  if (magnetActive > 0) {
    ctx.beginPath();
    ctx.arc(x, y, r + 14 + Math.sin(frameCount * 0.08) * 4, 0, Math.PI * 2);
    ctx.strokeStyle = '#ff6b9d';
    ctx.globalAlpha = 0.25;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }

  // Core
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  const cg = ctx.createRadialGradient(x - 2, y - 2, 0, x, y, r);
  cg.addColorStop(0, '#fff');
  cg.addColorStop(0.4, hslColor(hue, 80, 75));
  cg.addColorStop(1, hslColor(hue, 60, 50));
  ctx.fillStyle = cg;
  ctx.fill();

  // Sparkle
  if (frameCount % 4 === 0) {
    const sa = Math.random() * Math.PI * 2;
    const sd = r * 0.5;
    spawnParticles(x + Math.cos(sa)*sd, y + Math.sin(sa)*sd, '#fff', 1, 0.5);
  }
}

function drawStardust() {
  for (const s of stardust) {
    s.wobble += s.wobbleSpeed;
    s.glow = (s.glow + 0.05) % (Math.PI * 2);

    const glowR = s.r * 3 + Math.sin(s.glow) * s.r;
    ctx.beginPath();
    ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = s.color + '18';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    const sg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
    sg.addColorStop(0, '#fff');
    sg.addColorStop(0.6, s.color);
    sg.addColorStop(1, s.color + '88');
    ctx.fillStyle = sg;
    ctx.fill();

    // Icon for special types
    if (s.kind === 'shield') {
      ctx.fillStyle = '#fff';
      ctx.font = `${s.r}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('🛡', s.x, s.y + s.r * 0.4);
    } else if (s.kind === 'magnet') {
      ctx.fillStyle = '#fff';
      ctx.font = `${s.r}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('🧲', s.x, s.y + s.r * 0.4);
    }
  }
}

function drawAsteroids() {
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);

    // Shadow
    ctx.beginPath();
    for (let i = 0; i < a.vertices.length; i++) {
      const v = a.vertices[i];
      const px = Math.cos(v.angle) * v.dist;
      const py = Math.sin(v.angle) * v.dist;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = '#1a1a2e';
    ctx.strokeStyle = '#2a2a4e';
    ctx.lineWidth = 2;
    ctx.fill();
    ctx.stroke();

    // Danger glow
    const dg = ctx.createRadialGradient(0, 0, a.r * 0.5, 0, 0, a.r * 1.5);
    dg.addColorStop(0, 'transparent');
    dg.addColorStop(1, '#ff444410');
    ctx.fillStyle = dg;
    ctx.beginPath();
    ctx.arc(0, 0, a.r * 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function update() {
  if (gameOver) return;
  frameCount++;

  updateComet();

  // Stardust
  for (let i = stardust.length - 1; i >= 0; i--) {
    const s = stardust[i];
    s.y += s.speed;
    s.x += Math.sin(s.wobble) * 0.5;

    // Magnet pull
    if (magnetActive > 0) {
      const dx = comet.x - s.x, dy = comet.y - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150) {
        s.x += dx / dist * 3;
        s.y += dy / dist * 3;
      }
    }

    if (s.y > H + 30) {
      stardust.splice(i, 1);
      combo = 0;
      continue;
    }

    // Collision with comet
    const dx = comet.x - s.x, dy = comet.y - s.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < comet.r + s.r + 4) {
      if (s.kind === 'shield') {
        shieldActive = 300;
        showCombo('🛡 SHIELD!');
        spawnParticles(s.x, s.y, '#00ffcc', 15, 3);
      } else if (s.kind === 'magnet') {
        magnetActive = 300;
        showCombo('🧲 MAGNET!');
        spawnParticles(s.x, s.y, '#ff6b9d', 15, 3);
      } else {
        combo++;
        collected++;
        const pts = s.points * Math.max(1, Math.floor(combo / 3));
        score += pts;
        if (combo > maxCombo) maxCombo = combo;
        if (combo >= 5 && combo % 5 === 0) showCombo(`×${combo} COMBO!`);
        spawnParticles(s.x, s.y, s.color, 8 + combo, 2 + combo * 0.3);
      }
      stardust.splice(i, 1);
    }
  }

  // Asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.x += a.vx;
    a.y += a.vy;
    a.rot += a.rotSpeed;
    if (a.y > H + 40 || a.x < -50 || a.x > W + 50) {
      asteroids.splice(i, 1);
      continue;
    }

    const dx = comet.x - a.x, dy = comet.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < comet.r + a.r - 4) {
      if (shieldActive > 0) {
        shieldActive = 0;
        spawnParticles(a.x, a.y, '#00ffcc', 20, 4);
        asteroids.splice(i, 1);
        showCombo('BLOCKED!');
      } else {
        gameOver = true;
        spawnParticles(comet.x, comet.y, '#ff4444', 40, 5);
        spawnParticles(comet.x, comet.y, '#ffb300', 20, 3);
        endGame();
      }
    }
  }

  // Decrement power-ups
  if (shieldActive > 0) shieldActive--;
  if (magnetActive > 0) magnetActive--;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Spawn more
  if (frameCount % 90 === 0) spawnWave();

  // HUD
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-combo').textContent = combo >= 3 ? `×${combo}` : '';
  document.getElementById('hud-best').textContent = `BEST: ${Math.max(score, highScore)}`;
}

function draw() {
  drawBg();
  drawTrail();
  drawStardust();
  drawAsteroids();
  drawParticles();
  if (!gameOver) drawComet();
}

function loop() {
  if (gameStarted) { update(); draw(); }
  requestAnimationFrame(loop);
}

function endGame() {
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('cometTrail_best', highScore);
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-best').textContent = `BEST: ${highScore}`;
  document.getElementById('final-stats').textContent =
    `STARDUST: ${collected} · MAX COMBO: ×${maxCombo}`;
  setTimeout(() => {
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
  }, 800);
}

function startGame() {
  initGame();
  gameStarted = true;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);

initBgStars();
loop();
</script>
</body>
</html>
