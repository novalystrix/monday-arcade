<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Scramble — monday Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 30%, #1a1040 0%, #0a0a1a 70%);
    z-index: -1;
  }

  .header {
    text-align: center;
    padding: 16px 20px 8px;
    width: 100%;
    max-width: 420px;
  }

  .title {
    font-size: 1.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 20px;
    width: 100%;
    max-width: 420px;
    font-size: 0.9rem;
  }

  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-val { font-size: 1.4rem; font-weight: 800; }
  .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

  .timer-val { color: #22c55e; transition: color 0.3s; }
  .timer-val.warning { color: #eab308; }
  .timer-val.danger { color: #ef4444; animation: pulse 0.5s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .score-val { color: #a78bfa; }
  .combo-val { color: #f59e0b; }

  .game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 420px;
    padding: 10px 20px;
    gap: 20px;
  }

  /* Scrambled letters display */
  .scrambled-word {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 60px;
    align-items: center;
  }

  .letter-tile {
    width: 48px;
    height: 56px;
    background: linear-gradient(145deg, #2a2040, #1a1030);
    border: 2px solid #4a3a6a;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 800;
    color: #e0d0ff;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .letter-tile:hover { transform: scale(1.08); border-color: #a78bfa; }
  .letter-tile:active { transform: scale(0.95); }
  .letter-tile.used { opacity: 0.25; pointer-events: none; transform: scale(0.9); }

  /* Answer area */
  .answer-area {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 56px;
    align-items: center;
    padding: 10px;
    background: #12101e;
    border: 2px dashed #333;
    border-radius: 12px;
    width: 100%;
    max-width: 360px;
    position: relative;
  }

  .answer-tile {
    width: 44px;
    height: 52px;
    background: linear-gradient(145deg, #6c5ce7, #5a4bd1);
    border: 2px solid #a78bfa;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    animation: dropIn 0.2s ease-out;
  }

  .answer-tile:hover { transform: scale(1.05); }

  @keyframes dropIn {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .placeholder { color: #444; font-size: 0.9rem; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 360px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:active { transform: scale(0.96); }

  .btn-submit {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
  }
  .btn-submit:disabled { opacity: 0.4; cursor: default; }

  .btn-clear {
    background: #2a2a3a;
    color: #aaa;
    flex: 0.5;
  }

  .btn-hint {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: white;
    flex: 0.5;
  }
  .btn-hint:disabled { opacity: 0.4; cursor: default; }

  .btn-shuffle {
    background: #2a2a3a;
    color: #aaa;
    flex: 0.5;
  }

  /* Difficulty selector */
  .difficulty {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .diff-btn {
    padding: 10px 22px;
    border: 2px solid #333;
    border-radius: 8px;
    background: #16161f;
    color: #aaa;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .diff-btn.active { border-color: #6c5ce7; color: #fff; background: #2a2040; }

  /* Screens */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; width: 100%; }
  .screen.active { display: flex; }

  .big-emoji { font-size: 4rem; }
  .big-title { font-size: 2rem; font-weight: 800; }
  .sub { color: #888; }
  .final-score { font-size: 3rem; font-weight: 800; color: #a78bfa; }

  .start-btn {
    padding: 16px 48px;
    background: linear-gradient(135deg, #6c5ce7, #a855f7);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
  }
  .start-btn:active { transform: scale(0.96); }

  .back-link {
    display: inline-block;
    margin-top: 10px;
    color: #666;
    text-decoration: none;
    font-size: 0.9rem;
  }

  /* Feedback flash */
  .feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 2.5rem;
    font-weight: 800;
    pointer-events: none;
    z-index: 100;
    transition: all 0.3s;
  }
  .feedback.show { transform: translate(-50%, -50%) scale(1); }
  .feedback.correct { color: #22c55e; }
  .feedback.wrong { color: #ef4444; }
  .feedback.streak { color: #f59e0b; }

  /* Word history */
  .history {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 360px;
    max-height: 60px;
    overflow: hidden;
  }
  .history-word {
    padding: 3px 8px;
    background: #1a1a2e;
    border-radius: 4px;
    font-size: 0.75rem;
    color: #6c5ce7;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Level indicator */
  .level-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .level-easy { background: #22c55e20; color: #22c55e; }
  .level-medium { background: #f59e0b20; color: #f59e0b; }
  .level-hard { background: #ef444420; color: #ef4444; }
</style>
</head>
<body>

<div class="feedback" id="feedback"></div>

<!-- Start Screen -->
<div class="screen active" id="start-screen">
  <div class="game-area">
    <div class="big-emoji">🔤</div>
    <div class="big-title">Word Scramble</div>
    <div class="sub">Unscramble letters to form words<br>60 seconds — how many can you crack?</div>
    <div class="difficulty">
      <div class="diff-btn active" data-diff="easy" onclick="setDifficulty('easy')">Easy</div>
      <div class="diff-btn" data-diff="medium" onclick="setDifficulty('medium')">Medium</div>
      <div class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">Hard</div>
    </div>
    <button class="start-btn" onclick="startGame()">Play!</button>
    <a class="back-link" href="/">← Back to Arcade</a>
  </div>
</div>

<!-- Game Screen -->
<div class="screen" id="game-screen">
  <div class="header">
    <div class="title">🔤 Word Scramble</div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val timer-val" id="timer">60</div>
      <div class="stat-label">Time</div>
    </div>
    <div class="stat">
      <span class="level-badge" id="level-badge">Easy</span>
    </div>
    <div class="stat">
      <div class="stat-val combo-val" id="combo">0x</div>
      <div class="stat-label">Combo</div>
    </div>
    <div class="stat">
      <div class="stat-val score-val" id="score">0</div>
      <div class="stat-label">Score</div>
    </div>
  </div>
  <div class="game-area">
    <div class="scrambled-word" id="scrambled"></div>
    <div class="answer-area" id="answer">
      <span class="placeholder">Tap letters to build the word</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-shuffle" onclick="shuffleLetters()">🔀</button>
      <button class="btn btn-clear" onclick="clearAnswer()">✕ Clear</button>
      <button class="btn btn-hint" id="hint-btn" onclick="useHint()">💡 Hint <span id="hints-left">3</span></button>
      <button class="btn btn-submit" id="submit-btn" onclick="submitAnswer()" disabled>✓ Go</button>
    </div>
    <div class="history" id="history"></div>
  </div>
</div>

<!-- End Screen -->
<div class="screen" id="end-screen">
  <div class="game-area">
    <div class="big-emoji">🏆</div>
    <div class="big-title">Time's Up!</div>
    <div class="final-score" id="final-score">0</div>
    <div class="sub">points</div>
    <div id="final-stats" style="color:#aaa;line-height:1.8;"></div>
    <button class="start-btn" onclick="startGame()">Play Again</button>
    <a class="back-link" href="/">← Back to Arcade</a>
  </div>
</div>

<script>
// Word lists by difficulty
const WORDS = {
  easy: [
    'cat','dog','sun','hat','run','big','hot','cup','map','bed',
    'fun','red','box','pen','net','bus','mud','fog','jam','hug',
    'tip','log','pin','rug','van','web','zip','ace','dip','gem',
    'hop','jet','kit','lip','mix','nap','oak','pie','rod','sip',
    'tap','vet','win','yam','zoo','arm','bat','cow','den','elk'
  ],
  medium: [
    'planet','garden','bridge','castle','rhythm','frozen','purple',
    'silver','monkey','butter','candle','dragon','flower','ginger',
    'hammer','jungle','kitten','lemon','marble','napkin','orange',
    'pencil','quartz','rocket','spiral','trophy','umbrella','velvet',
    'walnut','yogurt','basket','cherry','desert','falcon','gentle',
    'harbor','insect','jigsaw','kernel','launch','mirror','nibble'
  ],
  hard: [
    'absolute','calendar','dinosaur','elephant','function',
    'geometry','hospital','illusion','keyboard','language',
    'mountain','notebook','obstacle','paradise','question',
    'revision','sandwich','treasure','umbrella','vacation',
    'workshop','yourself','abstract','backpack','carnival',
    'daughter','exchange','feedback','gambling','handsome',
    'interact','jokester','knockout','lifetime','mischief'
  ]
};

let difficulty = 'easy';
let currentWord = '';
let scrambledLetters = [];
let answerLetters = [];
let score = 0;
let combo = 0;
let maxCombo = 0;
let wordsGuessed = 0;
let wordsSkipped = 0;
let hints = 3;
let timer = 60;
let timerInterval = null;
let usedWords = new Set();
let guessedWords = [];

function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === d));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickWord() {
  const pool = WORDS[difficulty].filter(w => !usedWords.has(w));
  if (pool.length === 0) { usedWords.clear(); return pickWord(); }
  const word = pool[Math.floor(Math.random() * pool.length)];
  usedWords.add(word);
  return word;
}

function newRound() {
  currentWord = pickWord();
  scrambledLetters = shuffle(currentWord.split(''));
  // Make sure scrambled != original
  let attempts = 0;
  while (scrambledLetters.join('') === currentWord && attempts < 20) {
    scrambledLetters = shuffle(currentWord.split(''));
    attempts++;
  }
  answerLetters = [];
  renderScrambled();
  renderAnswer();
  updateSubmitBtn();
}

function renderScrambled() {
  const el = document.getElementById('scrambled');
  el.innerHTML = scrambledLetters.map((l, i) => {
    const used = answerLetters.some(a => a.srcIndex === i);
    return `<div class="letter-tile${used ? ' used' : ''}" data-index="${i}" onclick="pickLetter(${i})">${l}</div>`;
  }).join('');
}

function renderAnswer() {
  const el = document.getElementById('answer');
  if (answerLetters.length === 0) {
    el.innerHTML = '<span class="placeholder">Tap letters to build the word</span>';
    return;
  }
  el.innerHTML = answerLetters.map((a, i) =>
    `<div class="answer-tile" onclick="removeLetter(${i})">${a.letter}</div>`
  ).join('');
}

function pickLetter(idx) {
  if (answerLetters.some(a => a.srcIndex === idx)) return;
  answerLetters.push({ letter: scrambledLetters[idx], srcIndex: idx });
  renderScrambled();
  renderAnswer();
  updateSubmitBtn();
  // Auto-submit when all letters placed
  if (answerLetters.length === currentWord.length) {
    setTimeout(() => submitAnswer(), 150);
  }
}

function removeLetter(idx) {
  answerLetters.splice(idx, 1);
  renderScrambled();
  renderAnswer();
  updateSubmitBtn();
}

function updateSubmitBtn() {
  document.getElementById('submit-btn').disabled = answerLetters.length !== currentWord.length;
}

function clearAnswer() {
  answerLetters = [];
  renderScrambled();
  renderAnswer();
  updateSubmitBtn();
}

function shuffleLetters() {
  // Re-shuffle the source, but keep answer intact
  const usedIndices = new Set(answerLetters.map(a => a.srcIndex));
  const freeIndices = scrambledLetters.map((_, i) => i).filter(i => !usedIndices.has(i));
  const freeLetters = shuffle(freeIndices.map(i => scrambledLetters[i]));
  freeIndices.forEach((origIdx, newPos) => {
    scrambledLetters[origIdx] = freeLetters[newPos];
  });
  renderScrambled();
}

function useHint() {
  if (hints <= 0) return;
  hints--;
  document.getElementById('hints-left').textContent = hints;
  if (hints <= 0) document.getElementById('hint-btn').disabled = true;

  // Reveal first incorrect/empty position
  for (let i = 0; i < currentWord.length; i++) {
    if (!answerLetters[i] || answerLetters[i].letter !== currentWord[i]) {
      // Clear answer and place correct letters up to position i
      answerLetters = [];
      for (let j = 0; j <= i; j++) {
        const srcIdx = scrambledLetters.findIndex((l, si) =>
          l === currentWord[j] && !answerLetters.some(a => a.srcIndex === si)
        );
        if (srcIdx >= 0) answerLetters.push({ letter: currentWord[j], srcIndex: srcIdx });
      }
      renderScrambled();
      renderAnswer();
      updateSubmitBtn();
      return;
    }
  }
}

function showFeedback(text, cls) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.className = 'feedback ' + cls;
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); }, 800);
}

function submitAnswer() {
  const guess = answerLetters.map(a => a.letter).join('');
  if (guess.length !== currentWord.length) return;

  if (guess === currentWord) {
    // Correct!
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    wordsGuessed++;
    const basePoints = currentWord.length * 10;
    const comboBonus = Math.min(combo, 5);
    const diffMultiplier = difficulty === 'hard' ? 3 : difficulty === 'medium' ? 2 : 1;
    const earned = basePoints * comboBonus * diffMultiplier;
    score += earned;
    guessedWords.push(currentWord);

    showFeedback(combo > 1 ? `+${earned} 🔥x${combo}` : `+${earned} ✓`, combo > 1 ? 'streak' : 'correct');
    document.getElementById('score').textContent = score;
    document.getElementById('combo').textContent = combo + 'x';

    newRound();
  } else {
    // Wrong
    combo = 0;
    wordsSkipped++;
    showFeedback('✗ ' + currentWord.toUpperCase(), 'wrong');
    document.getElementById('combo').textContent = '0x';

    // Show the correct word briefly, then move on
    setTimeout(() => newRound(), 600);
  }
}

function updateTimer() {
  timer--;
  const el = document.getElementById('timer');
  el.textContent = timer;
  el.classList.toggle('warning', timer <= 20 && timer > 10);
  el.classList.toggle('danger', timer <= 10);
  if (timer <= 0) endGame();
}

function startGame() {
  score = 0;
  combo = 0;
  maxCombo = 0;
  wordsGuessed = 0;
  wordsSkipped = 0;
  hints = 3;
  timer = 60;
  usedWords.clear();
  guessedWords = [];

  document.getElementById('score').textContent = '0';
  document.getElementById('combo').textContent = '0x';
  document.getElementById('timer').textContent = '60';
  document.getElementById('timer').className = 'stat-val timer-val';
  document.getElementById('hints-left').textContent = '3';
  document.getElementById('hint-btn').disabled = false;
  document.getElementById('history').innerHTML = '';

  const badge = document.getElementById('level-badge');
  badge.textContent = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
  badge.className = 'level-badge level-' + difficulty;

  showScreen('game-screen');
  newRound();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
}

function endGame() {
  clearInterval(timerInterval);
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-stats').innerHTML = `
    Words solved: <strong>${wordsGuessed}</strong><br>
    Words missed: <strong>${wordsSkipped}</strong><br>
    Max combo: <strong>${maxCombo}x</strong><br>
    Difficulty: <strong>${difficulty}</strong><br>
    <div class="history" style="margin-top:12px;max-height:none;">
      ${guessedWords.map(w => `<span class="history-word">${w}</span>`).join('')}
    </div>
  `;
  showScreen('end-screen');
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (document.getElementById('game-screen').classList.contains('active')) {
    if (e.key === 'Backspace') {
      if (answerLetters.length > 0) removeLetter(answerLetters.length - 1);
      return;
    }
    if (e.key === 'Enter') {
      submitAnswer();
      return;
    }
    const letter = e.key.toLowerCase();
    if (/^[a-z]$/.test(letter)) {
      const idx = scrambledLetters.findIndex((l, i) =>
        l === letter && !answerLetters.some(a => a.srcIndex === i)
      );
      if (idx >= 0) pickLetter(idx);
    }
  }
});
</script>
</body>
</html>
